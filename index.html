{d:"nf",q:"A router interface shows 'administratively down / down' in 'show ip interface brief'. What is the cause?",c:["A cable is unplugged","There is an IP address conflict","The 'no shutdown' command has not been entered","The interface speed is mismatched"],a:2,e:"Router interfaces are shutdown by default; 'administratively down' means the interface was never brought up with 'no shutdown' or was explicitly shut down."},
{d:"nf",q:"Which command gives the fastest overview of all interface IP addresses, Layer 1 status, and Layer 2 protocol status on a router?",c:["show interfaces","show ip route","show ip interface brief","show version"],a:2,e:"'show ip interface brief' displays a concise one-line summary per interface: IP address, L1 status, and L2 protocol status — the fastest health check."},
{d:"nf",q:"An interface reports status 'up' but protocol 'down'. Which layer has a problem?",c:["Layer 1 — the physical cable","Layer 2 — keepalives or encapsulation mismatch","Layer 3 — incorrect IP address","Layer 4 — TCP session failure"],a:1,e:"Up/down means Layer 1 is working (signal detected) but Layer 2 cannot establish; common causes are keepalive or encapsulation mismatches between connected interfaces."},
{d:"nf",q:"Which command assigns IP 192.168.1.1/24 to GigabitEthernet0/0 and brings it up, in the correct IOS order?",c:["ip address 192.168.1.1 255.255.255.0 then shutdown","no shutdown then ip address 192.168.1.1 255.255.255.0","ip address 192.168.1.1 255.255.255.0 then no shutdown","ip address 192.168.1.1/24 then no shutdown"],a:2,e:"Assign the IP address first, then 'no shutdown' activates the interface; IOS uses dotted-decimal mask notation, not CIDR slash in the ip address command."},
// Day 9 - Switch Interfaces
{d:"na",q:"A switch port runs full duplex while the connected device negotiated half duplex. Which counters increase on the switch port?",c:["Runts and giants","Input errors and FCS errors","Late collisions on the switch port","CRC errors on the half-duplex side only"],a:1,e:"The full-duplex side of a duplex mismatch sees FCS and input errors because it transmits without waiting, causing frame corruption when the half-duplex side also transmits."},
{d:"na",q:"What does a 'runt' frame indicate on a switch interface?",c:["A frame larger than 1518 bytes","A frame with a bad CRC","A frame smaller than 64 bytes","A frame with an unknown destination MAC"],a:2,e:"Runts are frames shorter than the 64-byte Ethernet minimum; they are often caused by collisions truncating frames or malfunctioning NICs."},
{d:"na",q:"Autonegotiation is enabled on one side; the other is hard-set to 100 Mbps full-duplex. What duplex will the autoneg side select?",c:["Full duplex, because the speed is 100 Mbps","Half duplex, because it cannot see the other side's duplex advertisement","Full duplex, because full is always preferred","It will disable the port"],a:1,e:"When a device cannot receive IEEE autoneg Fast Link Pulses, it defaults to half duplex for 10/100 Mbps links, causing a duplex mismatch even though both sides run at the same speed."},
{d:"na",q:"Full-duplex operation on a switch port means which of the following?",c:["CSMA/CD is active to manage collisions","The port operates in one direction at a time","Collisions cannot occur and CSMA/CD is disabled","The port shares bandwidth with adjacent ports"],a:2,e:"Full-duplex allows simultaneous transmit and receive using separate wire pairs, eliminating collisions; CSMA/CD is only needed in half-duplex shared environments."},
{d:"na",q:"What is the primary symptom of a duplex mismatch on a switch interface?",c:["The interface goes err-disabled","Late collisions increment on the half-duplex side","The port shuts down automatically","MTU errors appear in the log"],a:1,e:"Late collisions (after the 64-byte slot time) on the half-duplex side are the classic signature of a duplex mismatch; the full-duplex side sees input/FCS errors instead."},
// Day 10 - The IPv4 Header
{d:"nf",q:"A packet's TTL reaches 0 at a router. What does the router do?",c:["Forwards it to the next hop anyway","Drops it and sends ICMP Time Exceeded to the source","Drops it silently","Sends it back to the sender unchanged"],a:1,e:"When TTL hits 0, the router discards the packet and returns ICMP Type 11 Time Exceeded to the source; traceroute exploits this by sending packets with incrementing TTL values."},
{d:"nf",q:"Which Protocol field value in the IPv4 header identifies an OSPF packet?",c:["1","6","17","89"],a:3,e:"Protocol 89 = OSPF; 1 = ICMP, 6 = TCP, 17 = UDP. Knowing these values helps when reading packet captures or writing ACLs that match specific traffic types."},
{d:"nf",q:"A packet travels from Host A through three routers to Host B. What changes at each router hop?",c:["Source and destination IP addresses","Source and destination MAC addresses","Both IP and MAC addresses","Only TTL and destination MAC"],a:1,e:"Routers rewrite source and destination MAC addresses at each hop to match the next-hop interfaces; source and destination IPs remain unchanged end-to-end (absent NAT)."},
{d:"nf",q:"What is the purpose of the DF bit in the IPv4 header?",c:["Indicates more fragments follow","Tells routers not to fragment the packet","Marks the packet for QoS priority","Identifies the first fragment"],a:1,e:"The Don't Fragment bit instructs routers not to fragment the packet; if the packet exceeds an MTU along the path, the router drops it and sends ICMP Fragmentation Needed to the source."},
{d:"nf",q:"Which IPv4 header field is used by routers to mark traffic for QoS prioritization?",c:["Protocol","TTL","DSCP","Identification"],a:2,e:"The DSCP field in the ToS byte carries QoS markings; routers and switches read it to apply queuing and forwarding priority decisions."},
// Day 25 - RIP & EIGRP
{d:"ipc",q:"A network is 16 hops away according to RIPv2. How does RIP treat this destination?",c:["Installs it with a high metric","Treats it as unreachable","Load-balances it with another path","Triggers an immediate update"],a:1,e:"RIPv2's maximum hop count is 15; metric 16 is defined as infinity (unreachable), so the destination is not installed — limiting RIP to small networks."},
{d:"ipc",q:"To what multicast address does EIGRP send hello and update packets?",c:["224.0.0.5","224.0.0.9","224.0.0.10","224.0.0.2"],a:2,e:"EIGRP uses 224.0.0.10; RIPv2 uses 224.0.0.9; 224.0.0.5 and 224.0.0.6 are OSPF AllSPFRouters and AllDRRouters addresses."},
{d:"ipc",q:"In EIGRP, what must be true for a route to qualify as a feasible successor?",c:["Backup metric equals the successor's metric","Neighbor's reported distance is less than this router's feasible distance","Backup path uses the same interface as the successor","Backup neighbor is directly connected"],a:1,e:"The feasibility condition guarantees loop-free backup paths: the neighbor's reported distance must be strictly less than this router's current feasible distance to that destination."},
{d:"ipc",q:"A network engineer configures 'network 10.0.0.0' under RIPv2. Which interfaces will RIP activate on?",c:["Only the interface with IP 10.0.0.1","Only interfaces in 10.0.0.0/24","All interfaces whose IP falls within Class A 10.0.0.0/8","Only interfaces explicitly listed with a wildcard mask"],a:2,e:"RIPv2 network statements are classful — 'network 10.0.0.0' matches all interfaces in the Class A 10.0.0.0/8 range, which can unintentionally enable RIP on unexpected interfaces."},
{d:"ipc",q:"Which feature makes EIGRP unique among common IGPs for handling multiple paths to a destination?",c:["Feasibility condition","Administrative distance of 90","Variance enabling unequal-cost load balancing","Multicast hello packets"],a:2,e:"EIGRP's variance multiplier allows installing multiple unequal-cost routes for load balancing; no other common IGP supports unequal-cost load balancing."},
// Day 38 - DNS
{d:"ips",q:"Which DNS record type maps a hostname to an IPv6 address?",c:["A","MX","CNAME","AAAA"],a:3,e:"AAAA records hold 128-bit IPv6 addresses; A records hold IPv4; CNAME is an alias; MX directs email to the correct mail server."},
{d:"ips",q:"DNS queries typically use which transport and port?",c:["TCP 53","UDP 53","UDP 69","TCP 443"],a:1,e:"DNS queries use UDP port 53 because the small request/response fits in one datagram; TCP 53 is reserved for zone transfers and responses exceeding 512 bytes."},
{d:"ips",q:"A network engineer mistypes a command and the CLI hangs for several seconds. What is the most likely cause?",c:["The router is saving config","STP is recalculating","ip domain-lookup is enabled and the router is resolving the typo as a hostname","The SSH session timed out"],a:2,e:"With ip domain-lookup enabled (default), IOS treats unknown input as a hostname and attempts DNS resolution; 'no ip domain-lookup' prevents this in lab environments."},
{d:"ips",q:"Which IOS command configures the router to use 8.8.8.8 as its DNS server?",c:["ip domain-name 8.8.8.8","ip name-server 8.8.8.8","ip dns-server 8.8.8.8","ip host DNS 8.8.8.8"],a:1,e:"'ip name-server' specifies the DNS server(s) the router queries; 'ip host' creates a static local hostname-to-IP mapping without needing an external DNS server."},
// Day 43 - FTP & TFTP
{d:"ips",q:"Which protocol and port does TFTP use, and why is it preferred for IOS image transfers on a LAN?",c:["TCP 21; it is authenticated","UDP 69; simple and sufficient for reliable LAN transfers","TCP 69; provides error correction","UDP 21; avoids firewall issues"],a:1,e:"TFTP uses UDP port 69 with lock-step acknowledgments; no authentication overhead makes it fast and lightweight for trusted LAN environments like IOS upgrades."},
{d:"ips",q:"In FTP active mode, which device initiates the data connection?",c:["Client initiates both control and data connections","Server initiates the data connection back to the client","Firewall opens the data channel","Client initiates data only after authentication"],a:1,e:"In active mode, the client opens TCP 21 (control) but the server calls back to the client on TCP 20 for data — causing problems when firewalls block inbound connections to the client."},
{d:"ips",q:"After adding a 'boot system' command and reloading, the router boots the old IOS image. What is the most likely cause?",c:["New image is corrupted","boot system was not saved to startup-config before reload","MD5 hash verification failed","Flash is too small for both images"],a:1,e:"The router reads startup-config at boot; if the boot system command was only in running-config and not saved, it is lost on reload and the router boots the first valid image in flash."},
{d:"ips",q:"Which command backs up a router's running configuration to a TFTP server?",c:["copy startup-config tftp:","copy tftp: flash:","copy running-config tftp:","copy flash: tftp:"],a:2,e:"'copy running-config tftp:' pushes the active config to the TFTP server; 'copy tftp: flash:' pulls a file from TFTP into flash — direction matters."},
{d:"ips",q:"What is the correct IOS command to verify the MD5 hash of a newly copied IOS image in flash?",c:["show flash: md5","verify /md5 flash:image.bin","show version md5","md5sum flash:image.bin"],a:1,e:"'verify /md5' computes the MD5 hash of the specified file so you can compare it against Cisco's published hash to confirm the image was not corrupted in transit."},
// Day 53 - WAN Architectures
{d:"nf",q:"A company needs OSPF updates to traverse an IPsec VPN between branches. What must be added to plain IPsec?",c:["MPLS labels between sites","A GRE tunnel over the IPsec tunnel","A second IPsec SA for multicast","TLS remote-access VPN"],a:1,e:"IPsec encrypts unicast packets but does not natively carry multicast or routing protocols; wrapping GRE inside IPsec adds the multicast capability needed for OSPF hellos and updates."},
{d:"nf",q:"In an MPLS VPN, what term describes the provider's router that connects directly to the customer edge router?",c:["CE (Customer Edge)","P (Provider core)","PE (Provider Edge)","WLC"],a:2,e:"PE (Provider Edge) is the provider's device connecting to the CE; PE routers maintain customer VPN routing; P (core) routers only switch labels and carry no customer routes."},
{d:"nf",q:"A company has two WAN links to two different ISPs. What redundancy model is this?",c:["Dual-homed","Single-homed","Multihomed","Fully meshed"],a:2,e:"Multihomed = two or more different ISPs, providing both link and provider redundancy; dual-homed = two links to the same single ISP, protecting against link failure but not ISP failure."},
{d:"nf",q:"Which VPN technology is best suited for individual remote employees connecting securely to headquarters over the internet?",c:["Site-to-site IPsec","GRE over IPsec","DMVPN","Remote-access TLS VPN"],a:3,e:"Remote-access TLS VPN is designed for individual client-to-gateway connections over standard HTTPS ports, making it firewall-friendly and suitable for remote workers without dedicated hardware."},
// Day 58 - Wireless Configuration
{d:"na",q:"What is the purpose of the WLC virtual interface, and what IP does it commonly use?",c:["Carries CAPWAP tunnels; uses management IP","Handles DHCP relay and web-auth for clients; commonly 192.0.2.1","Maps each WLAN to a VLAN; uses a routable IP","Aggregates physical ports; uses a loopback"],a:1,e:"The WLC virtual interface (typically 192.0.2.1) is non-routable and used for client-facing DHCP relay and web-auth redirect — not for management or inter-VLAN traffic."},
{d:"na",q:"A WLC administrator maps a WLAN to the wrong dynamic interface. What is the most likely impact?",c:["Clients cannot associate to the SSID","Clients receive IP addresses from the wrong VLAN and subnet","Clients connect but cannot reach the WLC management page","Clients experience lower signal strength"],a:1,e:"Each dynamic interface maps to a specific VLAN; the wrong mapping puts clients in an unintended VLAN, causing them to receive wrong IPs or no DHCP response at all."},
{d:"na",q:"Which WLC configuration step must be completed before 802.1X can be selected as a WLAN security method?",c:["Create the dynamic interface","Enable LAG on the WLC uplink","Add the RADIUS server under Security → AAA","Enable band steering"],a:2,e:"802.1X requires an external RADIUS server; it must be configured under Security → AAA on the WLC before it can be selected as the authentication method for a WLAN."},
{d:"na",q:"How must the upstream switch port be configured to support a WLC with multiple dynamic interfaces on different VLANs?",c:["Access port in VLAN 1","Routed Layer 3 port","Trunk port carrying all dynamic interface VLANs","Static LAG only"],a:2,e:"The WLC uplink must be a trunk because each dynamic interface corresponds to a separate VLAN; all VLANs must be allowed on the trunk for client traffic to reach the correct Layer 3 gateway."},
{d:"na",q:"Which QoS profile on the WLC gives voice traffic the highest priority treatment?",c:["Gold","Silver","Bronze","Platinum"],a:3,e:"Platinum QoS profile provides highest-priority queuing on the WLC and is intended for voice; Gold = video, Silver = default data, Bronze = background best-effort."},
// Day 59 - Intro to Network Automation
{d:"ap",q:"ARP and spanning tree are examples of which network plane?",c:["Data plane","Management plane","Control plane","Automation plane"],a:2,e:"The control plane contains logic that decides how to forward — routing protocols, ARP, STP build the tables the data plane uses; the data plane is where actual forwarding happens at line rate."},
{d:"ap",q:"A Python script sends REST API calls to an SDN controller to provision VLANs. Which API direction is the script using?",c:["Southbound API","Eastbound API","Northbound API","Westbound API"],a:2,e:"Northbound APIs face upward toward applications and orchestration systems; southbound APIs face downward from the controller toward devices using protocols like NETCONF or OpenFlow."},
{d:"ap",q:"What is the primary reason to use a controller-based network architecture over traditional distributed networking?",c:["To eliminate physical hardware","To centralize control plane logic for consistency and programmability","To remove the need for Layer 3 routing","To replace Ethernet with optical switching"],a:1,e:"Centralizing the control plane enables consistent policy application, easier programmability through APIs, and eliminates per-device configuration drift common in distributed architectures."},
{d:"ap",q:"Which southbound protocol allows an SDN controller to program flow tables directly on compatible switches?",c:["RESTCONF","NETCONF","OpenFlow","SNMP"],a:2,e:"OpenFlow is a southbound protocol that lets an SDN controller install and manage flow entries in the data plane of compatible switches; NETCONF and RESTCONF are used for configuration management."},
{d:"ap",q:"Which network plane is accessed when an administrator SSHs into a router to configure it?",c:["Data plane","Control plane","Management plane","Forwarding plane"],a:2,e:"SSH, SNMP, HTTPS, and console access are management plane functions — how admins interact with devices; separate from control (routing logic) and data (packet forwarding) planes."}
);
// ===== TOP-UP QUESTIONS: bring all 63 days to 4-5 questions =====
QB.push(
// Day 2 (+3)
{d:"nf",q:"A network technician needs to connect two switches together. No Auto-MDIX is available. Which cable type is required?",c:["Straight-through","Rollover","Crossover","Console"],a:2,e:"Like devices (switch-to-switch) require a crossover cable so TX pins on one end connect to RX pins on the other. Auto-MDIX removes this requirement by detecting and correcting the mismatch automatically."},
{d:"nf",q:"Which UTP cable category is the minimum required for 10GBASE-T?",c:["Cat3","Cat5","Cat5e","Cat6a"],a:3,e:"10GBASE-T requires Cat6a to support 10 Gbps over the full 100-meter maximum distance; lower categories lack the bandwidth and crosstalk performance needed."},
{d:"nf",q:"A switch port needs to support either a copper or a fiber uplink depending on the installation. Which component enables this flexibility?",c:["RJ-45 port","SFP/SFP+ transceiver","Auto-MDIX","Crossover cable"],a:1,e:"SFP and SFP+ transceivers are modular slots that accept either copper or fiber modules, allowing a single switch port to be adapted for either medium at installation time."},
// Day 3 (+2)
{d:"nf",q:"An Ethernet frame traveling from a PC to a router has a header added at Layer 2. What else is added at Layer 2 that no other layer adds?",c:["Segment header","Packet header","Frame trailer (FCS)","IP header"],a:2,e:"Layer 2 is unique in adding both a header and a trailer — the Frame Check Sequence (FCS) — to enable error detection at the receiving end."},
{d:"nf",q:"A colleague says 'Layer 2 of the TCP/IP model handles IP addressing.' Are they correct?",c:["Yes — TCP/IP Internet layer maps to OSI Layer 2","No — IP addressing belongs to the TCP/IP Internet layer, which maps to OSI Layer 3","Yes — IP is always a Layer 2 concern","No — IP addressing is handled by the TCP/IP Transport layer"],a:1,e:"The TCP/IP model's Internet layer (its second layer) corresponds to OSI Layer 3 where IP addressing lives. The different numbering between models makes this a common exam trap."},
// Day 5 (+2)
{d:"nf",q:"A switch receives a frame with destination MAC FFFF.FFFF.FFFF. What does the switch do?",c:["Drops the frame","Forwards it only to the port matching the MAC table entry","Floods it out all ports including the source port","Floods it out all other ports in the VLAN"],a:3,e:"Broadcast frames are flooded out every port in the VLAN except the port the frame arrived on — the switch never sends a frame back out the port it came in on."},
{d:"nf",q:"A switch receives a unicast frame destined for a MAC address not in its MAC table. How does the switch handle it?",c:["Drops it and sends ICMP unreachable","Sends it only to the default gateway","Floods it out all other ports in the VLAN","Discards it until the MAC table is refreshed"],a:2,e:"An unknown unicast is flooded just like a broadcast, but it remains a unicast frame — flooding is the switch's mechanism for discovering where unknown destinations live."},
// Day 7 (+3)
{d:"nf",q:"Which IPv4 address class has a default prefix length of /16?",c:["Class A","Class B","Class C","Class D"],a:1,e:"Class B addresses (128–191 in the first octet) carry a default mask of /16 (255.255.0.0), giving each network 65,534 usable host addresses."},
{d:"nf",q:"Given the subnet 192.168.10.0/28, which address can be assigned to a host?",c:["192.168.10.0","192.168.10.15","192.168.10.14","192.168.10.16"],a:2,e:"A /28 has 16 addresses (.0–.15): .0 is the network and .15 is the broadcast — both unusable. The last usable host is .14; .16 falls in the next subnet."},
{d:"nf",q:"A technician sees address 127.0.0.1 configured on a device. What is its purpose?",c:["It is a valid Class A host address","It identifies the default gateway","It is the IPv4 loopback address used to test the local IP stack","It is reserved for multicast traffic"],a:2,e:"The entire 127.0.0.0/8 range is reserved as loopback; traffic sent here stays on the local host and verifies the IP stack is functioning correctly."},
// Day 15 (+1)
{d:"nf",q:"Using VLSM from 192.168.1.0/24, a segment needs to support 28 hosts. Which mask provides the smallest block that satisfies this requirement?",c:["/26 (62 usable)","/27 (30 usable)","/28 (14 usable)","/29 (6 usable)"],a:1,e:"A /28 provides only 14 usable addresses — not enough for 28 hosts. A /27 provides 30 usable addresses (32−2), which is the smallest block meeting the 28-host requirement."},
// Day 16 (+2)
{d:"na",q:"An administrator runs show vlan brief and does not see any trunk ports listed. Why?",c:["Trunk ports are in VLAN 1 by default and hidden","show vlan brief only displays access ports and their VLAN assignments — trunk ports do not appear","The switch has no trunk ports configured","Trunk ports require VTP to appear in the output"],a:1,e:"show vlan brief lists VLANs and the access ports assigned to them; trunk ports carry multiple VLANs and are not shown — use show interfaces trunk to view trunk ports."},
{d:"na",q:"Hosts in VLAN 10 and VLAN 20 on the same switch cannot reach each other. What is required to fix this?",c:["Add both VLANs to VLAN 1","Create a trunk link between the two VLANs","Connect a Layer 3 device or configure inter-VLAN routing","Move both hosts to the same VLAN"],a:2,e:"VLANs are separate broadcast domains and cannot communicate at Layer 2 alone — a Layer 3 device (router or multilayer switch with SVIs) is always required to route traffic between VLANs."},
// Day 18 (+2)
{d:"na",q:"An SVI for VLAN 30 is configured with an IP address and is not shut down, but remains down/down. What is the most likely cause?",c:["The IP address is on the wrong subnet","No access or trunk port carrying VLAN 30 is currently active","ip routing has not been configured globally","The SVI must be on VLAN 1 to come up first"],a:1,e:"An SVI enters up/up only if the VLAN exists in the database AND at least one access or trunk port carrying that VLAN is in forwarding state — without an active member port, the SVI stays down."},
{d:"na",q:"After configuring perfect SVIs on a multilayer switch, hosts in different VLANs still cannot communicate. What should be checked first?",c:["Whether VTP is enabled","Whether hosts' default gateways point to the correct SVI IP addresses","Whether PortFast is enabled on access ports","Whether DTP is negotiating trunks"],a:1,e:"Hosts must have their default gateway set to the SVI IP of their own VLAN; a perfectly configured switch cannot route for hosts pointing their gateway at the wrong address."},
// Day 19 (+2)
{d:"na",q:"Switch A is set to dynamic auto and Switch B is set to dynamic auto. What will be the resulting state of the link?",c:["Trunk","Access","The link will not form","Depends on VTP mode"],a:1,e:"Dynamic auto is passive — it trunks only if the other side actively requests it. When both sides are auto, neither asks, so the link negotiates as an access port."},
{d:"na",q:"A new switch with a higher VTP configuration revision number is plugged into a production network sharing the same VTP domain. What is the risk?",c:["The new switch will disable VTP on all others","The new switch's VLAN database will overwrite the VLAN database on all VTP clients and servers","The new switch becomes VTP server automatically","DTP blocks the trunk until revision numbers match"],a:1,e:"VTP uses the configuration revision number to determine which database is authoritative — a higher revision wins and propagates to all clients and servers, potentially deleting production VLANs."},
// Day 22 (+2)
{d:"na",q:"Which RSTP port role blocks traffic but maintains a ready alternate path to the root bridge?",c:["Backup","Designated","Alternate","Edge"],a:2,e:"The alternate port holds a discarding state but has already negotiated a known path to the root, allowing it to transition to forwarding almost instantly if the root path fails."},
{d:"na",q:"An RSTP switch is connected to a legacy 802.1D switch. How does the RSTP switch handle this link?",c:["It disables the port to prevent loops","It falls back to 802.1D timer-based behavior on that port","It forces the legacy switch into RSTP mode","It enables PortFast automatically"],a:1,e:"RSTP is backward compatible — when it receives 802.1D BPDUs, it reverts to classic STP timer behavior (20-second max-age, 15-second listening/learning) for that specific port only."},
// Day 23 (+1)
{d:"na",q:"An engineer configures one side of an EtherChannel with LACP active and the other side with LACP passive. Will the EtherChannel form?",c:["No — both sides must be active","Yes — active initiates negotiation and passive responds","No — LACP requires static mode on at least one side","Yes — but only if PAgP is also enabled"],a:1,e:"LACP active actively sends negotiation packets; passive waits but responds — active+passive is a valid combination. passive+passive fails because neither side initiates."},
// Day 24 (+2)
{d:"ipc",q:"A router learns a route to 10.1.1.0/24 via both OSPF and RIP. Which route is installed in the routing table?",c:["RIP, because it has fewer hops","OSPF, because it has a lower administrative distance","RIP, because it is a distance-vector protocol","Both — they load balance via ECMP"],a:1,e:"When two protocols advertise the same prefix, the router uses administrative distance: OSPF's AD is 110 versus RIP's 120, so OSPF wins and its route is installed."},
{d:"ipc",q:"A router running OSPF has 'ip route 0.0.0.0 0.0.0.0 10.0.0.1 111' configured. What is the purpose of the value 111?",c:["It sets the OSPF metric","It makes this a floating static — installed only when OSPF has no matching route","It defines the number of hops","It enables ECMP with OSPF"],a:1,e:"Setting the static route's AD to 111 (above OSPF's default of 110) makes it a floating static — it hides behind the OSPF route and appears in the routing table only if OSPF loses that prefix."},
// Day 28 (+1)
{d:"ipc",q:"Two OSPF routers will not form an adjacency. Which parameter does NOT need to match between OSPF neighbors?",c:["Hello and dead timers","OSPF process ID","Area ID","MTU size"],a:1,e:"OSPF process IDs are locally significant and do not need to match between neighbors. Hello/dead timers, area ID, authentication, stub flags, and MTU must all match exactly."},
// Day 30 (+1)
{d:"nf",q:"A server is transferring a large DNS zone file to a secondary DNS server. Which transport protocol and port is used?",c:["UDP port 53","TCP port 53","UDP port 69","TCP port 69"],a:1,e:"DNS uses UDP 53 for standard queries, but zone transfers and large responses use TCP 53 because reliable, ordered delivery is required for the larger data sets."},
// Day 32 (+2)
{d:"nf",q:"A router interface has MAC 00:1A:2B:3C:4D:5E and is configured with 'ipv6 address 2001:db8:1::/64 eui-64'. What is the resulting interface ID?",c:["021A:2BFF:FE3C:4D5E","001A:2BFF:FE3C:4D5E","021A:2B3C:4D5E:FFFE","001A:2B3C:FFFE:4D5E"],a:0,e:"EUI-64 splits the MAC in half and inserts FFFE in the middle (001A:2B|FFFE|3C4D:5E), then flips the 7th bit of the first byte — 0x00 becomes 0x02 — yielding 021A:2BFF:FE3C:4D5E."},
{d:"nf",q:"Which IPv6 address type is automatically configured on every IPv6-enabled interface and is never forwarded by routers?",c:["Global unicast (2000::/3)","Unique local (FC00::/7)","Link-local (FE80::/10)","Anycast"],a:2,e:"Link-local addresses (FE80::/10) are auto-configured on every IPv6 interface and used for on-link communication such as NDP. Routers never forward packets with link-local source or destination addresses off the local segment."},
// Day 33 (+1)
{d:"ipc",q:"A host has learned its IPv6 default gateway via a Router Advertisement. Which address type will it use as the gateway?",c:["The router's global unicast address","The router's unique local address","The router's link-local address","The anycast address shared by all routers"],a:2,e:"RA messages are sourced from the router's link-local address, so hosts record a link-local address as their IPv6 default gateway — which is why static IPv6 routes using a link-local next-hop must also specify the exit interface."},
// Day 34 (+1)
{d:"sf",q:"An administrator applies standard ACL 10 to an interface, then applies ACL 11 to the same interface in the same direction. What is the result?",c:["Both ACLs are evaluated in order","Both ACLs are merged","ACL 11 replaces ACL 10","The router rejects the second command"],a:2,e:"IOS allows only one ACL per interface, per direction, per protocol. Applying a second ACL with ip access-group in the same direction silently replaces the first."},
// Day 35 (+3)
{d:"sf",q:"Which extended ACL command correctly blocks Telnet from 192.168.1.0/24 to host 10.0.0.50?",c:["deny tcp 192.168.1.0 0.0.0.255 host 10.0.0.50 eq 23","deny tcp host 10.0.0.50 eq 23 192.168.1.0 0.0.0.255","deny 23 192.168.1.0 0.0.0.255 host 10.0.0.50","deny tcp any eq 23 host 10.0.0.50"],a:0,e:"Extended ACL syntax is: deny PROTOCOL SOURCE WILDCARD DESTINATION WILDCARD [eq PORT] — source always comes first; the destination port (Telnet=23) is placed after the destination address."},
{d:"sf",q:"A network engineer needs to remove only sequence 20 from a named extended ACL without deleting the entire list. What is the correct procedure?",c:["Delete the ACL with 'no ip access-list extended' and re-enter all rules","Enter the named ACL config mode and issue 'no 20'","Use 'no ip access-group' to detach the ACL, edit it, then reattach","Renumber entries so sequence 20 is overwritten"],a:1,e:"Named ACLs support per-sequence editing — entering 'ip access-list extended NAME' then 'no 20' removes only that sequence entry, leaving all others intact."},
{d:"sf",q:"Where should an extended ACL designed to block traffic from the 10.1.1.0/24 network be placed?",c:["Close to the destination to minimize impact","Close to the source to stop the traffic as early as possible","On the core router only","On the destination interface inbound"],a:1,e:"Extended ACLs should be placed close to the source because they match both source and destination — placing them early stops unwanted traffic immediately rather than letting it traverse the network."},
// Day 36 (+2)
{d:"na",q:"A technician runs 'show cdp neighbors' and sees: Local Intrfce Gi0/1, Port ID Gi0/0. What does this mean?",c:["The neighbor's Gi0/1 connects to the local router's Gi0/0","The local router's Gi0/1 connects to the neighbor's Gi0/0","CDP is forwarding traffic from Gi0/1 to Gi0/0","Both interfaces belong to the neighbor"],a:1,e:"In the CDP neighbors table, 'Local Intrfce' is the port on YOUR device, while 'Port ID' is the port on the NEIGHBOR's device. The local router's Gi0/1 connects to the neighbor's Gi0/0."},
{d:"na",q:"Which statement correctly describes a key difference between CDP and LLDP?",c:["CDP is IEEE standard; LLDP is Cisco proprietary","LLDP sends announcements every 60s; CDP every 30s","CDP is enabled by default on Cisco devices; LLDP must be enabled with 'lldp run'","LLDP only works on Layer 3 interfaces"],a:2,e:"CDP is Cisco proprietary and enabled by default; LLDP (IEEE 802.1AB) is multivendor but disabled by default — it requires 'lldp run' globally plus transmit/receive enablement per interface."},
// Day 37 (+2)
{d:"ips",q:"A router is configured with 'ntp server 10.1.1.100' but is still showing as unsynchronized immediately after config. What is the most likely reason?",c:["'ntp master' is also required on the client","NTP uses TCP and the port must be opened in an ACL","NTP sync can take several minutes after configuration","The router must reload before NTP takes effect"],a:2,e:"NTP synchronization is not instantaneous — it can take several minutes after configuration for the device to exchange packets and declare itself synchronized. A device showing unsynchronized immediately after setup is normal."},
{d:"ips",q:"Which NTP stratum value indicates a device is not synchronized to any time source?",c:["0","1","8","16"],a:3,e:"Stratum 16 means the device is unsynchronized and its time should not be trusted. Stratum 0 is reserved for reference clocks (atomic/GPS), stratum 1 for devices directly connected to them."},
// Day 39 (+2)
{d:"ips",q:"Hosts on VLAN 10 need addresses from a DHCP server on a different subnet (10.0.0.100). The VLAN 10 SVI is 10.0.10.1. Where should 'ip helper-address 10.0.0.100' be applied?",c:["On the physical interface facing the DHCP server","On the Vlan10 SVI facing the clients","On the DHCP server's interface","Globally under 'ip dhcp pool'"],a:1,e:"ip helper-address must be placed on the interface that receives the client's broadcast — the SVI or router interface facing the clients. It converts the broadcast Discover into a unicast packet forwarded to the server."},
{d:"ips",q:"Why does the DHCP client send a broadcast DHCP Request after already receiving an Offer?",c:["It has no IP yet and cannot send unicast","The broadcast informs all DHCP servers which offer was accepted so others can reclaim reserved addresses","DHCP requests are always broadcast","The router requires a broadcast to trigger ip helper-address relay"],a:1,e:"Multiple DHCP servers may have sent Offers and reserved addresses. The broadcast Request tells all servers which offer was accepted, allowing the others to release their held addresses back to their pools."},
// Day 40 (+3)
{d:"ips",q:"A manager wants SNMP traps sent to NMS at 10.1.1.50 using SNMPv2c community 'NET-MON'. Which config is correct?",c:["snmp-server community NET-MON rw\nsnmp-server host 10.1.1.50 version 2c NET-MON","snmp-server community NET-MON ro\nsnmp-server host 10.1.1.50 version 2c NET-MON","snmp-server host 10.1.1.50 traps NET-MON","snmp-server community NET-MON ro\nsnmp-server manager 10.1.1.50 2c NET-MON"],a:1,e:"For sending traps the agent only needs read-only (ro) community access; rw grants the NMS the ability to modify device settings, which is a security risk and unnecessary for monitoring."},
{d:"ips",q:"What is the key difference between an SNMP Trap and an SNMP Inform?",c:["Traps use TCP; Informs use UDP","Informs go to UDP 161; Traps to UDP 162","Informs are acknowledged and retransmitted if lost; Traps are fire-and-forget","Traps carry more OIDs than Informs"],a:2,e:"SNMP Informs are acknowledged — if the NMS does not reply, the agent resends the message. Traps are unacknowledged; once sent the agent does not know whether the NMS received them."},
{d:"ips",q:"A security policy requires SNMP traffic to use encryption and real authentication on untrusted networks. Which SNMP version satisfies this?",c:["SNMPv1 with a complex community string","SNMPv2c with separate RO and RW strings","SNMPv3 with auth and priv modes","Any version over an IPsec tunnel"],a:2,e:"SNMPv1 and v2c use plaintext community strings — anyone capturing traffic can read or modify device data. SNMPv3 is the only version providing true authentication and optional encryption (priv mode)."},
// Day 41 (+2)
{d:"ips",q:"A router is configured with 'logging trap warnings'. Which syslog severity levels are sent to the syslog server?",c:["Severity 4 only","Severities 0 through 3","Severities 0 through 4","Severities 4 through 7"],a:2,e:"Syslog severities are 0 (Emergency) through 7 (Debug); lower numbers are more severe. 'logging trap warnings' sets threshold at severity 4, so severities 0 through 4 are sent to the server."},
{d:"ips",q:"An engineer SSHs into a router and finds that syslog messages keep interrupting commands she is typing. Which command resolves this?",c:["logging synchronous","logging buffered","service timestamps log datetime","logging monitor 7"],a:0,e:"'logging synchronous' on vty lines holds log messages until after the current command line is complete, then redisplays the prompt — preventing log messages from fragmenting text being typed."},
// Day 42 (+3)
{d:"ips",q:"After SSH hardening, administrators report Telnet has stopped working on the vty lines. Which command is the cause?",c:["ip ssh version 2","crypto key generate rsa modulus 2048","transport input ssh","login local"],a:2,e:"'transport input ssh' restricts vty lines to accept only SSH, silently blocking all Telnet attempts. This is the intended hardening behavior but is a common exam trap when Telnet suddenly stops working."},
{d:"ips",q:"A router returns an error when 'crypto key generate rsa modulus 2048' is entered. What is the most likely cause?",c:["The router must reload before generating RSA keys","Either hostname or ip domain-name has not been configured","SSHv2 requires exactly 1024-bit modulus","The enable secret must be set first"],a:1,e:"The RSA key pair is named from the router's FQDN (hostname + domain name). IOS requires both 'hostname' and 'ip domain-name' to be configured before 'crypto key generate rsa' will succeed."},
{d:"ips",q:"Which five elements are required to enable SSH access on a Cisco router?",c:["hostname, ip domain-name, RSA key, local username with secret, transport input ssh on vty","hostname, ip domain-name, RSA key, enable secret, transport input ssh on vty","ip domain-name, RSA key, local username, transport input telnet, login local","hostname, RSA key, enable secret, access-class, transport input ssh"],a:0,e:"All five are required: hostname (non-default), ip domain-name (for key naming), RSA key (crypto key generate rsa), local username with secret, and 'transport input ssh' plus 'login local' on the vty lines."},
// Day 44 (+3)
{d:"ips",q:"Static NAT is configured but translations are not occurring. What is the most likely missing step?",c:["The NAT pool has not been defined","The interfaces have not been marked ip nat inside and ip nat outside","An ACL permitting the inside host is required for static NAT","The command clear ip nat translation * must be run first"],a:1,e:"Static NAT requires both the translation statement and interface markings (ip nat inside / ip nat outside). Without marking interfaces, the router does not know which direction to apply NAT."},
{d:"ips",q:"In NAT terminology, which address is the 'inside local'?",c:["The public IP assigned by the ISP to represent the internal host","The private IP configured on the internal host","The public IP of the external destination","The IP seen by the outside network after translation"],a:1,e:"Inside local is the private address of the inside host before translation. The inside global is the public address representing that host on the outside network."},
{d:"ips",q:"Which command verifies that active NAT translations are occurring on a router?",c:["show ip interface brief","show ip route","show ip nat translations","debug ip nat detailed"],a:2,e:"'show ip nat translations' displays the active NAT table showing inside local, inside global, outside local, and outside global mappings. 'show ip nat statistics' complements this with hit/miss counts."},
// Day 45 (+2)
{d:"ips",q:"A company uses dynamic NAT with a pool of 5 public IPs for 200 internal hosts. What happens when a 6th concurrent session starts while all 5 are in use?",c:["The oldest translation is evicted","The new flow is dropped until a pool address becomes available","PAT automatically activates as overflow","The router sends ICMP unreachable to the internal host"],a:1,e:"Dynamic NAT is strictly first-come-first-served; when the pool is exhausted, new flows are dropped. This is a key limitation compared to PAT, which can multiplex thousands of hosts behind a single IP."},
{d:"ips",q:"Which single keyword converts 'ip nat inside source list 1 interface g0/1' from dynamic NAT to PAT?",c:["dynamic","pool","static","overload"],a:3,e:"The 'overload' keyword enables PAT, allowing thousands of inside hosts to share one public IP by disambiguating sessions with unique port numbers. Without it, the command configures standard dynamic NAT."},
// Day 46 (+2)
{d:"ips",q:"Which set of values correctly represents Cisco's recommended VoIP one-way QoS targets?",c:["≤100ms latency, ≤50ms jitter, ≤2% loss","≤150ms latency, ≤30ms jitter, ≤1% loss","≤200ms latency, ≤10ms jitter, ≤5% loss","≤150ms latency, ≤50ms jitter, ≤3% loss"],a:1,e:"Cisco's recommended VoIP targets are ≤150ms one-way latency, ≤30ms jitter, and ≤1% packet loss. Exceeding any of these noticeably degrades call quality."},
{d:"ips",q:"A switch port connects to an IP phone with a PC daisy-chained through it, configured with 'switchport access vlan 10' and 'switchport voice vlan 20'. What type of port is this?",c:["A trunk port carrying VLANs 10 and 20","An access port that also carries tagged voice traffic on VLAN 20","A hybrid port requiring ISL encapsulation","A routed port with two subinterfaces"],a:1,e:"A port with both an access VLAN and a voice VLAN remains an access port — the data VLAN is untagged and the voice VLAN is tagged (802.1Q), but the port mode stays access."},
// Day 47 (+1)
{d:"ips",q:"Which QoS mechanism gives voice traffic the highest priority while ensuring it cannot starve other traffic classes?",c:["WRED applied to voice queue","Weighted Fair Queuing with voice at highest weight","Low Latency Queuing (LLQ) with a policed strict priority queue","Traffic shaping applied to voice flows"],a:2,e:"LLQ provides a strict priority queue for voice that is always serviced first, but the queue is policed so voice cannot exceed its allocated bandwidth and starve other classes. Shaping adds latency; WRED is a drop mechanism, not a scheduler."},
// Day 49 (+1)
{d:"sf",q:"A port security port in 'restrict' violation mode receives a frame from an unauthorized MAC. What happens?",c:["The port is immediately err-disabled","Unauthorized frames are dropped, a syslog message is generated, and a counter increments","Unauthorized frames are silently dropped with no logging","The port shuts down and sends an SNMP trap"],a:1,e:"Restrict mode drops frames from unauthorized MACs, increments the violation counter, and generates a syslog message — but does not err-disable the port. Shutdown (default) err-disables; protect silently drops with no logging."},
// Day 50 (+2)
{d:"sf",q:"After enabling DHCP snooping globally and per-VLAN, clients still cannot get addresses from the legitimate server on the uplink. What is the most likely cause?",c:["The DHCP server must support option 82","The uplink has not been configured as trusted with 'ip dhcp snooping trust'","DHCP snooping requires DAI first","The binding table must be manually populated"],a:1,e:"All ports are untrusted by default under DHCP snooping, so DHCP server messages arriving on the uplink are dropped. The uplink toward the real server must be explicitly marked trusted."},
{d:"sf",q:"DHCP snooping is fully enabled and the uplink is trusted, but clients still fail to get addresses from the non-relay DHCP server. Which command most likely resolves this?",c:["ip dhcp snooping limit rate 100","no ip dhcp snooping information option","ip dhcp snooping verify mac-address","ip dhcp relay information trust-all"],a:1,e:"By default the switch inserts DHCP option 82 into client requests. A non-relay DHCP server typically rejects packets containing option 82, causing clients to fail. 'no ip dhcp snooping information option' disables this insertion."},
// Day 51 (+3)
{d:"sf",q:"DAI is enabled on VLAN 10. A host using a static IP fails to communicate after DAI is deployed. What is the correct fix?",c:["Configure the host's switchport as DAI-trusted","Disable DAI on the VLAN","Create a static ARP ACL mapping the host's IP to its MAC and apply it to DAI","Enable 'ip arp inspection validate ip' to allow static hosts"],a:2,e:"DAI validates ARP replies against the DHCP snooping binding table. Hosts with static IPs have no DHCP binding, so their ARPs fail. A manually configured ARP ACL that maps the static IP to its MAC provides the needed validation entry."},
{d:"sf",q:"Which ports should be configured as DAI-trusted in a campus network?",c:["All access ports, because hosts generate the most ARP traffic","Uplinks between switches and router-facing interfaces, which carry legitimate ARP traffic with no DHCP snooping binding","Only router interfaces, because routers always use static IPs","No ports — DAI validates all ARP traffic equally"],a:1,e:"Switch-to-switch uplinks and router-facing interfaces must be DAI-trusted because their ARP traffic has no corresponding DHCP snooping bindings. If left untrusted, legitimate inter-switch ARP would be dropped."},
{d:"sf",q:"An untrusted DAI port receives ARP packets at a rate exceeding the default limit. What does DAI do?",c:["Drops excess ARP packets and logs them without affecting the port","Places the port into err-disabled state","Applies WRED to the ARP traffic queue","Throttles ARP to 15 pps transparently"],a:1,e:"When ARP traffic on an untrusted DAI port exceeds the rate limit (default 15 pps), DAI err-disables the port to prevent ARP flood attacks from overwhelming the switch CPU."},
// Day 52 (+3)
{d:"nf",q:"A junior engineer proposes adding a direct link between two spine switches in a spine-leaf data center to reduce latency. Why is this wrong?",c:["Spine switches cannot run routing protocols","Spine-to-spine links violate spine-leaf architecture and break predictable 2-hop latency","Spine switches must remain in separate failure domains connected only through leaves","Spine-to-spine links are only permitted with VXLAN"],a:1,e:"In spine-leaf, spines never interconnect. Every leaf-to-leaf path traverses exactly one spine, guaranteeing predictable 2-hop latency. Spine-to-spine links break this guarantee and create asymmetric paths."},
{d:"nf",q:"In a 3-tier campus network, which layer hosts SVIs and serves as the Layer 2 to Layer 3 boundary?",c:["Access layer","Core layer","Distribution layer","Collapsed core"],a:2,e:"The distribution layer is the L2/L3 boundary in a 3-tier design. SVIs live here to route between VLANs. The core layer prioritizes speed without policy; the access layer provides host connectivity."},
{d:"nf",q:"A branch office has one device providing routing, switching, wireless, firewall, and modem functions. Which architecture term describes this?",c:["Collapsed core","Spine-leaf","SOHO","2-tier campus"],a:2,e:"SOHO (Small Office/Home Office) combines all network functions into a single device, contrasting with enterprise designs that separate these functions across dedicated hardware."},
// Day 54 (+2)
{d:"nf",q:"A developer needs to deploy an app without managing the OS, patches, or runtime, but controls the app code and data. Which cloud model fits?",c:["IaaS","PaaS","SaaS","VRF"],a:1,e:"PaaS abstracts the OS and runtime — the user only manages the application and data. IaaS provides raw compute where the user manages the OS up; SaaS requires managing nothing."},
{d:"nf",q:"A network engineer needs two completely separate routing tables on one physical router to isolate customer traffic. Which technology provides this?",c:["VLAN","VRF","Type 1 hypervisor","Kubernetes namespace"],a:1,e:"VRF (Virtual Routing and Forwarding) creates multiple independent routing table instances on one router, analogous to VLANs for switching. Each VRF is completely isolated, allowing overlapping IP address spaces to coexist."},
// Day 55 (+2)
{d:"na",q:"A wireless engineer assigns three adjacent APs to 2.4 GHz channels 1, 6, and 11. A fourth AP overlaps with all three. Which channel should it use?",c:["Channel 2","Channel 3","Channel 1, 6, or 11 — pick any of the existing three","There is no fourth non-overlapping channel on 2.4 GHz"],a:3,e:"On 2.4 GHz, only channels 1, 6, and 11 are non-overlapping. There is no fourth non-overlapping channel — any fourth AP must reuse one of these three, causing co-channel interference with the AP sharing that channel."},
{d:"na",q:"Multiple APs share the same SSID to allow seamless client roaming. What term describes this multi-AP wireless service set?",c:["IBSS — identified by each AP's SSID","ESS — each AP identified by its BSSID (the AP's radio MAC)","BSS — each AP uses a unique SSID","ESS — all APs share a single BSSID"],a:1,e:"An ESS (Extended Service Set) is formed by multiple APs sharing the same SSID for roaming. Each AP's radio MAC is its BSSID, uniquely identifying that AP within the ESS while clients see one logical network name."},
// Day 57 (+1)
{d:"sf",q:"A security audit requires upgrading wireless encryption to include SAE key exchange, forward secrecy, and protected management frames. Which standard meets all three requirements?",c:["WPA with TKIP","WPA2-Enterprise with AES-CCMP","WPA3 with AES-GCMP and SAE","WPA2-Personal with CCMP and 802.11w"],a:2,e:"WPA3 introduces SAE replacing the crackable PSK 4-way handshake, mandates AES-GCMP encryption, provides forward secrecy, and requires protected management frames. WPA2 uses CCMP/AES but lacks SAE and forward secrecy."},
// Day 60 (+1)
{d:"ap",q:"A network automation script fails to parse this JSON: { 'interface': 'GigabitEthernet0/1', 'enabled': true, }. Which element makes it invalid?",c:["The boolean true should be quoted as 'true'","Single quotes and a trailing comma — JSON requires double quotes and no trailing comma","The key 'interface' must be an integer","JSON does not support boolean values"],a:1,e:"JSON requires double quotes for all strings and keys; single quotes make the document invalid. The trailing comma after the last key-value pair is also not permitted in JSON."},
// Day 61 (+1)
{d:"ap",q:"An API call to Cisco DNA Center returns HTTP 403. What does this mean, and how does it differ from 401?",c:["403 = server unavailable; 401 = request timed out","403 = authenticated but not authorized for this resource; 401 = credentials missing or invalid","403 = resource not found; 401 = malformed request body","403 and 401 are interchangeable auth errors"],a:1,e:"401 (Unauthorized) means the server cannot identify the requester — credentials are missing or invalid. 403 (Forbidden) means the server knows who you are but denies access to the specific resource."},
// Day 62 (+1)
{d:"ap",q:"An app queries DNA Center's REST API to get device inventory; DNA Center pushes config to devices via NETCONF. Which terms describe these two directions?",c:["Both are southbound REST interfaces","App-to-DNA Center is northbound; DNA Center-to-device NETCONF is southbound","App-to-DNA Center is southbound; NETCONF push is northbound","NETCONF is northbound; REST is southbound"],a:1,e:"Northbound APIs (REST) face upward toward applications consuming controller data. Southbound APIs (NETCONF, RESTCONF, SSH) face downward toward devices the controller programs. DNA Center sits between both."}
);

const DIVES=[
{t:"Subnetting masterclass",d:"nf",h:`
<p>The exam gives you about a minute per question — subnetting must be reflex, not arithmetic. Here is the entire method, then five solved problems.</p>
<h3>The method (works for every question)</h3>
<ul><li><b>1. Find the interesting octet</b> — the octet where the mask isn't 255 or 0.</li>
<li><b>2. Block size = 256 − mask value</b> in that octet. (/26 → 256−192 = 64.)</li>
<li><b>3. Subnets start at multiples of the block</b>: 0, 64, 128, 192…</li>
<li><b>4.</b> Network = the multiple at or below your address. Broadcast = next multiple − 1. Usable = everything between.</li></ul>
<h3>Worked problem 1 — find the subnet</h3>
<p><b>Q: What subnet contains 172.19.103.77/27?</b><br>/27 → mask .224 → block 256−224 = 32 → multiples 0,32,64,96,128… → 96 ≤ 77? No — 77 sits between 64 and 96, so network <b>172.19.103.64</b>, broadcast <b>.95</b>, usable <b>.65–.94</b>.</p>
<h3>Worked problem 2 — interesting octet isn't the last</h3>
<p><b>Q: What's the broadcast of 10.130.0.0/19?</b><br>/19 = 255.255.<b>224</b>.0 — the third octet is interesting. Block 32 → third-octet multiples 0,32,64,96,128,160… 130 sits in the 128 block → network 10.<b>128.128… careful</b>: the FIRST octet stays 10; the SECOND octet (130) is just an address octet here? No — /19 splits inside the third octet, so we check the THIRD octet of 10.130.0.0, which is 0 → network 10.130.0.0, broadcast = network + block in the third octet − 1 everywhere after: 10.130.<b>31.255</b>.</p>
<p>That stumble is deliberate — always identify <i>which octet the prefix lands in</i> (/9–/16 second, /17–/24 third, /25–/32 fourth) before touching numbers.</p>
<h3>Worked problem 3 — design for hosts</h3>
<p><b>Q: From 192.168.4.0/24, you need 6 subnets of ~25 hosts. What prefix?</b><br>Hosts first: 25 hosts needs 2^h−2 ≥ 25 → h=5 → /27 (30 usable). Subnets check: /24→/27 borrows 3 bits → 8 subnets ≥ 6 ✓. Answer <b>/27</b>, subnets at .0, .32, .64, .96, .128, .160 (two spare).</p>
<h3>Worked problem 4 — VLSM allocation</h3>
<p><b>Q: Carve 10.5.8.0/24 for: A=100 hosts, B=50, C=20, D=2 (p2p).</b><br>Largest first: A needs /25 (126) → 10.5.8.0/25 (.0–.127). B needs /26 (62) → 10.5.8.128/26 (.128–.191). C needs /27 (30) → 10.5.8.192/27 (.192–.223). D /30 → 10.5.8.224/30 (.224–.227). Leftover .228–.255 stays free. No overlaps, every subnet on its own boundary.</p>
<h3>Worked problem 5 — spot the invalid host</h3>
<p><b>Q: Which can't be assigned: 172.16.31.255/19, 172.16.32.1/19, 172.16.63.254/19?</b><br>/19 block 32 in the third octet → subnets …0.0, 32.0, 64.0. The 32.0 subnet runs 172.16.32.0–172.16.63.255. So 172.16.<b>31.255</b> is the broadcast of the PREVIOUS subnet (0–31) → unassignable. 63.254 is the last usable of the 32 block — fine. 32.1 — fine.</p>
<p><b>Drill ritual:</b> 10 questions in Subnet Sprint daily until your average answer takes under 12 seconds.</p>`},
{t:"Life of a packet — the full trace",d:"ipc",h:`
<p>One question pattern decides several marks on every exam: <i>what exactly is in the frame/packet at each step?</i> Here is the complete walk.</p>
<h3>Topology</h3>
<p>PC-A (10.0.1.10, GW 10.0.1.1) — SW1 — R1 (g0/0 10.0.1.1 | g0/1 10.0.2.1) — SW2 — PC-B (10.0.2.20). PC-A pings PC-B. All caches empty.</p>
<h3>Step 1 — PC-A thinks</h3>
<p>Destination 10.0.2.20 vs my subnet 10.0.1.0/24 → <b>off-net → send to default gateway</b>. I need the gateway's MAC, not PC-B's.</p>
<h3>Step 2 — ARP round one</h3>
<p>PC-A broadcasts: "Who has 10.0.1.1?" (dst MAC FFFF.FFFF.FFFF). SW1 floods it; learns PC-A's MAC on its port. R1 replies unicast with g0/0's MAC; SW1 learns R1's port. PC-A caches it.</p>
<h3>Step 3 — the first real frame</h3>
<p>PC-A sends the ICMP echo: <b>src IP 10.0.1.10, dst IP 10.0.2.20, src MAC = PC-A, dst MAC = R1 g0/0</b>. ← This line is the most-tested fact in the section: destination MAC is the router, destination IP is the far host.</p>
<h3>Step 4 — R1 routes</h3>
<p>R1 strips L2, checks dst 10.0.2.20 → connected route on g0/1 → decrements TTL 128→127 → needs PC-B's MAC → <b>ARP round two</b> on the 10.0.2.0 side → builds a NEW frame: <b>src MAC = R1 g0/1, dst MAC = PC-B; IPs unchanged.</b></p>
<h3>Step 5 — the reply mirrors everything</h3>
<p>PC-B answers the echo: off-net → its gateway (10.0.2.1) → all ARP caches are warm now, so no more broadcasts. Reply reaches PC-A. First ping often shows 1 timeout — that was ARP doing its job.</p>
<h3>The exam table</h3>
<table><tr><th>segment</th><th>src MAC</th><th>dst MAC</th><th>src IP</th><th>dst IP</th></tr>
<tr><td>PC-A→R1</td><td>PC-A</td><td>R1 g0/0</td><td>10.0.1.10</td><td>10.0.2.20</td></tr>
<tr><td>R1→PC-B</td><td>R1 g0/1</td><td>PC-B</td><td>10.0.1.10</td><td>10.0.2.20</td></tr></table>
<p><b>Rule to burn in:</b> MACs are per-hop. IPs are end-to-end. Add a second router and the pattern just repeats — TTL drops once per router, MACs swap every link, IPs never move (until NAT).</p>`},
{t:"OSPF from zero — a 3-router build",d:"ipc",h:`
<p>This mirrors Lab 8 and walks the <i>reasoning</i>. Triangle: R1–R2, R2–R3, R1–R3 on /30s; a /24 LAN behind each router.</p>
<h3>Phase 1 — identity</h3>
<div class="cli"><span class="p">R1(config)#</span> router ospf 1<br><span class="p">R1(config-router)#</span> router-id 1.1.1.1</div>
<p>Explicit RIDs make every show command readable. Repeat with 2.2.2.2 / 3.3.3.3. The process ID (1) never has to match between routers.</p>
<h3>Phase 2 — enable per interface</h3>
<div class="cli"><span class="p">R1(config)#</span> interface range g0/0 - 1<br><span class="p">R1(config-if-range)#</span> ip ospf 1 area 0<br><span class="p">R1(config)#</span> interface g0/2 <span class="c">! the LAN</span><br><span class="p">R1(config-if)#</span> ip ospf 1 area 0</div>
<p>Interface mode beats network statements for clarity. Everything in area 0 — single-area is the CCNA scope.</p>
<h3>Phase 3 — quiet the LANs</h3>
<div class="cli"><span class="p">R1(config-router)#</span> passive-interface g0/2</div>
<p>The subnet still gets advertised; hellos stop. Never make a router-to-router link passive — that kills the adjacency (and is a favorite trick).</p>
<h3>Phase 4 — honest costs</h3>
<div class="cli"><span class="p">R1(config-router)#</span> auto-cost reference-bandwidth 100000</div>
<p>Default reference (100 Mbps) makes FastE and 10-Gig identical (cost 1). 100000 makes gig = 100, 10G = 10. Set it on ALL routers or metrics lie.</p>
<h3>Phase 5 — verify like an engineer</h3>
<div class="cli"><span class="p">R1#</span> show ip ospf neighbor<br><span class="c">2.2.2.2  FULL/  -  g0/0</span><br><span class="c">3.3.3.3  FULL/  -  g0/1</span></div>
<p>FULL with a dash (no DR/BDR) appears if you set links point-to-point; on default broadcast Ethernet you'll see FULL/DR or FULL/BDR. Then <code>show ip route ospf</code>: each remote LAN should appear once via the short path.</p>
<h3>Phase 6 — break it on purpose</h3>
<ul><li>Shut R1–R2: R1's route to R2's LAN re-converges via R3 in seconds. Watch with debug ip ospf adj (then undebug all).</li>
<li>Mismatch hello timers on one link (ip ospf hello-interval 5 on one side only): adjacency drops — read the symptom in show ip ospf neighbor before fixing.</li>
<li>Set ip mtu 1400 on one side: stuck EXSTART. Now you've SEEN the classic, not just memorized it.</li></ul>`},
{t:"Troubleshooting playbook",d:"ipc",h:`
<p>Simlets reward a fixed search order, not inspiration. This is the order.</p>
<h3>The ladder (bottom-up beats guessing)</h3>
<ul><li><b>L1:</b> show ip interface brief — anything down/down (cable, speed) or administratively down (no shut missing)?</li>
<li><b>L2:</b> show interfaces (errors? duplex?), show interfaces trunk / switchport (VLAN right? trunk formed? native match?), show mac address-table (is the host even learned?), show spanning-tree (unexpected blocking?).</li>
<li><b>L3:</b> show ip route (is there a route? the RIGHT route — longest prefix!), show ip ospf neighbor (FULL?), show arp, ping each hop outward: gateway → far router → destination.</li>
<li><b>L4+:</b> ACLs (show access-lists — counters incrementing on a deny?), NAT (show ip nat translations), DHCP (bindings? helper present?).</li></ul>
<h3>Symptom → first suspect table</h3>
<table><tr><th>symptom</th><th>check first</th></tr>
<tr><td>Late collisions climbing</td><td>Duplex mismatch</td></tr>
<tr><td>Port LED on, status err-disabled</td><td>Port security / BPDU guard violation</td></tr>
<tr><td>Host has 169.254.x.x</td><td>DHCP unreachable — helper-address missing?</td></tr>
<tr><td>Same-VLAN works, cross-VLAN doesn't</td><td>Gateway/SVI down or host gateway wrong</td></tr>
<tr><td>OSPF stuck EXSTART</td><td>MTU mismatch</td></tr>
<tr><td>OSPF no neighbor at all</td><td>Timers/area/subnet mismatch or passive-interface</td></tr>
<tr><td>One web service fails, ping works</td><td>Extended ACL blocking the port</td></tr>
<tr><td>Internet works by IP, not by name</td><td>DNS (server setting or UDP 53 blocked)</td></tr>
<tr><td>VLAN shows (Inactive) on a port</td><td>VLAN missing from the database</td></tr>
<tr><td>New trunk killed working VLANs</td><td>allowed vlan without 'add'</td></tr></table>
<h3>Reading questions like an attacker</h3>
<p>Exam scenarios hide the answer in one line of output. Habits that pay: read the interface names carefully (g0/0 vs g0/1 swaps are common), compare BOTH sides of any link, and trust counters over claims — a deny ACL with matches tells the truth.</p>`}
];

{d:"sf",f:"ACL golden rules",b:"Top-down, first match, implicit deny at the end. Standard near destination; extended near source."},
{d:"sf",f:"Social engineering flavors",b:"Phishing (mass email) · spear (targeted) · whaling (executives) · vishing (voice) · smishing (SMS) · tailgating (physical)."},

{d:"ap",f:"The three planes",b:"Data = forwards · control = decides (routing, ARP, STP) · management = admin access (SSH, SNMP)."},

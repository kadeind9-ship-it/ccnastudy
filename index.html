<script>
// ===== LESSONS phase 2: Layer 2 (16-23) + Routing (24-33) =====
Object.assign(LESSONS,{
16:`<p>You've routed packets across networks; now you learn how to divide a single switch into multiple logical networks. VLANs are one of the most-used features in real networks and a heavy exam topic.</p>
<h3>The problem VLANs solve</h3>
<p>By default, every port on a switch is in one big network — one broadcast domain. Everyone hears everyone's broadcasts, and you can't separate departments for security or performance. You <i>could</i> buy a separate switch per department, but that's wasteful. <b>VLANs (Virtual LANs)</b> let one physical switch act as several independent switches, each its own broadcast domain, configured in software.</p>
<h3>What a VLAN actually is</h3>
<p>A VLAN is a logical grouping of ports that behave as one network. Ports in VLAN 10 can talk to each other; ports in VLAN 20 can talk to each other; but VLAN 10 and VLAN 20 <i>cannot</i> talk without a router — they're separate networks, exactly as if they were on different switches. By convention each VLAN maps to one IP subnet. The default VLAN is VLAN 1, and best practice is to avoid using it for real traffic.</p>
<h3>Configuring access VLANs</h3>
<p>An <b>access port</b> carries traffic for exactly one VLAN — it's how you connect an end device like a PC. Create the VLAN, then assign ports to it:</p>
<div class="cli"><span class="p">SW1(config)#</span> vlan 10<br><span class="p">SW1(config-vlan)#</span> name SALES<br><span class="p">SW1(config)#</span> interface range f0/1 - 12<br><span class="p">SW1(config-if-range)#</span> switchport mode access<br><span class="p">SW1(config-if-range)#</span> switchport access vlan 10</div>
<p><code>switchport mode access</code> fixes the port as an access port (no auto-negotiation games), and <code>switchport access vlan 10</code> places it in VLAN 10.</p>
<h3>Verifying</h3>
<p><code>show vlan brief</code> lists every VLAN and which access ports belong to it. If you assign a port to a VLAN that doesn't exist yet, the port shows as "(Inactive)" — a classic gotcha, fixed by simply creating the VLAN.</p>
<h3>VLAN ranges and the gotcha that defines them</h3>
<p>Normal VLANs are 1–1005; extended are 1006–4094. VLANs 1 and 1002–1005 are reserved and can't be deleted. The single most important conceptual point: <b>traffic between VLANs always requires a Layer 3 device</b> (a router or L3 switch) — even when both VLANs live on the very same switch. VLANs separate at Layer 2; only routing reunites them. Hold that thought; it drives the next two lessons.</p>`,
17:`<p>VLANs on one switch are useful, but real networks span many switches. This lesson teaches how VLANs travel between switches over a single link — trunking — which is essential and frequently tested.</p>
<h3>The problem trunking solves</h3>
<p>Suppose VLANs 10 and 20 exist on two switches, and you connect the switches with one cable. How does the receiving switch know whether an arriving frame belongs to VLAN 10 or VLAN 20? An ordinary access link can only carry one VLAN. The answer is a <b>trunk</b> — a link that carries <i>multiple</i> VLANs by tagging each frame with its VLAN number.</p>
<h3>802.1Q tagging</h3>
<p>The standard tagging method is <b>IEEE 802.1Q</b>. As a frame enters the trunk, the switch inserts a small 4-byte tag containing the VLAN ID; the far switch reads the tag, learns which VLAN the frame belongs to, strips the tag, and delivers it correctly. This tagging is what lets one physical link serve as many logical VLAN paths.</p>
<h3>The native VLAN</h3>
<p>One VLAN on a trunk is special — the <b>native VLAN</b> — and its frames cross <i>untagged</i>. By default it's VLAN 1. The critical rule: the native VLAN must <b>match on both ends</b> of the trunk, or frames leak between VLANs and you get errors. Best practice is to set the native VLAN to an unused VLAN on both sides.</p>
<h3>Configuring a trunk</h3>
<div class="cli"><span class="p">SW1(config-if)#</span> switchport mode trunk<br><span class="p">SW1(config-if)#</span> switchport trunk native vlan 999<br><span class="p">SW1(config-if)#</span> switchport trunk allowed vlan 10,20</div>
<p>(On older switches you first set <code>switchport trunk encapsulation dot1q</code>.) The <code>allowed vlan</code> list controls which VLANs may cross — a security and tidiness measure.</p>
<h3>The outage-by-typo every engineer learns once</h3>
<p>Watch this carefully: <code>switchport trunk allowed vlan 30</code> <i>replaces</i> the entire allowed list with just VLAN 30 — instantly cutting off every other VLAN. To <i>add</i> a VLAN without disturbing the rest, you must use <code>switchport trunk allowed vlan add 30</code>. This exact mistake is a favorite exam scenario ("after this command, users in VLANs 10 and 20 lost connectivity — why?"). Verify your trunks with <code>show interfaces trunk</code>.</p>`,
18:`<p>You know VLANs can't talk without Layer 3. This lesson teaches the two ways to provide that routing: router-on-a-stick and switched virtual interfaces. Both are common exam topics.</p>
<h3>Method 1: router-on-a-stick</h3>
<p>The older approach uses one router connected to the switch by a single <b>trunk</b> link. Since one physical interface must serve multiple VLANs, you divide it into <b>subinterfaces</b> — one per VLAN — each tagged for its VLAN and given that VLAN's gateway IP address:</p>
<div class="cli"><span class="p">R1(config)#</span> interface g0/0.10<br><span class="p">R1(config-subif)#</span> encapsulation dot1q 10<br><span class="p">R1(config-subif)#</span> ip address 10.0.10.1 255.255.255.0<br><span class="p">R1(config)#</span> interface g0/0.20<br><span class="p">R1(config-subif)#</span> encapsulation dot1q 20<br><span class="p">R1(config-subif)#</span> ip address 10.0.20.1 255.255.255.0</div>
<p>The physical interface itself gets no IP — the subinterfaces do. Each VLAN's hosts use the matching subinterface IP as their default gateway. The name comes from the single "stick" of a trunk doing all the routing. Its drawback: all inter-VLAN traffic squeezes through one link.</p>
<h3>Method 2: SVIs on a multilayer switch</h3>
<p>The modern approach routes inside a Layer 3 switch — no external router, much faster. You create a <b>switched virtual interface (SVI)</b> for each VLAN, which acts as that VLAN's gateway:</p>
<div class="cli"><span class="p">SW1(config)#</span> ip routing<br><span class="p">SW1(config)#</span> interface vlan 10<br><span class="p">SW1(config-if)#</span> ip address 10.0.10.1 255.255.255.0<br><span class="p">SW1(config-if)#</span> no shutdown</div>
<p><code>ip routing</code> must be enabled first, or the switch won't route at all.</p>
<h3>When an SVI is actually up</h3>
<p>An SVI only comes up if three things are true: the VLAN exists, at least one access or trunk port carrying that VLAN is up, and the SVI isn't shut down. "SVI shows up/down" troubleshooting is a common simlet — usually the VLAN has no active ports.</p>
<h3>The trap both methods share</h3>
<p>Even with perfect gateway configuration, if a host's <i>default gateway setting</i> points to the wrong address, that host can't reach other VLANs. Always verify the host's gateway matches the subinterface or SVI IP — a correct router with wrong host settings still fails.</p>`,
19:`<p>Two protocols automate parts of switch configuration: DTP for trunk negotiation and VTP for VLAN database sharing. Both are double-edged — convenient but with real risks the exam wants you to understand.</p>
<h3>DTP — automatic trunk negotiation</h3>
<p><b>Dynamic Trunking Protocol</b> lets two switches negotiate whether a link becomes a trunk automatically. The modes: <b>dynamic auto</b> (passive — will trunk only if the other side asks) and <b>dynamic desirable</b> (active — actively asks to trunk). Two auto ports stay an access link; anything paired with desirable becomes a trunk.</p>
<p>The security problem: DTP negotiation can be abused by an attacker to negotiate a trunk and gain access to all VLANs (VLAN hopping). <b>Best practice is to hardcode every port</b> as access or trunk and add <code>switchport nonegotiate</code> to switch DTP off entirely.</p>
<h3>VTP — sharing the VLAN database</h3>
<p><b>VLAN Trunking Protocol</b> replicates VLAN definitions across switches in a shared domain, so you create a VLAN once and it propagates. Three modes: <b>server</b> (can create/modify/delete VLANs), <b>client</b> (receives updates only), <b>transparent</b> (ignores VTP for its own database but forwards messages along).</p>
<h3>The infamous VTP danger</h3>
<p>VTP tracks a <b>configuration revision number</b> — higher means newer. Here's the trap: if you connect a switch that happens to have a <i>higher revision number</i> (perhaps an old switch from another deployment), it can <b>overwrite every switch's VLAN database</b> with its own — potentially wiping out all your VLANs and causing a massive outage. Because of this, many organizations run VTP in transparent mode or use the safer VTPv3.</p>
<h3>The distinction to remember</h3>
<p>VTP synchronizes <i>VLAN definitions</i> — it does <b>not</b> sync which ports belong to which VLAN (that's still per-switch), and in v1/v2 it doesn't handle extended-range VLANs. Knowing exactly what VTP does and doesn't carry is the testable point.</p>`,
20:`<p>This is one of the most important Layer 2 topics. Spanning Tree Protocol prevents network-killing loops, and understanding it deeply pays off across many exam questions.</p>
<h3>Why loops are catastrophic at Layer 2</h3>
<p>Networks need redundant links for reliability — but redundant links create loops, and Layer 2 has no defense against them. Unlike IP packets, Ethernet frames have <b>no TTL</b> to expire. A broadcast frame hitting a loop circulates forever, multiplying at each switch, until it saturates the network — a <b>broadcast storm</b> that brings everything down in seconds. Loops also corrupt MAC tables as the same source appears on multiple ports. <b>STP</b> exists to allow redundant links physically while preventing loops logically.</p>
<h3>How STP prevents loops</h3>
<p>STP's strategy: build a loop-free tree by selectively <b>blocking</b> certain ports. Redundant links stay physically connected (ready as backups) but are logically blocked so traffic has exactly one path between any two points. If an active link fails, STP unblocks a backup.</p>
<h3>Electing the root bridge</h3>
<p>First, switches elect one <b>root bridge</b> as the reference point of the tree. The election uses the <b>bridge ID</b> = priority (default 32768) + MAC address. <b>Lowest bridge ID wins</b> — so equal priorities fall to the lowest MAC. You should control this deliberately rather than let MAC addresses decide: <code>spanning-tree vlan 10 root primary</code> (or set priority to 24576) makes your chosen switch root.</p>
<h3>Choosing ports</h3>
<p>Once the root is known, every other switch picks its single best path to the root — that port becomes its <b>root port</b> (chosen by lowest cumulative path cost to the root, with tiebreakers). Each network segment elects one <b>designated port</b> (the one forwarding onto that segment). Every remaining redundant port is put into <b>blocking</b>. Path costs are speed-based: 10 Mbps = 100, 100 Mbps = 19, 1 Gbps = 4, 10 Gbps = 2.</p>
<h3>The fact to anchor</h3>
<p>All ports on the root bridge are designated (forwarding) — the root never blocks. If a question depicts the root bridge with a blocked port, re-read it, because that contradicts how STP works.</p>`,
21:`<p>Day 20 covered STP's logic; this lesson covers its timing and the features that make it production-ready. Convergence time and the PortFast/BPDU Guard pairing are core exam material.</p>
<h3>STP port states and timers</h3>
<p>In classic 802.1D, a port doesn't jump straight to forwarding — it transitions through states to ensure no loop forms: <b>blocking → listening → learning → forwarding</b>. The timers: hello 2 seconds, forward delay 15 seconds, max age 20 seconds. A port becoming active spends 15 seconds listening and 15 learning — so <b>up to ~30–50 seconds</b> before it forwards traffic. That delay is significant and is precisely what later improvements address.</p>
<h3>The problem with end-device ports</h3>
<p>For a port connected to a PC, that 30-second delay is pure pain — the PC boots, tries DHCP, and times out while STP slowly transitions the port. But a PC port can't create a loop (a PC won't forward frames between links), so the cautious transition is unnecessary there.</p>
<h3>PortFast</h3>
<p><b>PortFast</b> solves this: it tells an access port to skip listening and learning and go straight to forwarding. Apply it only to ports facing end devices, never switch-to-switch links:</p>
<div class="cli"><span class="p">SW1(config-if)#</span> spanning-tree portfast<br><span class="p">SW1(config-if)#</span> spanning-tree bpduguard enable</div>
<h3>BPDU Guard — PortFast's safety partner</h3>
<p>PortFast trusts that nothing loop-creating is plugged into that port. <b>BPDU Guard</b> enforces that trust: if the port ever receives a BPDU (meaning someone plugged in a switch where a PC should be), it immediately <b>err-disables</b> the port, shutting it down to protect the network. These two features belong together — PortFast for speed, BPDU Guard for safety.</p>
<h3>Recovering an err-disabled port</h3>
<p>Once err-disabled, a port stays down until you fix the cause and bounce it (<code>shutdown</code> then <code>no shutdown</code>), or configure automatic recovery with <code>errdisable recovery cause bpduguard</code>. Other STP guards exist too: <b>root guard</b> prevents a port from becoming root (protecting your root bridge placement), and <b>loop guard</b> protects against unidirectional link failures.</p>`,
22:`<p>Classic STP's 30–50 second convergence is too slow for modern networks. Rapid Spanning Tree fixes that, and it's what Cisco switches actually run by default — so you need to know how it differs.</p>
<h3>Why RSTP exists</h3>
<p><b>Rapid Spanning Tree Protocol (802.1w)</b> does the same job as STP — loop prevention with redundancy — but converges in about <b>1 to 6 seconds</b> instead of up to 50. Given that networks reconverge whenever a link changes, this difference is enormous in practice. Cisco's default mode, <b>Rapid PVST+</b>, runs a separate rapid STP instance per VLAN.</p>
<h3>What changed: port roles</h3>
<p>RSTP keeps root and designated ports but adds two new roles that make backups instant: an <b>alternate port</b> is a pre-computed backup path to the root (it takes over immediately if the root port fails), and a <b>backup port</b> is a redundant connection to the same segment. Because the backups are already identified, failover doesn't require recomputing the tree from scratch.</p>
<h3>Simplified states</h3>
<p>RSTP collapses the old five states into three: <b>discarding, learning, forwarding</b>. Cleaner and faster.</p>
<h3>How it converges so fast</h3>
<p>Instead of waiting on timers, RSTP uses a <b>proposal/agreement handshake</b> directly between switches on point-to-point links — neighbors quickly agree on roles and move to forwarding without the 15-second waits. It also treats edge ports (the equivalent of PortFast) as immediately forwarding.</p>
<h3>Link types and compatibility</h3>
<p>RSTP classifies links as point-to-point (full-duplex switch-to-switch — fast handshake possible), shared (half-duplex, legacy), or edge (end devices). And helpfully, RSTP is <b>backward compatible</b>: if it detects an old 802.1D switch on a link, that port falls back to legacy timer-based behavior. So mixed environments still work, just without the speed on the legacy segments.</p>`,
23:`<p>The final Layer 2 lesson teaches how to use multiple links between switches for both speed and redundancy — without STP blocking them. EtherChannel is elegant and regularly tested.</p>
<h3>The problem</h3>
<p>You connect two switches with two cables for redundancy and bandwidth. But STP sees a loop and <b>blocks one of them</b> — so you get redundancy but not the extra bandwidth, and the blocked link sits idle. Wasteful.</p>
<h3>The solution: bundle them</h3>
<p><b>EtherChannel</b> combines up to <b>8 physical links into one logical link</b>. STP sees the bundle as a single interface, so it doesn't block anything — all the links forward, the bandwidth adds up, and if one link fails the others keep going seamlessly. Best of both worlds.</p>
<h3>The negotiation protocols</h3>
<p>Three ways to form a bundle: <b>LACP</b> (IEEE 802.3ad, the standard — modes active and passive), <b>PAgP</b> (Cisco proprietary — modes desirable and auto), or static <b>on</b> (no negotiation, forced). The combinations that actually form a channel: LACP active+active or active+passive; PAgP desirable+desirable or desirable+auto. Two passive (LACP) or two auto (PAgP) ends never form — somebody has to actively ask.</p>
<div class="cli"><span class="p">SW1(config)#</span> interface range g0/1 - 2<br><span class="p">SW1(config-if-range)#</span> channel-group 1 mode active<br><span class="p">SW1(config)#</span> interface port-channel 1<br><span class="p">SW1(config-if)#</span> switchport mode trunk</div>
<p>You configure the bundle once via the logical <b>port-channel</b> interface, and settings apply to all members.</p>
<h3>The consistency requirement</h3>
<p>Every link in a bundle must match in speed, duplex, and switchport configuration (access/trunk, VLANs). A port that doesn't match gets suspended from the bundle. Verify with <code>show etherchannel summary</code> — look for the <b>SU</b> flag (S = Layer 2, U = in use). Load balancing across the links is per-flow (hashed on MAC or IP), not per-packet, so a single conversation rides one link but many conversations spread across all of them.</p>`,
24:`<p>Now we return to routing and go beyond hand-typed static routes. Dynamic routing protocols let routers learn networks automatically and adapt to failures — the foundation OSPF builds on.</p>
<h3>Why dynamic routing</h3>
<p>Static routes work for small networks, but imagine a hundred routers — you'd configure thousands of routes by hand, and every link failure would require manual fixes. <b>Dynamic routing protocols</b> let routers <i>talk to each other</i>, share what networks they know, and automatically recompute paths when something changes. You configure them once; they adapt.</p>
<h3>IGPs vs EGPs</h3>
<p>Protocols split by scope: <b>Interior Gateway Protocols (IGPs)</b> route <i>within</i> one organization (OSPF, EIGRP, RIP), while the <b>Exterior Gateway Protocol</b> — BGP — routes <i>between</i> organizations and runs the internet. The CCNA focuses on IGPs, especially OSPF.</p>
<h3>Two families: distance vector and link state</h3>
<p><b>Distance vector</b> protocols (RIP, EIGRP) route "by rumor" — they tell neighbors their own routing conclusions ("I can reach network X in 3 hops"), and neighbors trust and build on that without seeing the whole map. <b>Link state</b> protocols (OSPF) work differently: every router floods information about its own links to all others, so <i>every</i> router builds an identical, complete map of the network and independently calculates best paths. Link state is more complex but more robust and faster to converge.</p>
<h3>Administrative distance: trusting sources</h3>
<p>A router might learn the same network from multiple sources. <b>Administrative distance (AD)</b> ranks how trustworthy each source is — lower is more trusted. Memorize these: connected 0, static 1, eBGP 20, EIGRP 90, OSPF 110, RIP 120, iBGP 200. So if both OSPF and RIP offer a route to the same network, OSPF (110) wins over RIP (120).</p>
<h3>Metric: choosing within a protocol</h3>
<p>Once AD picks the protocol, the <b>metric</b> picks the best path among that protocol's options — RIP uses hop count, OSPF uses cost (based on bandwidth), EIGRP uses bandwidth and delay. The order is always: longest prefix match first, then AD, then metric.</p>
<h3>The crucial subtlety</h3>
<p>AD and metric only compare routes to the <i>same</i> prefix. A more specific route (longer prefix) always wins regardless of AD — a /25 from RIP beats a /24 from OSPF for an address inside the /25, because longest-prefix-match is evaluated first.</p>`,
25:`<p>Before OSPF, meet two distance-vector protocols. RIP is simple and mostly historical; EIGRP is Cisco's sophisticated take. The exam wants the concepts more than deep configuration.</p>
<h3>RIP — the simple ancestor</h3>
<p><b>Routing Information Protocol</b> uses the simplest possible metric: <b>hop count</b>, the number of routers to the destination. Its limit is <b>15 hops</b> (16 means unreachable), which caps it to small networks. It has AD 120 and broadcasts/multicasts its entire table every 30 seconds. RIPv2 config uses classful network statements and usually needs <code>no auto-summary</code>. You'll rarely deploy RIP today, but it illustrates distance-vector behavior cleanly.</p>
<h3>EIGRP — Cisco's advanced distance vector</h3>
<p><b>Enhanced Interior Gateway Routing Protocol</b> is far more capable. It uses a metric based on <b>bandwidth and delay</b> (not just hops), has a low AD of 90, and converges quickly. It's sometimes called a hybrid because it has link-state-like features while remaining distance vector at heart.</p>
<h3>EIGRP's clever backup mechanism</h3>
<p>EIGRP's signature feature is instant failover via precomputed backups. For each destination it identifies a <b>successor</b> (the best route) and may identify a <b>feasible successor</b> (a pre-validated backup that's guaranteed loop-free). The backup qualifies via the <b>feasibility condition</b>: a neighbor's reported distance to the destination must be less than the router's own best distance. When the primary fails, EIGRP installs the feasible successor <i>immediately</i> — no recalculation needed.</p>
<h3>Configuration notes</h3>
<p>EIGRP uses wildcard masks in its network statements and requires a matching <b>autonomous system number</b> between neighbors: <code>router eigrp 100</code> then <code>network 10.1.1.0 0.0.0.255</code>. It's also the only IGP that natively supports <b>unequal-cost load balancing</b> (via the <code>variance</code> command) — spreading traffic across paths of differing metrics.</p>
<h3>Exam framing</h3>
<p>Know the metrics (RIP hops, EIGRP bandwidth+delay), the ADs (120 and 90), and EIGRP's successor/feasible-successor concept. Deep EIGRP configuration is lighter on the current blueprint than OSPF, which is next and gets the real depth.</p>`,
26:`<p>OSPF is the most important routing protocol on the exam, taught over three lessons. This first one covers how it works and basic configuration. Take it slowly — the concepts here recur constantly.</p>
<h3>How OSPF thinks</h3>
<p><b>Open Shortest Path First</b> is a link-state protocol. Each router describes its own links in <b>Link-State Advertisements (LSAs)</b> and floods them to all other routers. Every router collects these into an identical <b>Link-State Database (LSDB)</b> — a complete map of the network — then independently runs the <b>SPF (Dijkstra) algorithm</b> to compute the shortest path to every destination. Because everyone has the same map, routing is consistent and loop-free, and it converges quickly. OSPF's AD is 110.</p>
<h3>The cost metric</h3>
<p>OSPF's metric is <b>cost</b>, calculated as a reference bandwidth divided by the interface bandwidth. The default reference is 100 Mbps, which causes a problem: every interface at 100 Mbps <i>or faster</i> computes to cost 1, so OSPF can't distinguish Fast Ethernet from 10-Gigabit. The fix is to raise the reference bandwidth consistently on all routers: <code>auto-cost reference-bandwidth 100000</code> (making it 100 Gbps). Lower total cost wins.</p>
<h3>Basic configuration</h3>
<div class="cli"><span class="p">R1(config)#</span> router ospf 1<br><span class="p">R1(config-router)#</span> router-id 1.1.1.1<br><span class="p">R1(config-router)#</span> network 10.0.0.0 0.0.0.255 area 0<br><span class="p">R1(config-router)#</span> passive-interface g0/1</div>
<p>The process ID (1) is locally significant — it need not match other routers. The <code>network</code> statement with a wildcard mask enables OSPF on matching interfaces and places them in an area; alternatively configure per-interface with <code>ip ospf 1 area 0</code>. <b>Areas</b> organize large OSPF networks; the CCNA focuses on single-area (everything in area 0, the backbone).</p>
<h3>Passive interfaces</h3>
<p><code>passive-interface</code> tells OSPF to still advertise an interface's subnet but stop sending hello packets out of it — perfect for interfaces facing end-user LANs where there are no other routers to befriend. Never make a router-to-router link passive: it silently kills the adjacency, a classic trap.</p>
<h3>A gotcha</h3>
<p>If you set the router-id <i>after</i> OSPF is already running, it won't take effect until you reset the process with <code>clear ip ospf process</code> (or reload). Setting explicit router IDs from the start makes every later show command readable.</p>`,
27:`<p>This lesson covers how OSPF routers form relationships and the special election that happens on Ethernet networks. Neighbor states and DR/BDR are heavily tested.</p>
<h3>Becoming neighbors</h3>
<p>OSPF routers discover each other with <b>hello packets</b> and progress through a series of <b>neighbor states</b> as they synchronize databases: <b>Down → Init → 2-Way → ExStart → Exchange → Loading → Full</b>. "Full" means the databases are fully synchronized — the healthy end state. Understanding this ladder helps you diagnose stuck adjacencies.</p>
<h3>The 2-Way state is normal (sometimes)</h3>
<p>On a shared Ethernet segment with several routers, not every pair fully synchronizes — that would be wasteful. Instead, routers settle at <b>2-Way</b> with most neighbors and go <b>Full</b> only with two special routers (below). So seeing 2-Way between two non-special routers isn't a fault — it's by design.</p>
<h3>The DR/BDR election</h3>
<p>On a multiaccess network (like Ethernet) with multiple routers, having everyone fully adjacent with everyone else creates too many relationships and too much LSA flooding. OSPF solves this by electing a <b>Designated Router (DR)</b> and <b>Backup Designated Router (BDR)</b>. All other routers form full adjacencies only with the DR and BDR, which centralize the flooding. The DR distributes LSAs to everyone, with the BDR ready to take over.</p>
<h3>How the election works</h3>
<p>The DR is chosen by <b>highest interface priority</b> (default 1; priority 0 means "never DR"), with <b>highest router ID</b> as the tiebreaker. Crucially, the election does <b>not preempt</b>: once a DR is elected, a router with a better priority joining later does <i>not</i> take over — the roles persist until the adjacencies reset. This non-preemption surprises people and is a common exam point.</p>
<h3>Network types</h3>
<p>OSPF behaves differently by network type. <b>Broadcast</b> (Ethernet) elects a DR/BDR with 10-second hellos. <b>Point-to-point</b> (a direct router-to-router link) has no DR election and uses 10-second hellos. On a router-to-router Ethernet link, you can skip the pointless DR election with <code>ip ospf network point-to-point</code>.</p>
<h3>A diagnostic clue</h3>
<p>If two routers get stuck in ExStart/Exchange and never reach Full, the textbook cause is an <b>MTU mismatch</b> between the interfaces — they can't agree on database-description packet sizes. Recognizing that symptom is a guaranteed-feeling exam question.</p>`,
28:`<p>The final OSPF lesson covers what must match for routers to become neighbors, and the commands to verify and troubleshoot. This is where OSPF questions are won or lost.</p>
<h3>The adjacency requirements</h3>
<p>For two OSPF routers to form a neighbor relationship, several things must match on the shared link: the <b>area ID</b>, the <b>subnet</b> (they must be in the same IP subnet), the <b>hello and dead timers</b>, the <b>authentication</b> settings, the <b>stub area flags</b>, and the <b>MTU</b>. Additionally, their <b>router IDs must be unique</b> (different from each other). If any of the matching items differs, no adjacency forms. Note what does <i>not</i> need to match: the process ID and interface priorities.</p>
<h3>Timers</h3>
<p>On broadcast and point-to-point links, the default hello interval is 10 seconds and the dead interval is 40 seconds (four times the hello). If one side's timers are changed without the other, the adjacency breaks — and it's visible in the interface details.</p>
<h3>The verification toolkit</h3>
<p>Four commands solve most OSPF problems:</p>
<ul><li><code>show ip ospf neighbor</code> — lists neighbors and their states. FULL is healthy; missing neighbors point to a mismatch.</li>
<li><code>show ip ospf interface brief</code> — shows which interfaces run OSPF, their area, cost, and DR/BDR state.</li>
<li><code>show ip protocols</code> — reveals the router ID, the networks advertised, and which interfaces are passive. This is your first stop when neighbors won't form.</li>
<li><code>show ip route ospf</code> — the OSPF-learned routes actually installed.</li></ul>
<h3>Reading the route codes</h3>
<p>In the routing table, <b>O</b> marks an intra-area OSPF route, <b>O IA</b> an inter-area route, and <b>O E1/E2</b> external routes (redistributed from outside OSPF, such as a default route injected with <code>default-information originate</code>). Recognizing these codes tells you instantly how a route was learned.</p>
<h3>The most common silent failure</h3>
<p>A frequent trap: a <code>passive-interface</code> mistakenly applied to a router-to-router link. Everything else looks perfect, but no hellos are sent on that link so no neighbor forms. When an adjacency won't come up and the config looks right, check <code>show ip protocols</code> for an unexpected passive interface first.</p>`,
29:`<p>This lesson teaches how to give hosts a default gateway that survives router failure. First-hop redundancy is a practical, real-world topic that's reliably on the exam.</p>
<h3>The problem with a single gateway</h3>
<p>Hosts are configured with one default gateway IP. If that router fails, every host loses its path off the local network — even if a second, perfectly good router sits right there, because the hosts only know the one gateway address. Reconfiguring every host isn't feasible. <b>First-Hop Redundancy Protocols (FHRPs)</b> solve this by presenting a single <i>virtual</i> gateway that multiple routers can back.</p>
<h3>How FHRPs work</h3>
<p>Two or more routers share a <b>virtual IP address</b> (and virtual MAC). Hosts use that virtual IP as their gateway. One router is active and actually forwards; if it fails, a standby router takes over the virtual IP and MAC <b>transparently</b> — the hosts notice nothing, because the gateway address they know never changed.</p>
<h3>The three protocols</h3>
<ul><li><b>HSRP</b> (Cisco) — active/standby. One router forwards, one waits. Virtual MAC 0000.0c07.acXX.</li>
<li><b>VRRP</b> (open standard) — master/backup; functionally similar to HSRP but vendor-neutral.</li>
<li><b>GLBP</b> (Cisco) — load balances across multiple routers simultaneously, not just active/standby.</li></ul>
<h3>Election and the preemption gotcha</h3>
<p>The active/master router is chosen by <b>highest priority</b> (default 100), with highest IP as tiebreaker. The catch: <b>HSRP preemption is OFF by default</b> — meaning if a higher-priority router recovers after a failure, it will <i>not</i> automatically reclaim the active role unless you've configured <code>standby 1 preempt</code>. (VRRP, by contrast, preempts by default.) This default difference is a favorite exam detail.</p>
<div class="cli"><span class="p">R1(config-if)#</span> standby 1 ip 10.0.0.254<br><span class="p">R1(config-if)#</span> standby 1 priority 110<br><span class="p">R1(config-if)#</span> standby 1 preempt</div>
<h3>The scenario to recognize</h3>
<p>If you briefly see both routers acting active ("active/active"), suspect mismatched group numbers or virtual IPs between the two — they're not actually talking to each other as one FHRP group.</p>`,
30:`<p>We covered IP at Layer 3; now we examine the Transport layer that rides on top. TCP and UDP are how applications actually move data, and the distinction is fundamental and frequently tested.</p>
<h3>The transport layer's job</h3>
<p>IP gets packets from host to host, but it doesn't care about reliability or which application the data belongs to. The <b>transport layer</b> adds that: it identifies applications via <b>port numbers</b> and chooses between reliable or fast delivery via TCP or UDP.</p>
<h3>TCP — reliable and connection-oriented</h3>
<p><b>Transmission Control Protocol</b> guarantees delivery. It first establishes a connection with the <b>three-way handshake</b>: SYN → SYN-ACK → ACK. Then it numbers every segment (so the receiver can reorder them), acknowledges what arrived, and <b>retransmits</b> anything lost. It also does <b>flow control</b> with a sliding <b>window</b> — the receiver advertises how much it can accept, and the window grows until loss occurs, then backs off. All this reliability costs overhead and a little speed, but for things like web pages, email, and file transfers where every byte must arrive correctly, it's essential.</p>
<h3>UDP — fast and connectionless</h3>
<p><b>User Datagram Protocol</b> is the opposite: no handshake, no sequencing, no retransmission — just a tiny 8-byte header and fire-and-forget delivery. It's unreliable by design, which makes it <i>faster</i> with less overhead. That's exactly right for real-time voice and video (where a retransmitted packet would arrive too late to use, so it's better to skip it) and for simple protocols that handle their own reliability.</p>
<h3>Ports identify applications</h3>
<p>Both use port numbers to direct traffic to the right application. Well-known ports run 0–1023, registered 1024–49151, and ephemeral (client-side, temporary) 49152–65535. A full conversation is identified by four things: source IP/port and destination IP/port.</p>
<h3>The port numbers to memorize</h3>
<p>This is pure memorization the exam rewards: FTP 20/21, SSH 22, Telnet 23, SMTP 25, DNS 53, DHCP 67/68, TFTP 69, HTTP 80, POP3 110, NTP 123, SNMP 161/162, HTTPS 443, Syslog 514. One subtlety worth holding: <b>DNS uses UDP 53 for normal queries but TCP 53 for zone transfers</b> and large responses — so "both" is often the correct answer for DNS.</p>`,
31:`<p>IPv6 is a major part of the modern exam. This first lesson covers why it exists and how to read, write, and configure addresses. Don't let the long addresses intimidate you — the rules are mechanical.</p>
<h3>Why IPv6</h3>
<p>IPv4's 32 bits provide about 4.3 billion addresses — long ago exhausted given the explosion of devices. NAT stretched IPv4's life, but the real fix is <b>IPv6</b>, with <b>128 bits</b> providing a practically unlimited supply. IPv6 also simplifies the header and removes the need for NAT.</p>
<h3>Reading IPv6 addresses</h3>
<p>An IPv6 address is eight groups of four hex digits separated by colons: 2001:0db8:0000:0000:0000:0000:0000:0001. Two abbreviation rules make this manageable: (1) drop <b>leading zeros</b> in each group (0db8 → db8, 0000 → 0); (2) replace <b>one</b> consecutive run of all-zero groups with a double colon <b>::</b> — but only once, since using it twice would be ambiguous. So the address above becomes <b>2001:db8::1</b>.</p>
<h3>Address structure</h3>
<p>The standard split is a /48 site prefix, then a /64 per subnet — meaning the last 64 bits are the <b>interface ID</b> identifying the specific device. This /64 convention is nearly universal in IPv6.</p>
<h3>Configuration</h3>
<div class="cli"><span class="p">R1(config)#</span> ipv6 unicast-routing<br><span class="p">R1(config-if)#</span> ipv6 address 2001:db8:0:1::1/64</div>
<p>The first command is critical and easy to forget: <b><code>ipv6 unicast-routing</code> must be enabled before a router will forward any IPv6 traffic</b> at all. Without it, the router can hold IPv6 addresses and source its own traffic but won't route between IPv6 networks — a classic trick question.</p>
<h3>What's gone and what's simpler</h3>
<p>IPv6 has <b>no broadcast</b> — multicast and anycast handle those roles instead. Its header is streamlined compared to IPv4: no header checksum, and routers don't fragment packets. These simplifications make IPv6 forwarding more efficient. The next lesson covers the address <i>types</i> and how hosts get addresses automatically.</p>`,
32:`<p>This lesson covers the different kinds of IPv6 addresses and the clever ways hosts can configure themselves. These mechanisms differ meaningfully from IPv4, so they're well-tested.</p>
<h3>The address types</h3>
<ul><li><b>Global unicast</b> (2000::/3) — public, internet-routable, like a public IPv4 address.</li>
<li><b>Unique local</b> (FC00::/7, in practice starting FD) — private, like RFC 1918 space.</li>
<li><b>Link-local</b> (FE80::/10) — automatically configured on <i>every</i> IPv6 interface, valid only on the local link, and <b>never routed</b>. Used for neighbor communication and as routing-protocol next hops.</li>
<li><b>Multicast</b> (FF00::/8) — one-to-many. Key ones: FF02::1 (all nodes), FF02::2 (all routers).</li>
<li><b>Anycast</b> — the same address on multiple devices; routing delivers to the nearest.</li></ul>
<h3>EUI-64: building an interface ID from the MAC</h3>
<p>A device can generate its 64-bit interface ID automatically from its 48-bit MAC address using <b>EUI-64</b>: split the MAC in half, insert <b>FFFE</b> in the middle, and <b>flip the 7th bit</b> of the first byte. The exam likes to give a MAC and ask for the resulting EUI-64 address, so practice the bit-flip by hand. Configure it with <code>ipv6 address 2001:db8:0:1::/64 eui-64</code>.</p>
<h3>SLAAC: addressing without a server</h3>
<p>IPv6 hosts can configure their own global address with no DHCP server at all, using <b>Stateless Address Autoconfiguration (SLAAC)</b>. The host listens for a <b>Router Advertisement</b> announcing the network prefix, then combines that prefix with a self-generated interface ID (via EUI-64 or randomization). This is a fundamental shift from IPv4, where addressing nearly always needs DHCP or manual config.</p>
<h3>Why these matter together</h3>
<p>Link-local addresses being automatic and unroutable, multicast replacing broadcast, and SLAAC enabling serverless addressing are the conceptual departures from IPv4 that the exam probes. Knowing which prefix maps to which type — and being able to do an EUI-64 conversion on paper — covers most IPv6 addressing questions.</p>`,
33:`<p>The final IPv6 lesson covers how devices find each other (replacing ARP) and how IPv6 routing is configured. This rounds out IPv6 to exam-readiness.</p>
<h3>NDP — the replacement for ARP</h3>
<p>IPv6 has no ARP. Instead, <b>Neighbor Discovery Protocol (NDP)</b>, built on ICMPv6, handles address resolution and more. To find a neighbor's link-layer address, a host sends a <b>Neighbor Solicitation (NS)</b> to a special solicited-node multicast address, and the target replies with a <b>Neighbor Advertisement (NA)</b>. Separately, <b>Router Solicitation (RS)</b> and <b>Router Advertisement (RA)</b> messages let hosts discover routers and learn prefixes (the basis of SLAAC). View the neighbor cache — the IPv6 equivalent of the ARP table — with <code>show ipv6 neighbors</code>.</p>
<h3>IPv6 static routing</h3>
<p>It mirrors IPv4. A normal static route: <code>ipv6 route 2001:db8:2::/64 2001:db8:12::2</code>. A default route: <code>ipv6 route ::/0 2001:db8::1</code>. One important difference: when the next hop is a <b>link-local address</b> (which exists identically on every link), you <b>must also specify the exit interface</b>, because the link-local address alone is ambiguous: <code>ipv6 route 2001:db8:2::/64 g0/0 FE80::2</code>.</p>
<h3>Dual stack</h3>
<p>The standard migration strategy is <b>dual stack</b> — running IPv4 and IPv6 simultaneously on the same interfaces. Devices use whichever is appropriate for a given destination, allowing a gradual transition without flag-day cutover.</p>
<h3>The detail that surprises people</h3>
<p>In IPv6, a host's <b>default gateway is a link-local address</b> — the RA that tells a host where the router is comes from the router's link-local (FE80) address, not its global one. So seeing a link-local gateway is correct, not broken. That, plus remembering the exit-interface requirement for link-local next hops, covers the IPv6 routing questions you'll face.</p>`

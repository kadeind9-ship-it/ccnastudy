34:`<p>Access control lists are how routers filter traffic, and they appear all over the exam — both as a security tool and in troubleshooting. This lesson teaches standard ACLs from the ground up.</p>
<h3>What an ACL does</h3>
<p>An <b>access control list</b> is an ordered list of permit/deny rules that a router checks traffic against. It's the basic firewall built into every router: you define what's allowed and what's blocked, apply the list to an interface in a direction, and the router enforces it on every packet.</p>
<h3>Standard ACLs: source only</h3>
<p><b>Standard ACLs</b> (numbered 1–99) match on the <b>source IP address only</b> — they can't look at destination, protocol, or port. Because they're so blunt, the placement rule is to put them <b>close to the destination</b>; placing them near the source would block the traffic from reaching <i>any</i> destination, not just the intended one.</p>
<h3>Wildcard masks</h3>
<p>ACLs match addresses using <b>wildcard masks</b>, which are the <i>inverse</i> of subnet masks: a 0 bit means "must match exactly," a 1 bit means "don't care." So /24 (255.255.255.0) becomes wildcard 0.0.0.255. To match a single host, use 0.0.0.0 (or the keyword <code>host</code>); to match everything, use the keyword <code>any</code>.</p>
<div class="cli"><span class="p">R1(config)#</span> access-list 10 deny 10.1.1.0 0.0.0.255<br><span class="p">R1(config)#</span> access-list 10 permit any<br><span class="p">R1(config-if)#</span> ip access-group 10 out</div>
<h3>The two rules that catch everyone</h3>
<p>First: ACLs are processed <b>top-down, first match wins</b> — order matters enormously. Second, and most important: <b>every ACL ends with an invisible "deny any."</b> So if your list contains only deny statements, it blocks <i>everything</i> — you must include an explicit permit for the traffic you want through. Forgetting the implicit deny is the number-one ACL mistake.</p>
<h3>Protecting device access</h3>
<p>Beyond filtering transit traffic, ACLs guard management access. Applied to the vty lines with <code>access-class 10 in</code>, an ACL restricts which source addresses may SSH to the device. One ACL applies per interface, per direction, per protocol.</p>`,
35:`<p>Extended ACLs are far more powerful than standard ones — and more common in real use. This lesson builds on Day 34 to teach precise traffic filtering.</p>
<h3>What extended ACLs add</h3>
<p><b>Extended ACLs</b> (numbered 100–199, or named) match on much more than source: <b>protocol, source address, destination address, and port numbers</b>. This precision lets you write rules like "block web traffic from this subnet to that server while allowing everything else" — impossible with a standard ACL.</p>
<h3>The rigid syntax order</h3>
<p>Extended ACL statements follow a fixed structure: <code>permit|deny PROTOCOL SOURCE [port] DESTINATION [port]</code>. Source always comes before destination — getting this order wrong is a frequent error.</p>
<div class="cli"><span class="p">R1(config)#</span> ip access-list extended BLOCK-WEB<br><span class="p">R1(config-ext-nacl)#</span> deny tcp 10.1.1.0 0.0.0.255 host 203.0.113.10 eq 80<br><span class="p">R1(config-ext-nacl)#</span> deny tcp 10.1.1.0 0.0.0.255 host 203.0.113.10 eq 443<br><span class="p">R1(config-ext-nacl)#</span> permit ip any any</div>
<h3>Placement: opposite of standard</h3>
<p>Because extended ACLs can match exactly what you want to block, the rule is to place them <b>close to the source</b> — stop unwanted traffic early, before it consumes network resources crossing the network only to be dropped at the far end.</p>
<h3>Named ACLs and editing</h3>
<p>Named ACLs (used above) are easier to manage than numbered ones because you can edit individual lines by sequence number. <code>show access-lists</code> reveals the sequence numbers; you can delete one line with <code>no 20</code> or insert a new line at a specific position. Useful operators in entries include <code>eq</code> (equals), <code>gt</code>, <code>lt</code>, <code>neq</code>, and <code>range</code>.</p>
<h3>The subtle direction trap</h3>
<p>When matching <i>return</i> traffic, think about which side is the source. To block a web server's <i>responses</i>, the port (eq 80) goes with the <i>server's address as the source</i>, because the server sources traffic from port 80. Reasoning about which device originates a given flow — and therefore where the port number belongs — is exactly what the harder ACL questions test.</p>`,
36:`<p>Two discovery protocols help you map and document a network: CDP and LLDP. They're simple but genuinely useful, and the exam likes them for troubleshooting scenarios.</p>
<h3>What discovery protocols do</h3>
<p>When you're handed an undocumented network, discovery protocols are gold — they tell each device about its directly connected neighbors: hostnames, the ports connecting them, device types, IP addresses, and software versions. This lets you map topology from the CLI alone.</p>
<h3>CDP — Cisco's protocol</h3>
<p><b>Cisco Discovery Protocol</b> is proprietary and <b>enabled by default</b> on Cisco gear. It advertises every 60 seconds with a 180-second holdtime. The key command is <code>show cdp neighbors</code>, which lists local interface, neighbor device ID, capability, platform, and the neighbor's port. Adding <code>detail</code> (<code>show cdp neighbors detail</code>) also reveals neighbor IP addresses and IOS versions — invaluable for building a topology map in an exam simlet.</p>
<h3>LLDP — the open standard</h3>
<p><b>Link Layer Discovery Protocol</b> (IEEE 802.1AB) does the same job but is vendor-neutral, so it works in mixed environments with non-Cisco gear. It's usually <b>off by default</b> on Cisco devices — enable it globally with <code>lldp run</code>, then per-interface transmit/receive as needed. Timers are 30 seconds advertise / 120 seconds hold.</p>
<h3>The security angle</h3>
<p>These protocols leak device information, which is helpful internally but risky toward untrusted connections. Disable per-interface with <code>no cdp enable</code>, or globally with <code>no cdp run</code> — particularly on ports facing outside your control.</p>
<h3>The classic exam trap</h3>
<p>Reading the neighbors table backwards. "Local Interface" is <i>your</i> port; "Port ID" is the <i>neighbor's</i> port. Questions deliberately swap these to see if you're paying attention. When mapping a topology from CDP output, always be clear about which side each column describes.</p>`,
37:`<p>This begins the IP services block. NTP keeps device clocks synchronized — unglamorous but foundational, because so much else (logs, certificates, troubleshooting) depends on accurate time.</p>
<h3>Why synchronized time matters</h3>
<p>Imagine investigating an outage across ten devices whose clocks are all minutes apart — correlating the log timestamps becomes guesswork. Accurate, synchronized time makes logs line up, lets certificates validate correctly, and keeps scheduled events consistent. <b>Network Time Protocol (NTP)</b>, over UDP 123, provides this synchronization.</p>
<h3>How NTP organizes accuracy: stratum</h3>
<p>NTP uses a hierarchy measured in <b>stratum</b> — the distance from an authoritative reference clock. Stratum 0 is a reference source like an atomic clock or GPS; stratum 1 is a server directly attached to one; each step away increments the number. <b>Lower stratum means more accurate</b>, and a stratum of 16 means "unsynchronized" (no usable time source).</p>
<h3>Configuration</h3>
<div class="cli"><span class="p">R1(config)#</span> ntp server 10.1.1.100<br><span class="p">R1(config)#</span> ntp master 3</div>
<p>The first points the device at an NTP server; the second can make the device itself a server at a given stratum. A device can be both client (syncing upward) and server (serving downward) simultaneously. Verify with <code>show ntp associations</code> and <code>show ntp status</code>.</p>
<h3>The behavior to expect</h3>
<p>NTP synchronization isn't instant — it can take several minutes for a device to lock onto a source after configuration. So a device showing "not yet synchronized" right after setup is normal, not broken. Time zones are set separately with <code>clock timezone</code>. NTP authentication exists for security but must be configured on both sides to work.</p>`,
38:`<p>DNS translates the names humans use into the IP addresses machines need. Everyone relies on it constantly, and the exam covers both how it works and how routers participate.</p>
<h3>The problem DNS solves</h3>
<p>People remember names (example.com); networks route by IP addresses. <b>Domain Name System (DNS)</b> bridges that gap, resolving names to addresses so you can type a name instead of memorizing numbers. Without DNS, the usable internet wouldn't exist.</p>
<h3>How resolution works</h3>
<p>When you request a name, your device queries a DNS server, which returns the corresponding IP (or refers the query onward through the DNS hierarchy). Queries use <b>UDP port 53</b>; larger transfers and zone transfers between servers use <b>TCP port 53</b>. Results are cached so repeat lookups are instant.</p>
<h3>Record types</h3>
<p>DNS holds several record types: <b>A</b> (name to IPv4), <b>AAAA</b> (name to IPv6), <b>CNAME</b> (an alias pointing to another name), <b>MX</b> (mail server), and <b>NS</b> (the authoritative name server for a domain). Knowing A and AAAA especially is exam-relevant.</p>
<h3>Routers and DNS</h3>
<p>A router can act as a DNS <b>client</b> (<code>ip name-server 8.8.8.8</code> plus <code>ip domain-lookup</code>, which is on by default) and can hold static name mappings (<code>ip host SW1 10.1.1.2</code>).</p>
<h3>The lab gotcha worth understanding</h3>
<p>Here's a subtle one: with <code>ip domain-lookup</code> enabled (the default), if you mistype a command, the router assumes the typo is a hostname and tries to <i>DNS-resolve it</i> — hanging your terminal for many seconds while it times out. This is exactly why experienced engineers run <code>no ip domain-lookup</code> in labs. Understanding the <i>why</i> behind that habit is more valuable than just knowing the command.</p>`,
39:`<p>DHCP automatically assigns IP addressing to hosts — one of the most essential services in any network. The process and the relay concept are both well-tested.</p>
<h3>What DHCP does</h3>
<p>Manually configuring an IP, mask, gateway, and DNS server on every device would be unmanageable. <b>Dynamic Host Configuration Protocol</b> automates it: a device boots, asks for addressing, and a DHCP server leases it everything it needs.</p>
<h3>The DORA exchange</h3>
<p>The four-step process spells <b>DORA</b>: the client broadcasts a <b>Discover</b> ("any DHCP servers out there?"); a server responds with an <b>Offer</b> (proposed address); the client broadcasts a <b>Request</b> accepting that specific offer; the server confirms with an <b>Acknowledgment</b>. The client now holds a lease for a set time and will renew it before expiry. Memorize DORA in order — it's a guaranteed question.</p>
<h3>Configuring a DHCP pool on a router</h3>
<div class="cli"><span class="p">R1(config)#</span> ip dhcp excluded-address 10.0.0.1 10.0.0.10<br><span class="p">R1(config)#</span> ip dhcp pool LAN<br><span class="p">R1(dhcp-config)#</span> network 10.0.0.0 255.255.255.0<br><span class="p">R1(dhcp-config)#</span> default-router 10.0.0.1<br><span class="p">R1(dhcp-config)#</span> dns-server 8.8.8.8</div>
<p>Exclude addresses you've assigned statically (like the gateway) so DHCP doesn't hand them out.</p>
<h3>Crossing subnets: the relay</h3>
<p>Here's the catch: DHCP Discover messages are <b>broadcasts</b>, and routers don't forward broadcasts — so a client can't reach a DHCP server on a different subnet. The fix is the <b>DHCP relay</b>: put <code>ip helper-address SERVER-IP</code> on the router interface <i>facing the clients</i>, and the router converts the client's broadcast into a unicast aimed at the remote server. The most common mistake is putting the helper-address on the wrong interface — it goes on the client-facing side, pointing at the server.</p>
<h3>Verification</h3>
<p><code>show ip dhcp binding</code> lists current leases. If you're troubleshooting "clients get no address" across subnets, check for a missing or misplaced helper-address first.</p>`,
40:`<p>SNMP lets you monitor and manage devices from a central system. It's how network monitoring tools see device health, and the exam tests the components and versions.</p>
<h3>The components</h3>
<p><b>Simple Network Management Protocol</b> has three parts: the <b>manager</b> (the monitoring system, also called an NMS), the <b>agent</b> (software on each managed device), and the <b>MIB</b> (Management Information Base — the structured database of everything that can be queried, each item identified by an OID). The manager polls agents for data; agents can also alert the manager of events.</p>
<h3>How information flows</h3>
<p>Two directions. The manager <b>polls</b> an agent with Get requests (and can change settings with Set) on <b>UDP port 161</b>. Conversely, an agent can proactively notify the manager of an event using a <b>Trap</b> (fire-and-forget) or an <b>Inform</b> (acknowledged, and retransmitted if not acknowledged) on <b>UDP port 162</b>. The Trap-vs-Inform distinction — informs are reliable, traps aren't — is a common exam point.</p>
<h3>The versions and their security</h3>
<p>This is the most testable part. <b>v1 and v2c</b> authenticate using plaintext <b>community strings</b> (a read-only and a read-write string) — easily intercepted, so unsafe on untrusted networks. <b>v3</b> adds real <b>authentication and encryption</b> (auth and privacy modes), making it the only version appropriate where security matters.</p>
<div class="cli"><span class="p">R1(config)#</span> snmp-server community SECRET ro<br><span class="p">R1(config)#</span> snmp-server host 10.1.1.50 version 2c SECRET</div>
<h3>The takeaway</h3>
<p>Remember the ports (161 poll, 162 traps), that v3 is the secure version, and that informs are acknowledged while traps are not. That trio covers most SNMP questions.</p>`,
41:`<p>Syslog is how devices report what's happening — the logging system you'll rely on for troubleshooting. Understanding severity levels and where logs go is exam-essential.</p>
<h3>What syslog provides</h3>
<p>Devices constantly generate messages — an interface goes down, a config changes, an error occurs. <b>Syslog</b> is the standard for these log messages, letting you view them locally or ship them to a central <b>syslog server</b> (UDP 514) where logs from the whole network gather for analysis.</p>
<h3>The severity levels</h3>
<p>Every syslog message has a severity from <b>0 to 7</b>, and you must know them in order: <b>0 Emergency, 1 Alert, 2 Critical, 3 Error, 4 Warning, 5 Notice, 6 Informational, 7 Debugging</b>. A mnemonic: "Every Awesome Cisco Engineer Will Need Ice cream Daily." Crucially, <b>lower numbers are more severe</b>. The message format is timestamp, then %FACILITY-SEVERITY-MNEMONIC, then text — for example, %LINEPROTO-5-UPDOWN.</p>
<h3>Where logs go, and filtering by severity</h3>
<p>Logs can go to several destinations: the console (default), terminal lines (needs <code>logging monitor</code> plus <code>terminal monitor</code> for SSH sessions), an internal buffer (<code>logging buffered</code>), and a syslog server (<code>logging host 10.1.1.50</code>). You set a severity threshold with <code>logging trap warnings</code> (or <code>logging trap 4</code>) — and the important rule is this sends that level <b>and everything more severe</b>, so "warnings" means severities 0 through 4.</p>
<div class="cli"><span class="p">R1(config)#</span> logging host 10.1.1.50<br><span class="p">R1(config)#</span> logging trap warnings<br><span class="p">R1(config)#</span> service timestamps log datetime msec</div>
<h3>Tying it to NTP</h3>
<p>That last command timestamps logs — and combined with NTP-synchronized clocks (Day 37), it lets you correlate events across devices to the millisecond. This is why NTP and syslog are taught near each other: accurate logs need accurate time. One more practical tip: <code>logging synchronous</code> on console/vty lines stops log messages from interrupting your typing.</p>`,
42:`<p>SSH provides secure remote management — the right way to administer devices remotely. Setting it up involves several interlocking pieces the exam expects you to know precisely.</p>
<h3>Why SSH, not Telnet</h3>
<p>Both <b>Telnet</b> (TCP 23) and <b>SSH</b> (TCP 22) let you manage a device remotely, but Telnet sends everything — including passwords — in <b>plaintext</b>, readable by anyone capturing traffic. SSH encrypts the entire session. Telnet is essentially never the right answer on a security question; SSH (version 2 specifically) is the standard.</p>
<h3>The full setup recipe</h3>
<p>SSH requires several pieces, and they must all be present:</p>
<div class="cli"><span class="p">R1(config)#</span> hostname R1<br><span class="p">R1(config)#</span> ip domain-name lab.local<br><span class="p">R1(config)#</span> crypto key generate rsa modulus 2048<br><span class="p">R1(config)#</span> username admin privilege 15 secret StrongPass1<br><span class="p">R1(config)#</span> ip ssh version 2<br><span class="p">R1(config)#</span> line vty 0 15<br><span class="p">R1(config-line)#</span> transport input ssh<br><span class="p">R1(config-line)#</span> login local</div>
<h3>Why the order matters</h3>
<p>The RSA key generation <i>requires</i> a hostname and domain name first, because the key is named from them — that's why those two commands come before <code>crypto key generate rsa</code>. The modulus should be at least 768 for SSHv2; use 2048 for real security. A local username is needed because <code>login local</code> tells the vty lines to authenticate against local accounts.</p>
<h3>The line that locks it down</h3>
<p><code>transport input ssh</code> on the vty lines is what permits SSH and <b>blocks Telnet</b>. If an exam simlet says "after hardening, Telnet stopped working," this command is why — and that's the intended, correct behavior. You can further restrict <i>which</i> source addresses may connect by applying an ACL with <code>access-class</code> to the vty lines.</p>`,
43:`<p>This lesson covers transferring files to and from devices — for backing up configs and upgrading IOS images. FTP and TFTP are simple but appear in operational questions.</p>
<h3>The two protocols</h3>
<p><b>FTP</b> (File Transfer Protocol) uses TCP, is authenticated (username/password), and is reliable, using two channels — control on port 21 and data on port 20. <b>TFTP</b> (Trivial File Transfer Protocol) is the lightweight cousin: it runs over UDP port 69, has <i>no</i> authentication, and is dead simple — perfect for quick transfers inside a trusted LAN, like pulling an IOS image onto a router.</p>
<h3>Backing up and restoring configs</h3>
<p>You move files with the <code>copy</code> command, naming source and destination. To back up the running config to a TFTP server: <code>copy running-config tftp:</code>. To restore: <code>copy tftp: running-config</code>. This is basic operational hygiene — always have a config backup before major changes.</p>
<h3>Upgrading IOS</h3>
<p>The image upgrade flow is a logical sequence worth understanding: first check you have room with <code>show flash:</code>; copy the new image down with <code>copy tftp: flash:</code>; verify its integrity with <code>verify /md5 flash:image.bin</code>; tell the router to boot the new image with <code>boot system flash:image.bin</code>; save the config; reload; then confirm with <code>show version</code> that the new image is running.</p>
<h3>The order gotcha</h3>
<p>Two things trip people up. The <code>boot system</code> commands are tried in the order they're configured — so their sequence matters if you list several. And you must <b>save the configuration before reloading</b>, or the router boots without your boot-system instruction and may load the old image. Methodical ordering is the whole skill here.</p>`,
44:`<p>NAT lets private networks share public IP addresses — the technology that kept IPv4 alive. This first NAT lesson covers the concept, terminology, and static NAT.</p>
<h3>Why NAT exists</h3>
<p>There aren't enough public IPv4 addresses for every device. The solution: an organization uses <b>private addresses</b> (RFC 1918) internally, and <b>Network Address Translation</b> rewrites those into public addresses as traffic leaves for the internet — letting many internal devices share a small pool of public addresses, or even a single one.</p>
<h3>The terminology (this is the testable part)</h3>
<p>Cisco's NAT vocabulary confuses everyone at first, so anchor it: <b>inside local</b> is the private address of an inside host as seen <i>inside</i> the network; <b>inside global</b> is the public address that represents that host to the <i>outside</i> world; <b>outside global</b> is the address of an external host as seen publicly. The simple memory hook: "local" = private/inside view, "global" = public view.</p>
<h3>Static NAT: permanent one-to-one</h3>
<p><b>Static NAT</b> maps one private address to one public address permanently — what you use to <b>publish an internal server</b> so the outside world can reach it at a fixed public address:</p>
<div class="cli"><span class="p">R1(config)#</span> ip nat inside source static 10.0.0.10 203.0.113.10<br><span class="p">R1(config)#</span> interface g0/0<br><span class="p">R1(config-if)#</span> ip nat inside<br><span class="p">R1(config)#</span> interface g0/1<br><span class="p">R1(config-if)#</span> ip nat outside</div>
<h3>The step everyone forgets</h3>
<p>Defining the translation is only half the job — you must also mark the interfaces as <code>ip nat inside</code> (facing the private network) and <code>ip nat outside</code> (facing the public side). Without these interface roles, NAT does nothing. Verify translations with <code>show ip nat translations</code>. The next lesson covers dynamic NAT and PAT, which is what most networks actually run.</p>`,
45:`<p>This lesson completes NAT with dynamic NAT and PAT — the form used by virtually every home and office network to share one public address among many devices.</p>
<h3>Dynamic NAT</h3>
<p><b>Dynamic NAT</b> uses a <b>pool</b> of public addresses handed out on a first-come, first-served basis. When an inside host needs to go out, it borrows a public address from the pool; when done, the address returns to the pool. The limitation is obvious: if the pool has 10 addresses and an 11th host wants out, it's stuck until one frees up. Because of this, pure dynamic NAT is rarely deployed — but it's tested conceptually.</p>
<h3>PAT — the one everyone actually uses</h3>
<p><b>Port Address Translation</b> (also called NAT overload) is the real-world workhorse. It lets <b>many</b> private hosts share a <b>single</b> public IP by distinguishing their connections via <b>source port numbers</b>. Your home router does exactly this — every device in your house shares one public address, and the router tracks which internal conversation owns which port. This is how thousands of hosts can hide behind one IP.</p>
<div class="cli"><span class="p">R1(config)#</span> access-list 1 permit 10.0.0.0 0.0.0.255<br><span class="p">R1(config)#</span> ip nat inside source list 1 interface g0/1 overload</div>
<h3>The keyword that defines PAT</h3>
<p>That word <b><code>overload</code></b> at the end is the entire difference between dynamic NAT and PAT in a configuration. When you see a NAT question, scan for "overload" — its presence means PAT (port-based sharing of one address); its absence means a one-to-one pool. The ACL (here, list 1) defines <i>which</i> inside hosts get translated — "permit" here means "translate," not "allow traffic."</p>
<h3>Verifying</h3>
<p><code>show ip nat translations</code> shows the active mappings — under PAT you'll see many entries sharing one inside-global address but with different port numbers, which is the visual signature of port-based translation.</p>`,
46:`<p>This lesson introduces quality of service through the lens of voice traffic, plus the voice VLAN. Voice is fragile and demanding, which makes it the perfect way to understand why QoS exists.</p>
<h3>Why voice is special</h3>
<p>Voice over IP traffic is small, constant, and extremely sensitive to delay. The targets to remember: <b>one-way latency under 150 ms, jitter under 30 ms, loss under 1%</b>. Miss these and calls sound choppy or robotic. Data traffic tolerates delay; voice does not — which is the whole reason quality of service exists.</p>
<h3>The voice VLAN</h3>
<p>Cisco IP phones contain a small three-port switch: the phone plugs into the wall, and a PC daisy-chains through the phone. To keep voice and data traffic separate (for QoS and security), the switch port uses a <b>voice VLAN</b> for the phone alongside the regular access VLAN for the PC:</p>
<div class="cli"><span class="p">SW1(config-if)#</span> switchport mode access<br><span class="p">SW1(config-if)#</span> switchport access vlan 10<br><span class="p">SW1(config-if)#</span> switchport voice vlan 20</div>
<p>The phone's traffic rides VLAN 20 (tagged), the PC's stays on VLAN 10 (untagged). Note this port is still an access port carrying two VLANs — it is <i>not</i> a trunk, a distinction the exam tests.</p>
<h3>Powering the phones: PoE</h3>
<p>Phones (and APs and cameras) can draw power over the network cable via <b>Power over Ethernet</b>. The standards by wattage: 802.3af = 15.4 W, 802.3at (PoE+) = 30 W, 802.3bt = 60–100 W. The switch detects a powered device and negotiates how much power to supply; <code>show power inline</code> shows the budget and draw.</p>
<h3>Where marking begins</h3>
<p>QoS starts with marking traffic by priority, and the phone marks its own voice traffic as high priority. The switch port becomes the <b>trust boundary</b> — the point where the network decides to trust (or re-mark) those priority values. That sets up the full QoS toolkit in the next lesson.</p>`,
47:`<p>This lesson rounds out quality of service — how the network prioritizes important traffic when links get congested. The tools and the order they're applied are the testable content.</p>
<h3>The QoS pipeline</h3>
<p>QoS works in a logical sequence: <b>classify</b> traffic (identify what it is), <b>mark</b> it (tag its priority), then <b>queue</b> and manage it during congestion. You can't prioritize what you haven't identified, so classification and marking come first.</p>
<h3>Marking: CoS and DSCP</h3>
<p>Traffic is tagged at two layers. <b>CoS (Class of Service)</b> is a 3-bit marking inside the 802.1Q tag — Layer 2, only present on trunked frames. <b>DSCP</b> is a 6-bit marking in the IP header — Layer 3, end-to-end. Standard values: voice is marked <b>EF (Expedited Forwarding, DSCP 46)</b>; best-effort traffic is 0. Because DSCP lives in the IP header, it survives across the whole path, which is why it's the primary marking.</p>
<h3>Queuing: giving voice priority</h3>
<p>When a link is congested, queuing decides what goes first. <b>Low Latency Queuing (LLQ)</b> gives voice a strict <b>priority queue</b> — it's always serviced first so voice never waits — but it's policed so voice can't completely starve other traffic.</p>
<h3>Policing vs shaping — the classic comparison</h3>
<p>Two ways to handle traffic exceeding a rate, and the exam loves contrasting them: <b>policing</b> <i>drops or re-marks</i> the excess (a hard ceiling, no added delay), while <b>shaping</b> <i>buffers and delays</i> the excess to smooth it out (no drops, but added latency). A one-line memory: police drops, shape delays. You typically police inbound at a provider edge and shape outbound to match a carrier's rate.</p>
<h3>Congestion avoidance</h3>
<p>Left alone, a full queue does "tail drop" — dropping everything that arrives once full, which causes all TCP senders to back off at once (global synchronization) and wastes capacity. <b>WRED</b> (Weighted Random Early Detection) drops select packets <i>early</i> to signal senders to slow gradually, avoiding the synchronized stampede. That's the conceptual payoff of the whole QoS topic.</p>`,
48:`<p>This begins the security block with the foundational concepts and the threat landscape. It's vocabulary-heavy, but the terms recur throughout the security domain.</p>
<h3>The CIA triad</h3>
<p>All security goals reduce to three: <b>Confidentiality</b> (only authorized parties can read data — achieved with encryption and access control), <b>Integrity</b> (data isn't tampered with — verified by hashing), and <b>Availability</b> (systems stay up and reachable — protected by redundancy and DoS defenses). Every control you'll study serves one of these three. When a question asks what property a measure protects, map it to CIA.</p>
<h3>The vocabulary of risk</h3>
<p>Precise terms: a <b>vulnerability</b> is a weakness; an <b>exploit</b> is the technique that weaponizes it; a <b>threat</b> is the potential for someone to use it; <b>mitigation</b> is what reduces the risk. Questions test whether you can distinguish these.</p>
<h3>The attack catalog</h3>
<p>Know the major attack types: <b>DoS/DDoS</b> (overwhelming a target, including TCP SYN floods), <b>spoofing</b> (faking a source address), <b>reflection/amplification</b> (bouncing traffic off third parties to flood a victim), <b>man-in-the-middle</b> (intercepting traffic, often via ARP poisoning), <b>reconnaissance</b> (scanning before attacking), and <b>password attacks</b> (brute force, dictionary).</p>
<h3>Social engineering — attacking people</h3>
<p>The most effective attacks target humans, not systems. Know the flavors precisely because the exam tests the distinctions: <b>phishing</b> (mass deceptive email), <b>spear phishing</b> (targeted at specific people), <b>whaling</b> (targeting executives specifically), <b>vishing</b> (voice/phone), <b>smishing</b> (SMS), <b>watering hole</b> (compromising a site the target visits), and <b>tailgating</b> (physically following someone through a secure door).</p>
<h3>Defenses</h3>
<p>Core defenses: strong password policies plus <b>multi-factor authentication</b> (combining something you know, have, and are), user training against social engineering, and <b>AAA</b> (authentication, authorization, accounting) implemented via RADIUS or TACACS+. These set up the hands-on security features in the next three lessons.</p>`,
49:`<p>Port security is the first hands-on Layer 2 protection — controlling which devices may use a switch port. It's practical and frequently tested, including its specific violation behaviors.</p>
<h3>What port security does</h3>
<p><b>Port security</b> limits which MAC addresses, and how many, may use a given switch port. This stops two things: a <b>MAC flooding</b> attack (where an attacker floods the switch with fake MACs to overflow its table and force it to behave like a hub, leaking traffic for sniffing), and casual unauthorized device swaps.</p>
<h3>Configuration</h3>
<div class="cli"><span class="p">SW1(config-if)#</span> switchport mode access<br><span class="p">SW1(config-if)#</span> switchport port-security<br><span class="p">SW1(config-if)#</span> switchport port-security maximum 2<br><span class="p">SW1(config-if)#</span> switchport port-security mac-address sticky<br><span class="p">SW1(config-if)#</span> switchport port-security violation restrict</div>
<p>You must set the port to access (or trunk) mode first — port security refuses to configure on a dynamically negotiating port, which is itself a tested gotcha. <b>Sticky</b> learning dynamically learns the connected MACs and writes them into the running config (save to keep them).</p>
<h3>The three violation modes (memorize these)</h3>
<ul><li><b>shutdown</b> (the default) — err-disables the port entirely; nothing works until you intervene.</li>
<li><b>restrict</b> — drops the offending traffic, logs it, and increments a violation counter, but keeps the port up for valid devices.</li>
<li><b>protect</b> — silently drops offending traffic, no logging or counter.</li></ul>
<h3>Recovering from a violation</h3>
<p>When a shutdown-mode port err-disables, fix the cause then bounce it (<code>shutdown</code> then <code>no shutdown</code>), or configure automatic recovery with <code>errdisable recovery cause psecure-violation</code>. Verify everything with <code>show port-security interface</code>, which shows the mode, the violation count, and the learned addresses. Knowing exactly what each violation mode does is the core exam content here.</p>`,
50:`<p>DHCP snooping protects against rogue DHCP servers — a common and damaging attack. This lesson explains the threat and the defense, including the configuration gotchas.</p>
<h3>The threat</h3>
<p>If an attacker (or a misconfigured device) runs a rogue DHCP server, it can answer clients faster than the real server, handing out a bad gateway address — routing victims' traffic through the attacker (a man-in-the-middle setup) or simply breaking connectivity. Clients have no way to tell a fake DHCP server from a real one. <b>DHCP snooping</b> fixes this at the switch.</p>
<h3>How it works</h3>
<p>DHCP snooping classifies ports as <b>trusted</b> or <b>untrusted</b>. Ports toward legitimate DHCP servers and uplinks are trusted; ports toward clients are untrusted (the default). The switch then <b>drops DHCP server messages</b> (Offers and Acks) that arrive on untrusted ports — because a real server should never be on a client-facing port. Rogue servers are silenced.</p>
<div class="cli"><span class="p">SW1(config)#</span> ip dhcp snooping<br><span class="p">SW1(config)#</span> ip dhcp snooping vlan 10<br><span class="p">SW1(config)#</span> interface g0/1<br><span class="p">SW1(config-if)#</span> ip dhcp snooping trust</div>
<h3>Two gotchas the exam loves</h3>
<p>First: you must enable snooping <b>both globally and per-VLAN</b> — doing only one does nothing. Second, a subtle one: by default the switch inserts <b>option 82</b> (DHCP relay information) into snooped packets, and a server that isn't expecting it will <i>reject</i> the requests — so in non-relay setups clients mysteriously get no leases until you add <code>no ip dhcp snooping information option</code>.</p>
<h3>The bonus it provides</h3>
<p>DHCP snooping also builds a <b>binding table</b> mapping each client's MAC, IP, port, and VLAN. This table is valuable on its own — and it's the foundation that Dynamic ARP Inspection (next lesson) depends on.</p>`,
51:`<p>Dynamic ARP Inspection stops ARP poisoning, completing the Layer 2 security trio. It builds directly on DHCP snooping, so the dependency is the key concept.</p>
<h3>The threat: ARP poisoning</h3>
<p>Recall ARP has no authentication — a device simply trusts ARP replies. An attacker exploits this by sending <b>forged ARP replies</b> claiming to be the default gateway, so victims send their traffic to the attacker instead (a man-in-the-middle attack). <b>Dynamic ARP Inspection (DAI)</b> defeats this.</p>
<h3>How DAI works</h3>
<p>On untrusted ports, DAI <b>intercepts every ARP reply and validates it</b> against the DHCP snooping binding table — the table of legitimate IP-to-MAC mappings built in the previous lesson. If an ARP reply claims a mapping that doesn't match the binding table, it's a forgery, and DAI drops it. Trusted ports (uplinks, switch-to-switch) skip the check.</p>
<div class="cli"><span class="p">SW1(config)#</span> ip arp inspection vlan 10<br><span class="p">SW1(config)#</span> interface g0/1<br><span class="p">SW1(config-if)#</span> ip arp inspection trust</div>
<h3>The dependency that defines DAI</h3>
<p>Because DAI validates against the DHCP snooping binding table, <b>DHCP snooping must be running first</b>. This is the central exam point: DAI without snooping has nothing to validate against. For hosts with <i>static</i> IP addresses (which have no DHCP binding), you must manually create an <b>ARP ACL</b> to permit them — otherwise DAI drops their legitimate ARP traffic. Recognizing "static-IP host fails after enabling DAI → needs an ARP ACL" is a classic scenario.</p>
<h3>The full stack together</h3>
<p>Port security, DHCP snooping, and DAI form a layered Layer 2 defense: port security controls who connects, snooping stops rogue servers, and DAI stops ARP forgery. They're taught together because they interlock — and the binding table is the thread connecting snooping and DAI.</p>`,
52:`<p>The architecture block zooms out to network design. This lesson covers how networks are structured at the campus and data-center scale — design patterns the exam expects you to recognize.</p>
<h3>Why hierarchical design</h3>
<p>Large networks built ad hoc become unmanageable. A <b>hierarchical model</b> organizes devices into layers with clear roles, making the network scalable, predictable, and easier to troubleshoot.</p>
<h3>The three-tier model</h3>
<p>The classic enterprise campus design has three layers: the <b>access layer</b> (where end devices connect — handles port security, PoE), the <b>distribution layer</b> (aggregates access switches, enforces policy, and is the Layer 2/Layer 3 boundary where SVIs typically live), and the <b>core layer</b> (high-speed backbone that just forwards traffic fast, with no policy to slow it down). Traffic flows up from access through distribution to core and back down.</p>
<h3>The two-tier model</h3>
<p>For smaller networks, the <b>two-tier (collapsed core)</b> design merges the distribution and core into one layer, leaving access plus a combined distribution/core. Most mid-sized campuses use this — it's cheaper and sufficient when you don't need a separate high-speed core.</p>
<h3>Spine-leaf for data centers</h3>
<p>Data centers have different traffic patterns (lots of server-to-server "east-west" traffic), so they use a <b>spine-leaf</b> design: every <b>leaf</b> switch connects to every <b>spine</b> switch, spines never connect to each other, and servers attach only to leaves. The payoff is predictable performance — any server is exactly two hops from any other. The rules to remember: leaf-to-every-spine, no spine-to-spine, hosts only on leaves. Any design showing spine-to-spine or host-to-spine links is wrong.</p>
<h3>Smaller scales</h3>
<p>At the smallest scale, a <b>SOHO</b> (small office/home office) network is often one device combining router, switch, access point, and firewall. And networks can be placed on-premises, in a colocation facility, or in the cloud — placement options the exam mentions.</p>`,
53:`<p>This lesson covers wide area networks — how sites connect across distance. It's more conceptual than configuration-heavy, focused on recognizing the technologies.</p>
<h3>What a WAN is</h3>
<p>A <b>LAN</b> covers one location; a <b>WAN</b> connects locations across distance, almost always using a service provider's infrastructure since you can't run your own cable between cities. The CCNA wants you to recognize the main WAN options and their tradeoffs.</p>
<h3>The connectivity options</h3>
<ul><li><b>Leased line</b> — a dedicated point-to-point circuit from a provider. Private and predictable, but expensive and slow to provision.</li>
<li><b>MPLS</b> — a provider's shared network using label switching; supports VPN services where the provider may even participate in your routing (L3VPN). Your router is the CE (customer edge); the provider's is the PE (provider edge).</li>
<li><b>Internet-based VPNs</b> — using the public internet with encryption (below). Cheap and flexible.</li></ul>
<h3>VPN types</h3>
<p>Several to distinguish: a <b>site-to-site IPsec VPN</b> connects two office gateways securely over the internet; <b>remote-access VPN</b> (TLS-based, like AnyConnect) connects individual users; <b>DMVPN</b> is a Cisco hub-and-spoke design that scales to many sites. A key technical point: <b>IPsec alone cannot carry multicast or routing protocols</b>, so when you need those through a tunnel, you use <b>GRE over IPsec</b> — GRE provides the flexible tunneling, IPsec provides the encryption. This pairing is a recurring exam question.</p>
<h3>Internet access methods</h3>
<p>Know the common last-mile options: DSL (over phone lines), cable (DOCSIS), fiber, and cellular/5G (often as backup). And redundancy patterns: <b>dual-homed</b> (two links to one ISP) versus <b>multihomed</b> (links to two different ISPs for provider-level redundancy).</p>`,
54:`<p>This lesson covers virtualization, containers, cloud, and VRF — the technologies behind modern data centers and cloud computing. Conceptual, but increasingly important on the blueprint.</p>
<h3>Virtual machines and hypervisors</h3>
<p>Instead of one operating system per physical server (wasteful), <b>virtualization</b> runs many virtual machines on one physical host. The <b>hypervisor</b> is the software that makes this possible. <b>Type 1</b> hypervisors run directly on the hardware ("bare metal" — ESXi, Hyper-V, used in data centers); <b>Type 2</b> run on top of a host operating system (VirtualBox, VMware Workstation — used on laptops for labs).</p>
<h3>Containers</h3>
<p><b>Containers</b> (Docker) take efficiency further: rather than each carrying a full operating system like a VM, they <b>share the host's kernel</b>, making them far smaller and faster to start — megabytes and milliseconds versus a VM's gigabytes and minutes. Kubernetes orchestrates them at scale. The exam tests the VM-vs-container distinction: VMs virtualize hardware; containers virtualize the OS.</p>
<h3>VRF</h3>
<p><b>Virtual Routing and Forwarding</b> is like VLANs for routing tables: one physical router holds <i>multiple independent routing tables</i>, keeping different customers' or departments' traffic completely separate on shared hardware — no extra routers needed.</p>
<h3>Cloud service models</h3>
<p>Three models defined by how much you manage: <b>IaaS</b> (Infrastructure as a Service — you manage the OS and up, provider handles hardware, e.g. AWS EC2), <b>PaaS</b> (Platform as a Service — you manage just your application, provider handles the OS and runtime), and <b>SaaS</b> (Software as a Service — you manage nothing, just use the software, e.g. webmail). The exam gives a scenario and asks which model; the key is identifying who manages what. Deployment models are public, private, hybrid, and community clouds.</p>
<h3>Why it's in the CCNA</h3>
<p>Networks increasingly connect to and run inside these environments, so understanding the building blocks — and benefits like elasticity and pay-as-you-go — is now core knowledge.</p>`,
55:`<p>The wireless block starts with fundamentals — how Wi-Fi actually works at the radio level. This underpins the architecture and security lessons that follow.</p>
<h3>Radio frequencies and channels</h3>
<p>Wi-Fi transmits over radio bands. The <b>2.4 GHz</b> band travels farther and penetrates walls better but is crowded (microwaves, Bluetooth interfere) and has only <b>three non-overlapping channels: 1, 6, and 11</b>. The <b>5 GHz</b> band is faster with many more non-overlapping channels but shorter range. <b>6 GHz</b> is the newest, added by Wi-Fi 6E. The channel rule matters for design: in 2.4 GHz you reuse 1, 6, and 11 across overlapping coverage areas — any other choice causes interference.</p>
<h3>The 802.11 standards</h3>
<p>The progression: 802.11b/g (2.4 GHz, older), 802.11a (5 GHz), <b>802.11n</b> (both bands, "Wi-Fi 4"), <b>802.11ac</b> (5 GHz, "Wi-Fi 5"), and <b>802.11ax</b> (both plus 6 GHz, "Wi-Fi 6/6E"). Newer standards are faster and handle more devices.</p>
<h3>Service sets</h3>
<p>How clients and APs group: a <b>BSS</b> is one AP and its clients (the AP's radio MAC is the <b>BSSID</b>); an <b>ESS</b> is multiple APs sharing one network name (SSID) so users can <b>roam</b> seamlessly between them; an <b>IBSS</b> is ad-hoc (devices directly, no AP); and <b>mesh</b> has APs backhauling to each other wirelessly.</p>
<h3>How wireless communication happens</h3>
<p>Unlike wired Ethernet, wireless is half-duplex (devices share the air and take turns) and uses collision <i>avoidance</i>. A client must <b>associate</b> with an AP before passing traffic, and the AP then bridges between the wireless and wired worlds. Coverage is shaped by physics — absorption, reflection, and interference all degrade signal, which is why site surveys matter.</p>
<h3>The design takeaway</h3>
<p>The most testable fundamental is the 2.4 GHz channel plan (1, 6, 11) — recognizing that overlapping channels like 1, 3, 5 cause adjacent-channel interference and are always the wrong design choice.</p>`,
56:`<p>This lesson covers how wireless networks are managed at scale — the shift from standalone access points to controller-based architectures. Practical and well-tested.</p>
<h3>The problem with standalone APs</h3>
<p>A single <b>autonomous AP</b> is self-contained — fine for a coffee shop. But configuring dozens or hundreds of them individually, managing roaming and channel assignments by hand, is unworkable. Large deployments need central management.</p>
<h3>The split-MAC architecture</h3>
<p>The solution is <b>lightweight APs</b> managed by a <b>Wireless LAN Controller (WLC)</b>. Responsibilities split: the AP handles only the real-time radio work, while the WLC centrally handles authentication, roaming decisions, RF/channel management, and policy. Configure the WLC once and it pushes consistent settings to every AP. This is called the <b>split-MAC</b> model.</p>
<h3>CAPWAP — the tunnel</h3>
<p>Lightweight APs communicate with the WLC over <b>CAPWAP</b> tunnels: control traffic on <b>UDP 5246</b> (encrypted) and data on <b>UDP 5247</b>. When an AP is on a different subnet from the WLC, it finds the controller via <b>DHCP option 43</b> or a DNS lookup; on the same subnet it can use broadcast.</p>
<h3>AP modes</h3>
<p>The most important mode beyond the default (local) is <b>FlexConnect</b>: it lets a lightweight AP <b>switch traffic locally</b> and keep working even if the WAN link to the WLC fails — the answer to any "branch office must keep Wi-Fi when the WAN drops" scenario. Other modes include monitor, sniffer, rogue detector, and bridge/mesh.</p>
<h3>Deployment options</h3>
<p>WLCs come in several forms: a central physical appliance, cloud-based, embedded in a switch, or running on an AP (Mobility Express). There's also fully <b>cloud-managed</b> wireless (Meraki-style dashboards). Knowing that FlexConnect provides WAN-survivability and that CAPWAP carries AP-to-WLC traffic covers most architecture questions.</p>`,
57:`<p>Wireless security is critical because radio signals travel beyond your walls. This lesson covers the authentication and encryption standards, with emphasis on the generations the exam tests.</p>
<h3>Two things security must do</h3>
<p>Wireless security handles <b>authentication</b> (proving who may join) and <b>encryption</b> (scrambling the data so eavesdroppers can't read it). The standards have evolved as older methods were broken.</p>
<h3>The encryption generations</h3>
<p>The progression, oldest to newest: <b>WEP</b> (thoroughly broken — never the right answer), <b>WPA</b> (used TKIP, a stopgap on old hardware), <b>WPA2</b> (uses strong <b>AES-CCMP</b> encryption — the long-time standard), and <b>WPA3</b> (the current best — adds the <b>SAE</b> handshake which resists offline password cracking, plus forward secrecy and protected management frames). The exam tests mapping the cipher to the generation: TKIP→WPA, AES/CCMP→WPA2, SAE/GCMP→WPA3.</p>
<h3>Personal vs Enterprise modes</h3>
<p>Each generation runs in two modes. <b>Personal</b> uses a single <b>pre-shared key</b> (the Wi-Fi password everyone shares) — simple, fine for homes and small offices. <b>Enterprise</b> uses <b>802.1X with a RADIUS server</b>, giving each user unique credentials and centralized control — the standard for organizations. So "WPA2-Enterprise" means AES encryption with per-user 802.1X authentication.</p>
<h3>Authentication methods</h3>
<p>Enterprise authentication uses 802.1X with EAP variants — PEAP, EAP-TLS (certificate-based, very secure), EAP-FAST — checked against RADIUS. WPA3 also introduced <b>OWE</b> ("enhanced open"), which encrypts open guest networks without requiring a password.</p>
<h3>The exam framing</h3>
<p>Questions present security combinations and ask which is strongest or weakest, or to match a cipher to its generation. WEP and WPA/TKIP are the "weak" answers; WPA3-SAE is the strong one. Personal = PSK, Enterprise = 802.1X/RADIUS. Get those mappings solid.</p>`,
58:`<p>The final wireless lesson is the practical one — configuring a WLAN on a controller. This ties the wireless block together with the actual deployment steps.</p>
<h3>The WLC's interfaces</h3>
<p>A controller has several interface types you configure: the <b>management interface</b> (handles CAPWAP and admin access), a <b>virtual interface</b> (used for client-facing functions like DHCP relay and web authentication), and <b>dynamic interfaces</b> — one per WLAN, mapping that wireless network to a specific VLAN. Understanding that each WLAN maps to a VLAN via a dynamic interface is the key structural concept.</p>
<h3>The deployment workflow</h3>
<p>Publishing a wireless network through a WLC follows a logical GUI sequence: first create the <b>dynamic interface</b> with its VLAN and IP; then go to WLANs and create a new one, giving it a profile name and the <b>SSID</b> (the network name users see); map it to the dynamic interface (placing clients in the right VLAN/subnet); then configure security on the Security tab — choose WPA2 or WPA3, and either a pre-shared key or 802.1X (for which you first add the RADIUS server under Security → AAA); finally enable the WLAN.</p>
<h3>Per-WLAN options</h3>
<p>Settings you can tune per WLAN include band steering (nudging dual-band clients to 5 GHz), session timeouts, client limits, and QoS profiles (the "platinum" profile is for voice). These let one controller serve very different networks — a secure corporate SSID and an open guest SSID — simultaneously.</p>
<h3>How the WLC connects upstream</h3>
<p>The WLC connects to the wired network via a <b>trunk</b>, because it carries traffic for all its dynamic interfaces' VLANs; multiple WLC ports can be bundled with LAG for redundancy and bandwidth.</p>
<h3>The common mistake</h3>
<p>Mapping a WLAN to the wrong dynamic interface puts clients in the wrong VLAN and subnet — the "clients connect but get the wrong IP address" scenario. Tracing the WLAN-to-interface-to-VLAN mapping is the troubleshooting skill this lesson builds.</p>`,
59:`<p>The automation block begins here. This lesson explains why network automation matters and the foundational concepts — planes and controllers — that everything else builds on.</p>
<h3>Why automate</h3>
<p>Configuring devices one at a time by hand doesn't scale, drifts out of consistency over time, and invites typos that cause outages. <b>Automation</b> brings consistency (every device configured identically), speed (change hundreds of devices at once), and auditability (changes are tracked and repeatable). This is the industry's direction, which is why it's now a meaningful chunk of the exam.</p>
<h3>The three planes (revisited precisely)</h3>
<p>Understanding automation requires clarity on a device's three functional planes: the <b>data plane</b> actually forwards traffic (frames and packets); the <b>control plane</b> makes the decisions that the data plane follows (routing protocols, ARP, spanning tree); and the <b>management plane</b> is how administrators access the device (SSH, SNMP, HTTPS). A common exam point: routing protocols and ARP are <i>control plane</i>, not management plane.</p>
<h3>Traditional vs controller-based networking</h3>
<p>In traditional networking, all three planes live on every individual device, each making its own independent decisions. In <b>controller-based</b> (software-defined) networking, the control-plane logic is <b>centralized on a controller</b> that has a complete view of the network and programs the devices' forwarding behavior. The controller becomes the single point of configuration and visibility.</p>
<h3>APIs: how the controller communicates</h3>
<p>Two directions: <b>northbound</b> APIs face upward toward applications and scripts (typically REST), letting software tell the controller what it wants; <b>southbound</b> APIs face downward toward the devices (NETCONF, RESTCONF, OpenFlow, SSH), letting the controller program them. Picture the controller in the middle: apps talk down to it via northbound, it talks down to devices via southbound.</p>
<h3>Where this is going</h3>
<p>These concepts — planes, centralization, and APIs — set up the data formats, REST, SDN, and tools in the remaining lessons. The throughline is moving from per-device manual CLI to programmatic, centralized control.</p>`,
60:`<p>Automation tools exchange data in structured formats. This lesson teaches the three you must recognize — JSON, XML, and YAML — and reading them is a directly testable skill.</p>
<h3>Why data formats matter</h3>
<p>When scripts, APIs, and tools exchange configuration or state, they need a structured, machine-readable format that's also human-readable. Three dominate networking, and the exam shows you snippets and asks what they mean or whether they're valid.</p>
<h3>JSON — the API standard</h3>
<p><b>JSON</b> (JavaScript Object Notation) is what REST APIs overwhelmingly use. Its building blocks: <b>objects</b> in curly braces with key-value pairs <code>{"key": "value"}</code>, and <b>arrays</b> in square brackets <code>[1, 2, 3]</code>. The rules that determine validity: keys and string values use <b>double quotes only</b>, pairs are separated by commas, and there are <b>no comments and no trailing commas</b>. Whitespace doesn't matter. You'll see nested JSON like <code>{"interfaces": [{"name": "g0/0", "up": true}]}</code> and need to read it fluently.</p>
<h3>XML — verbose and tag-based</h3>
<p><b>XML</b> uses opening and closing tags, like <code>&lt;name&gt;g0/0&lt;/name&gt;</code>. It's more verbose than JSON and is the format NETCONF uses. You mainly need to recognize it.</p>
<h3>YAML — human-friendly</h3>
<p><b>YAML</b> is designed for human readability: structure is defined by <b>indentation</b> (spaces, consistent) rather than brackets, lists use dashes, and comments start with #. It's the format Ansible playbooks are written in. Its readability is exactly why configuration-management tools favor it.</p>
<h3>The testable skill</h3>
<p>The exam most often asks you to spot <b>invalid JSON</b> — look for single quotes instead of double, unquoted keys, or a trailing comma, any of which makes a snippet wrong. You should also be able to look at a format and identify which it is (brackets and quotes = JSON, tags = XML, indentation and dashes = YAML). Practice reading nested structures; that's where the points are.</p>`,
61:`<p>REST APIs are how modern tools and controllers are programmed. This lesson teaches the REST model — the verbs, the responses, and authentication — at the level the exam expects.</p>
<h3>What REST is</h3>
<p>A <b>REST API</b> is a way for software to interact with a system over HTTP — the same protocol web browsers use. It's how a script tells a controller to make a change, or asks it for data. REST is <b>stateless</b>: every request carries everything needed to process it, and the server keeps no memory between requests.</p>
<h3>CRUD and the HTTP verbs</h3>
<p>The four basic operations (Create, Read, Update, Delete — "CRUD") map to HTTP verbs: <b>POST creates, GET reads, PUT/PATCH updates, DELETE deletes</b>. GET retrieves data without changing anything; the others modify. This mapping is a guaranteed exam question.</p>
<h3>Anatomy of a request</h3>
<p>A REST call has a verb, a URI identifying the resource (like https://controller/api/v1/devices), headers (including content type — usually application/json — and authentication), and sometimes a body carrying data. The server processes it and returns a response with data and a status code.</p>
<h3>Status codes</h3>
<p>The response code tells you what happened, grouped by first digit: <b>2xx = success</b> (200 OK, 201 Created, 204 No Content), <b>4xx = client error</b> (400 Bad Request, <b>401 Unauthorized/unauthenticated</b>, <b>403 Forbidden</b>, 404 Not Found), <b>5xx = server error</b> (500). The exam especially tests <b>401 vs 403</b>: 401 means authentication failed or is missing ("I don't know who you are"); 403 means you're authenticated but lack permission ("I know you, but you're not allowed").</p>
<h3>Authentication</h3>
<p>REST APIs authenticate via basic auth (username/password encoded — weak), API keys, or — most commonly for controllers like Cisco's — <b>token-based</b> auth: you log in once, receive a token, and present that token on subsequent requests. Understanding the stateless request model and the verb/status-code mappings covers the REST questions.</p>`,
62:`<p>This lesson covers software-defined networking and Cisco's implementation. It pulls together the automation concepts into the controller-based architecture you'll see referenced throughout modern networking.</p>
<h3>SDN recap and purpose</h3>
<p><b>Software-Defined Networking</b> centralizes the control plane onto a controller with a complete view of the network, while devices keep forwarding (data plane). This enables programmability, consistency, and centralized policy — instead of configuring each device, you tell the controller your <i>intent</i> and it figures out the device configs.</p>
<h3>Cisco SD-Access</h3>
<p>Cisco's campus SDN fabric, <b>SD-Access</b>, introduces three terms worth knowing: the <b>underlay</b> is the physical network of routed links whose only job is basic IP reachability between devices; the <b>overlay</b> is the virtual network of <b>VXLAN</b> tunnels that actually carries user traffic on top of the underlay; and the <b>fabric</b> is the two combined. User traffic rides the overlay; the underlay just provides the foundation. This underlay/overlay distinction is the most testable SD-Access concept.</p>
<h3>Cisco Catalyst (DNA) Center</h3>
<p><b>Catalyst Center</b> (formerly DNA Center) is the controller that runs intent-based networking. You declare what you want (intent), and it translates that into device configurations across the fabric. It also provides <b>assurance</b> — continuous telemetry, health scoring, and anomaly detection — which is where the AI/ML topics from the v1.1 blueprint connect.</p>
<h3>Intent-based vs traditional</h3>
<p>The contrast the exam draws: traditional networking is device-by-device CLI configuration with separate per-device monitoring; intent-based networking is "declare the outcome once, the controller renders and verifies it everywhere," with built-in assurance. It's a shift from configuring boxes to expressing goals.</p>
<h3>The API recap</h3>
<p>Tying back to Day 59: the controller exposes <b>northbound</b> REST APIs to applications and uses <b>southbound</b> protocols (NETCONF, RESTCONF) to program devices. Knowing underlay vs overlay, what Catalyst Center does, and the API directions covers SDN questions.</p>`,
63:`<p>The final lesson covers configuration-management tools and the AI topics new to the v1.1 blueprint — completing your CCNA knowledge.</p>
<h3>Configuration management tools</h3>
<p>These tools automate device and infrastructure configuration at scale. The two the current exam focuses on:</p>
<p><b>Ansible</b> is <b>agentless</b> (no software to install on managed devices — it connects over SSH), uses a <b>push</b> model (the control node pushes configurations out), and describes desired state in <b>YAML playbooks</b>. Its agentless simplicity made it popular. Remember the keyword cluster: agentless + push + SSH + YAML = Ansible.</p>
<p><b>Terraform</b> (added in v1.1, replacing the older Puppet/Chef coverage) is <b>declarative</b> infrastructure-as-code: you describe the end state in configuration files, providers translate that to specific platforms, and a <b>state file</b> tracks what currently exists versus what's desired, following a plan-then-apply workflow. Keyword cluster: declarative + providers + state file = Terraform.</p>
<h3>Ansible vs Terraform</h3>
<p>The distinction the exam wants: Ansible is configuration management (making existing devices match a desired config), while Terraform is provisioning (creating and destroying infrastructure). They're often used together — Terraform builds the infrastructure, Ansible configures what runs on it.</p>
<h3>AI in networking (the v1.1 additions)</h3>
<p>The newest topics distinguish two kinds of AI in network operations. <b>Predictive AI</b> (machine learning) analyzes telemetry to <i>forecast</i> problems and flag anomalies before they cause outages — the assurance use case. <b>Generative AI</b> <i>creates</i> new content: configuration snippets, summaries, troubleshooting suggestions. Know the distinction: predictive forecasts from data, generative produces new artifacts. The blueprint also expects awareness that AI outputs need human validation and that data quality drives result quality.</p>
<h3>You've reached the end</h3>
<p>That completes the CCNA topic map. From here it's consolidation: drill questions to find weak spots, run the labs until configuration is automatic, take timed exams until you consistently pass, and keep the subnetting and command reflexes sharp. The knowledge is all here — now it's repetition and practice that carry you to exam day.</p>`

// ---- forgiving matcher ----
function normCmd(s){return s.toLowerCase().replace(/\s+/g," ").trim();}
const VALUE_TOKEN=/^(<.*>|\d+|\d+\.\d+\.\d+\.\d+|255\.\d+\.\d+\.\d+|0\.0\.0\.\d+|[0-9a-f:]+\/\d+|[0-9a-f:]+)$/i;
function tokenIsValue(ans){return /^<.*>$/.test(ans);}
function looksLikeValue(tok){return /\d/.test(tok)||/[:\/]/.test(tok);}
function matchOne(input,answer){
  const it=normCmd(input).split(" "), at=normCmd(answer).split(" ");
  if(it.length!==at.length)return false;
  for(let i=0;i<at.length;i++){
    const a=at[i], t=it[i];
    if(tokenIsValue(a)){ if(!t)return false; continue; } // placeholder accepts any non-empty token
    // value-bearing answer token (ip/number/vlan): accept any plausible value of same shape
    if(looksLikeValue(a)){ if(t!==a && !looksLikeValue(t))return false; continue; }
    // otherwise allow abbreviation: typed token must be a prefix of the answer token
    if(!a.startsWith(t)||t.length===0)return false;
  }
  return true;
}
function cliCorrect(input,answers){return answers.some(a=>matchOne(input,a));}

}

<script>

function shakyIdx(){ // correct-but-not-confident, plus anything missed

// hook into the practice flow: after pickAns locks an answer, show the confidence prompt

    if(correct){ pendingConf={qi:cur.i, correct:true}; renderPractice(); }
    else { S.conf[cur.i]="guess"; saveState(); /* wrong = not confident; no prompt */ }

    <h1 style="font-size:23px">${c.t}</h1>
    <div class="card"><h3 style="margin-top:0">Scenario</h3><p style="font-size:14px;color:var(--ink-soft)">${c.scenario}</p>
    <h3>What it must do</h3>${c.tasks.map(t=>`<div class="conf-task">${t}</div>`).join("")}</div>
    <div class="card"><h3 style="margin-top:0">Type the full configuration</h3>
    <p style="font-size:12.5px;color:var(--ink-faint);margin-bottom:8px">One command per line. Order doesn't matter, shortcuts work, values are flexible. You won't be told the answers until you submit — research if you must, just like the job.</p>
    <textarea id="confArea" class="conf-area" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="hostname ...&#10;interface ...&#10;..."></textarea>
    <div style="margin-top:12px"><button class="btn primary" onclick="confGrade()">Submit configuration</button></div></div>`;
    return;
  }
  // graded view
  const total=c.sol.length, pct=Math.round(conf.score/total*100);
  main.innerHTML=`<div class="qmeta"><button class="btn" onclick="conf=null;render()">← Config lab list</button></div>
  <div class="prompt">CCNA-LAB# <b>show config-result</b></div>
  <h1 style="font-size:23px">${c.t}</h1>
  <div class="card" style="text-align:center;padding:24px"><div class="bignum" style="color:${pct>=100?'var(--green-deep)':pct>=60?'var(--amber-deep)':'var(--red-deep)'}">${conf.score}/${total}</div>
  <p style="color:var(--ink-soft);margin-top:6px">${pct===100?'Perfect — every required line present.':pct>=60?'Close — fill in the missing lines below.':'Review the lesson, then try again.'}</p></div>
  <div class="card"><h3 style="margin-top:0">Line-by-line</h3>
  ${conf.results.map(r=>`<div class="conf-line ${r.ok?'hit':'miss'}"><span class="mk">${r.ok?'✓':'✗'}</span><span>${r.sol.replace(/<x>/g,'<value>')}</span></div>`).join("")}
  ${conf.extras.length?`<p style="font-size:12.5px;color:var(--ink-faint);margin-top:10px">Lines that didn't match a requirement (may be fine, may be typos): ${conf.extras.map(e=>`<span class="chip">${e}</span>`).join(" ")}</p>`:""}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="startConf(${conf.idx})">Try again</button>
  <button class="btn" onclick="startPractice('${c.d}')">Drill this domain</button>
  <button class="btn" onclick="conf=null;render()">Config lab list</button></div>`;
}
function renderConfMenu(){
  main.innerHTML=`<div class="prompt">CCNA-LAB# <b>show config-challenges</b></div><h1>Config builder</h1>
  <p class="sub">Read a scenario, then type the <i>entire</i> configuration from scratch — the closest thing to the exam's full simulation questions. Graded line by line; order-independent, shortcuts and flexible values accepted.</p>
  ${CONFIGS.map((c,i)=>{const d=dom(c.d);const key="conf_"+i;const best=(S.game.best||{})[key];
  return `<div class="card hoverable" style="display:flex;align-items:center;gap:13px;cursor:pointer" onclick="startConf(${i})" role="button" tabindex="0">
    <span class="pill" style="background:${cv(C[d.color][1])};color:${cv(C[d.color][2])};flex-shrink:0">${"▲".repeat(c.lvl)}</span>
    <div style="flex:1"><div style="font-weight:600;font-size:15px">${c.t}</div>
    <div style="font-size:12.5px;color:var(--ink-soft)">${c.tasks.length} required commands${best!==undefined?` · best ${best}/${c.sol.length}`:''}</div></div>
    <span style="color:var(--ink-faint)">›</span></div>`;}).join("")}`;
}

// ===== wire both into Arcade + Stats + router =====
const renderGames3=renderGames;
renderGames=function(){
  renderGames3();
  const card=`<div class="card hoverable game-card" style="display:flex;gap:15px;align-items:center" onclick="conf=null;view='confgame';render()" role="button" tabindex="0">
    <div class="game-ic" style="background:var(--teal-soft);color:var(--teal-deep)">🔧</div>
    <div style="flex:1"><div style="font-weight:600;font-size:16px">Config builder</div>
    <p style="font-size:13px;color:var(--ink-soft)">Read a scenario, type the whole multi-line config from scratch. ${CONFIGS.length} labs, graded line by line.</p></div><span style="color:var(--ink-faint)">›</span></div>`;
  main.insertAdjacentHTML("beforeend",card);
};
// Stats: surface shaky (lucky-guess) questions for review
const renderStats3=renderStats;
renderStats=function(){
  renderStats3();
  const lucky=Object.keys(S.conf||{}).filter(k=>S.conf[k]==="lucky").length;
  const shaky=shakyIdx().length;
  if(shaky>0){
    main.insertAdjacentHTML("beforeend",
    `<div class="card"><h3 style="margin-top:0">Shaky spots</h3>
    <p style="font-size:13.5px;color:var(--ink-soft)">${shaky} question${shaky===1?'':'s'} you missed or got right but weren't sure about${lucky?` (${lucky} lucky guess${lucky===1?'':'es'})`:''}. These are the dangerous ones — they feel fine but aren't solid yet.</p>
    <button class="btn primary" style="margin-top:10px" onclick="drillShaky()">Drill my shaky spots</button></div>`);
  }
};
window.drillShaky=()=>{
  const idxs=shakyIdx(); if(!idxs.length){alert("Nothing shaky right now — nice.");return;}
  let pool=idxs.map(i=>({q:QB[i],i})); shuffle(pool); pool=pool.slice(0,25);
  practiceState={pool,idx:0,picked:null,right:0,domain:null};
  pendingConf=null; view="practice"; render();
};
const _go5=window.go;
window.go=v=>{conf=null;cli=null;_go5(v);};
const _render2=render;
render=function(){
  if(view==="confgame"){renderNav();renderConf();$("topStatus").textContent=`Interface Study0/1 is up, line protocol is up · ⚡${streakLive()}d · config builder`;return;}
  _render2();
};
render();
</script>

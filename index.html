<script>
// ===== PER-DAY STUDY NOTES (original content, days 1-16) =====
const DAYNOTES={
1:`<ul><li><b>Routers</b> forward packets between networks using IP (L3). <b>Switches</b> forward frames within a LAN using MAC addresses (L2) and have high port density. <b>L3 switches</b> do both.</li><li><b>Firewalls</b> filter traffic statefully (tracking connections); <b>next-generation firewalls (NGFW)</b> add application awareness and IPS. An <b>IDS</b> detects and alerts; an <b>IPS</b> sits inline and blocks.</li><li><b>Access points</b> bridge wireless clients onto the wired LAN. <b>Controllers</b> (WLC, SDN) centralize management.</li><li>Clients and servers are just roles: the machine requesting a service is the client, the one providing it is the server.</li><li><b>Exam trap:</b> a firewall protecting hosts inside a network is "network-based"; software on the host itself is "host-based."</li></ul>`,
2:`<ul><li>Ethernet copper standards: 10BASE-T (Cat3), 100BASE-T (Cat5), 1000BASE-T (Cat5e), 10GBASE-T (Cat6a) — all <b>100 m max</b>.</li><li>UTP pins: 10/100 use pins 1,2 (TX) and 3,6 (RX); 1000BASE-T uses all four pairs bidirectionally.</li><li><b>Straight-through</b> connects unlike devices (switch↔router, switch↔PC); <b>crossover</b> connects like devices. <b>Auto-MDIX</b> detects and fixes mismatches automatically.</li><li>Fiber: <b>single-mode</b> (small core, laser, kilometers) vs <b>multimode</b> (bigger core, LED, hundreds of meters). Fiber uses two strands: one TX, one RX.</li><li>SFP/SFP+ transceivers let one switch port take copper or fiber modules.</li><li><b>Exam trap:</b> know UTP maximums and which standard needs which category of cable.</li></ul>`,
3:`<ul><li>OSI top-down: Application, Presentation, Session, Transport, Network, Data link, Physical ("All People Seem To Need Data Processing" going down).</li><li>PDUs: L4 <b>segment</b>, L3 <b>packet</b>, L2 <b>frame</b>, L1 <b>bits</b>. Encapsulation adds a header at each layer going down (L2 also adds a trailer — the FCS).</li><li>TCP/IP model: Link, Internet, Transport, Application (Session/Presentation/Application collapse into one).</li><li><b>Same-layer interaction:</b> a layer talks to its peer on the remote host (TCP↔TCP). <b>Adjacent-layer interaction:</b> a layer provides services to the layer above on the same host.</li><li><b>Exam trap:</b> "Layer 2 of TCP/IP" = Internet layer. Be careful which model a question names.</li></ul>`,
4:`<ul><li>Modes: user EXEC <code>></code> → privileged EXEC <code>#</code> (via <code>enable</code>) → global config <code>(config)#</code> (via <code>configure terminal</code>) → interface/line/router sub-modes.</li><li><code>enable secret</code> stores a hash and always wins over <code>enable password</code> (plaintext). <code>service password-encryption</code> only applies weak Type 7 to line passwords.</li></ul>
<div class="cli"><span class="p">Switch></span> enable<br><span class="p">Switch#</span> configure terminal<br><span class="p">Switch(config)#</span> hostname SW1<br><span class="p">SW1(config)#</span> enable secret StrongPass1<br><span class="p">SW1(config)#</span> do show running-config <span class="c">! "do" runs EXEC commands from config mode</span><br><span class="p">SW1#</span> copy running-config startup-config</div>
<ul><li><b>running-config</b> lives in RAM (lost on reload); <b>startup-config</b> lives in NVRAM. Save with <code>copy run start</code> or <code>write memory</code>.</li><li>Shortcuts: Tab completes, <code>?</code> lists options, abbreviations work when unambiguous (<code>sh ip int br</code>).</li></ul>`,
5:`<ul><li>Ethernet frame: preamble/SFD (not counted in size), destination MAC, source MAC, Type (0x0800 IPv4, 0x86DD IPv6, 0x0806 ARP), payload, FCS. Valid size 64–1518 bytes; payloads smaller than 46 bytes get padded.</li><li>MAC address: 48 bits / 12 hex digits; first half is the OUI (vendor), second half is unique. First-byte I/G bit set = multicast/broadcast.</li><li>Switches <b>learn</b> source MACs into the MAC address table, <b>forward</b> on destination MAC, and <b>flood</b> broadcasts (FFFF.FFFF.FFFF) and unknown unicasts out all other ports in the VLAN.</li><li>A frame arriving for a MAC on the same port it arrived on is <b>filtered</b> (dropped).</li><li><b>Exam trap:</b> flooding ≠ broadcast. Unknown unicast frames are flooded but are still unicast frames.</li></ul>`,
6:`<ul><li><b>ARP</b> resolves IP → MAC: a broadcast ARP Request ("who has 10.0.0.5?") gets a unicast ARP Reply. Check the cache with <code>show arp</code> (router) or <code>arp -a</code> (PC).</li><li><b>Ping</b> uses ICMP Echo Request (type 8) and Echo Reply (type 0). First ping often fails/times out while ARP resolves — that's normal.</li><li>MAC table entries age out after <b>300 seconds</b> of inactivity by default. Clear manually with <code>clear mac address-table dynamic</code>.</li></ul>
<div class="cli"><span class="p">SW1#</span> show mac address-table<br><span class="c">VLAN  MAC Address     Type     Ports</span><br><span class="c">  1   000a.1234.5678  DYNAMIC  Fa0/1</span></div>
<ul><li><b>Exam trap:</b> ARP requests are broadcast (switches flood them); ARP replies are unicast (switches forward them out one port).</li></ul>`,
7:`<ul><li>IPv4 = 32 bits, four octets. Know binary↔decimal cold: 128 64 32 16 8 4 2 1.</li><li>Legacy classes: A 1–126 (/8), B 128–191 (/16), C 192–223 (/24), D multicast 224–239, E experimental. 127.x is loopback.</li><li>The <b>netmask</b> splits network bits from host bits. Network address = all host bits 0; broadcast = all host bits 1; both are unusable for hosts.</li><li>First usable = network + 1; last usable = broadcast − 1.</li><li><b>Exam trap:</b> a host with all its host bits set to 0 or 1 in a given mask is invalid — spot these in "which address can be assigned" questions.</li></ul>`,
8:`<ul><li>Router interfaces are <b>shutdown by default</b> (switch ports are up). Bring one up:</li></ul>
<div class="cli"><span class="p">R1(config)#</span> interface g0/0<br><span class="p">R1(config-if)#</span> ip address 10.0.0.1 255.255.255.0<br><span class="p">R1(config-if)#</span> description LAN-SEGMENT<br><span class="p">R1(config-if)#</span> no shutdown</div>
<ul><li><code>show ip interface brief</code> = fastest health check: interface, IP, status (L1), protocol (L2). <b>up/up</b> is working; <b>administratively down</b> means shutdown wasn't removed; <b>down/down</b> suggests cable/speed issues; <b>up/down</b> suggests L2 problems (keepalives, encapsulation).</li><li><code>show interfaces g0/0</code> shows speed, duplex, errors. <code>show running-config interface g0/0</code> shows just that interface's config.</li></ul>`,
9:`<ul><li>Configure speed/duplex manually or trust autonegotiation — but never half-and-half between two ends:</li></ul>
<div class="cli"><span class="p">SW1(config-if)#</span> speed 100<br><span class="p">SW1(config-if)#</span> duplex full</div>
<ul><li>Autonegotiation rules when the other side is silent: speed is sensed from the wire, but <b>duplex defaults to half at 10/100</b> — the classic duplex-mismatch cause.</li><li>Symptoms of duplex mismatch: <b>collisions and late collisions</b> on the half-duplex side, FCS/input errors on the full side. Runts = frames under 64 bytes; giants = over 1518.</li><li>Hubs create one collision domain; every switch port is its own collision domain; full duplex eliminates collisions entirely (CSMA/CD off).</li><li><b>Exam trap:</b> "interface counters show late collisions" → answer is duplex mismatch, almost always.</li></ul>`,
10:`<ul><li>Key IPv4 header fields: <b>Version</b> (4), <b>IHL</b>, <b>DSCP</b> (QoS marking), <b>Total length</b>, <b>Identification/Flags/Fragment offset</b> (fragmentation), <b>TTL</b>, <b>Protocol</b>, <b>Header checksum</b>, source/destination IP, options.</li><li><b>TTL</b> drops by 1 at each router; at 0 the packet dies and the router sends ICMP Time Exceeded — exactly what traceroute exploits.</li><li>Protocol field values to memorize: <b>1 = ICMP, 6 = TCP, 17 = UDP, 89 = OSPF</b>.</li><li>Fragmentation: DF bit set = don't fragment; MF bit = more fragments follow. Minimum IPv4 header 20 bytes, max 60.</li><li><b>Exam trap:</b> the source and destination IPs never change hop-to-hop (without NAT) — only MACs are rewritten. That's Day 12's whole story.</li></ul>`,
11:`<ul><li>Routing table sources: <b>C</b> connected (interface network, AD 0), <b>L</b> local (the interface's own /32, AD 0), <b>S</b> static (AD 1), dynamic protocols.</li><li>Static route flavors: next-hop (<code>ip route 10.2.0.0 255.255.255.0 192.168.1.2</code>), exit-interface, or fully specified (both). Prefer next-hop or fully specified on multiaccess links.</li><li>Default route = <code>ip route 0.0.0.0 0.0.0.0 NEXT_HOP</code> — matches anything not matched by something more specific.</li><li>Route selection: longest prefix match first, then AD, then metric.</li><li><b>Exam trap:</b> a packet matching no route at all is dropped — routers do not flood like switches.</li></ul>`,
12:`<ul><li>The sacred sequence: host compares destination to its own subnet. Off-net → ARP for the <b>default gateway's</b> MAC, not the destination's.</li><li>At each hop: the router strips the L2 frame, decrements TTL, looks up the route, and builds a <b>new frame</b> — new source MAC (its exit interface), new destination MAC (next hop, learned via ARP).</li><li>Across the whole path: <b>source/destination IPs never change; MACs change at every hop</b> (NAT excepted).</li><li>Switches along the way change nothing — they just forward frames on MAC.</li><li><b>Exam trap:</b> "What is the destination MAC of the frame the host sends?" → the default gateway's MAC. This shows up constantly.</li></ul>`,
13:`<ul><li>CIDR killed classes: /8…/30 prefixes describe the mask directly. Borrowing host bits creates subnets: subnets = 2^borrowed.</li><li>The <b>magic number / block size</b> method: 256 − interesting-octet-of-mask = block size. Subnets start at multiples of the block.</li><li>Example: 192.168.1.0/26 → mask .192 → block 64 → subnets at .0, .64, .128, .192.</li><li>Practice converting prefix↔mask instantly: /25=.128, /26=.192, /27=.224, /28=.240, /29=.248, /30=.252.</li><li>Speed is the skill: the exam gives ~1 minute per question, and subnetting hides inside OSPF, ACL, and NAT questions too. Use the Subnet Sprint game daily.</li></ul>`,
14:`<ul><li>Usable hosts = 2^(host bits) − 2. /26 → 62, /27 → 30, /28 → 14, /29 → 6, /30 → 2.</li><li>"Which subnet does host X live in?" → find the block size, find the multiple of the block at or below X's interesting octet → that's the network; add block − 1 for broadcast.</li><li>Worked example: 172.16.45.198/27 → block 32 → 192 is the multiple below 198 → network 172.16.45.192, broadcast .223, usable .193–.222.</li><li>"How many subnets fit?" → 2^(borrowed bits). Borrow 3 bits from a /24 → 8 subnets of /27.</li><li><b>Exam trap:</b> point-to-point links use /30 (or /31 where supported) — wasting a /24 on a router-to-router link is the wrong answer in design questions.</li></ul>`,
15:`<ul><li><b>VLSM</b> = different mask sizes within one network — carve subnets to fit each segment's host count.</li><li>The method: <b>allocate the largest requirement first</b>, at the lowest available address, then work down in size. This prevents overlap and waste.</li><li>Example from 192.168.1.0/24 — need 60, 28, 10, and 2 hosts: 60→/26 (.0–.63), 28→/27 (.64–.95), 10→/28 (.96–.111), 2→/30 (.112–.115).</li><li>Always verify no ranges overlap and each subnet's size is a power of two starting on a proper boundary.</li><li><b>Exam trap:</b> "need 28 hosts" requires 30 usable (/27), not /28 (14 usable) — read host counts against the −2 carefully.</li></ul>`,
16:`<ul><li>A VLAN = one broadcast domain = (almost always) one subnet. VLANs segment at L2 without buying more switches.</li><li>Default: every port in VLAN 1. Best practice: don't use VLAN 1 for users; park unused ports in a dead VLAN and shut them.</li></ul>
<div class="cli"><span class="p">SW1(config)#</span> vlan 10<br><span class="p">SW1(config-vlan)#</span> name SALES<br><span class="p">SW1(config)#</span> interface range f0/1 - 12<br><span class="p">SW1(config-if-range)#</span> switchport mode access<br><span class="p">SW1(config-if-range)#</span> switchport access vlan 10</div>
<ul><li>Verify with <code>show vlan brief</code> — shows VLANs and the access ports assigned to each (trunks don't appear there).</li><li>Normal VLAN range 1–1005; extended 1006–4094. VLANs 1 and 1002–1005 can't be deleted.</li><li><b>Exam trap:</b> traffic between VLANs always needs a L3 device — even if both VLANs live on the same switch.</li></ul>`
};
Object.assign(DAYNOTES,{
17:`<ul><li>Trunks carry multiple VLANs between switches using <b>802.1Q tags</b> (4 bytes inserted after the source MAC; includes 12-bit VLAN ID and 3-bit PCP for QoS).</li><li>The <b>native VLAN</b> travels untagged and must match on both ends (default 1; change it to an unused VLAN).</li></ul>
<div class="cli"><span class="p">SW1(config-if)#</span> switchport trunk encapsulation dot1q <span class="c">! only on switches that also speak ISL</span><br><span class="p">SW1(config-if)#</span> switchport mode trunk<br><span class="p">SW1(config-if)#</span> switchport trunk native vlan 999<br><span class="p">SW1(config-if)#</span> switchport trunk allowed vlan 10,20,30</div>
<ul><li><b>Router-on-a-stick:</b> one trunk to the router, one subinterface per VLAN with <code>encapsulation dot1q VLAN</code> + the gateway IP.</li><li>Verify: <code>show interfaces trunk</code> (mode, native VLAN, allowed and active VLANs).</li><li><b>Exam trap:</b> <code>allowed vlan add 40</code> vs <code>allowed vlan 40</code> — the second replaces the whole list and breaks everything else.</li></ul>`,
18:`<ul><li>Modern inter-VLAN routing: <b>SVIs on a multilayer switch</b> — faster than router-on-a-stick, no external box.</li></ul>
<div class="cli"><span class="p">SW1(config)#</span> ip routing<br><span class="p">SW1(config)#</span> interface vlan 10<br><span class="p">SW1(config-if)#</span> ip address 10.0.10.1 255.255.255.0<br><span class="p">SW1(config-if)#</span> no shutdown</div>
<ul><li>An SVI comes up only if: the VLAN exists, at least one access or trunk port carrying that VLAN is up, and the SVI isn't shutdown. (SVI up/down troubleshooting is a favorite simlet.)</li><li>Routed ports: <code>no switchport</code> turns a switch port into a L3 interface with its own IP.</li><li><b>Exam trap:</b> hosts must point their default gateway at the SVI IP — a perfect SVI config with wrong host gateways still fails.</li></ul>`,
19:`<ul><li><b>DTP</b> negotiates trunks automatically. Modes: <code>dynamic auto</code> (passive — trunks only if asked) and <code>dynamic desirable</code> (actively asks). auto+auto = access; anything+desirable = trunk.</li><li>Best practice: hardcode <code>switchport mode access|trunk</code> and add <code>switchport nonegotiate</code> — DTP is a VLAN-hopping vector.</li><li><b>VTP</b> replicates the VLAN database across switches sharing a domain: <b>server</b> (creates/modifies), <b>client</b> (receives only), <b>transparent</b> (ignores but forwards).</li><li>The infamous VTP risk: a switch with a <i>higher configuration revision</i> joining the domain can overwrite every switch's VLAN database. Most shops run transparent mode or VTPv3.</li><li><b>Exam trap:</b> VTP syncs VLANs, not port assignments — and it never creates extended-range VLANs in v1/v2.</li></ul>`,
20:`<ul><li>Without STP, redundant L2 links create broadcast storms (frames have no TTL), MAC table instability, and duplicate frames.</li><li>Root bridge election: lowest <b>bridge ID</b> = priority (default 32768 + VLAN ID) then lowest MAC. Set a root deliberately: <code>spanning-tree vlan 10 root primary</code> or priority 24576.</li><li>Every non-root switch picks one <b>root port</b> (lowest cost path to root; tiebreaks: lowest neighbor BID, lowest neighbor port ID). Each segment gets one <b>designated port</b>; everything else <b>blocks</b>.</li><li>Classic STP costs: 10 Mbps=100, 100 Mbps=19, 1 Gbps=4, 10 Gbps=2.</li><li><b>Exam trap:</b> all root-bridge ports are designated. If a question shows a root bridge with a blocked port, something's wrong with the question's premise — re-read it.</li></ul>`,
21:`<ul><li>802.1D timers: hello 2 s, forward delay 15 s, max age 20 s. A blocked port becoming forwarding takes 30–50 s (listening 15 + learning 15, plus up to 20 aging).</li><li>Port states: blocking → listening → learning → forwarding (disabled = admin down). Learning populates the MAC table but doesn't forward.</li><li><b>PortFast</b>: access ports skip straight to forwarding (host ports only!). <b>BPDU Guard</b> err-disables a PortFast port that hears a BPDU — the two belong together: <code>spanning-tree portfast</code> + <code>spanning-tree bpduguard enable</code> (or both globally with <code>...portfast default</code> / <code>...portfast bpduguard default</code>).</li><li>Root guard blocks a port that tries to become root; loop guard protects against unidirectional link failures.</li><li><b>Exam trap:</b> BPDU Guard err-disables the port — recovery is shut/no shut or <code>errdisable recovery cause bpduguard</code>.</li></ul>`,
22:`<ul><li><b>Rapid STP (802.1w)</b> converges in ~1–6 s. Cisco default mode is Rapid PVST+ (one instance per VLAN).</li><li>New port roles: <b>alternate</b> (backup path to root — replaces "blocking") and <b>backup</b> (redundant port to the same segment). States simplify to discarding / learning / forwarding.</li><li>RSTP uses a proposal/agreement handshake on point-to-point links instead of waiting on timers, and treats edge ports like PortFast automatically.</li><li>Link types: point-to-point (full duplex), shared (half duplex — hubs), edge.</li><li>RSTP costs were revised upward (e.g., 1 Gbps=20000 in the long path-cost method) but classic short values still appear — read the question's table if given.</li><li><b>Exam trap:</b> RSTP is backward compatible: facing an 802.1D switch, the port falls back to legacy timer behavior.</li></ul>`,
23:`<ul><li>EtherChannel bundles up to 8 links into one logical interface so STP treats them as a single link (no blocking; bandwidth aggregates).</li><li>Protocols: <b>LACP</b> (802.3ad — active/passive), <b>PAgP</b> (Cisco — desirable/auto), static <code>on</code> (no negotiation; both sides must be on).</li><li>Forms when: active+active ✓, active+passive ✓, desirable+desirable ✓, desirable+auto ✓, auto+auto ✗, passive+passive ✗.</li></ul>
<div class="cli"><span class="p">SW1(config)#</span> interface range g0/1 - 2<br><span class="p">SW1(config-if-range)#</span> channel-group 1 mode active<br><span class="p">SW1(config)#</span> interface port-channel 1<br><span class="p">SW1(config-if)#</span> switchport mode trunk</div>
<ul><li>Members must match speed, duplex, and switchport settings; mismatched ports get suspended. Verify: <code>show etherchannel summary</code> (flags SU = in use).</li><li>Load balancing hashes per-flow (src/dst MAC or IP), not per-packet. L3 EtherChannel: <code>no switchport</code> + IP on the port-channel.</li></ul>`,
24:`<ul><li>IGPs route within an organization (OSPF, EIGRP, RIP, IS-IS); BGP is the EGP of the internet.</li><li>Types: <b>distance vector</b> (RIP, EIGRP — routes by rumor) vs <b>link state</b> (OSPF, IS-IS — every router builds the full map and runs SPF).</li><li>AD decides <i>between protocols</i>; metric decides <i>within one</i>. Memorize: connected 0, static 1, eBGP 20, EIGRP 90, OSPF 110, IS-IS 115, RIP 120, iBGP 200.</li><li><b>Floating static:</b> a static route with AD raised above the dynamic protocol's (e.g., <code>ip route ... 111</code> behind OSPF) installs only when the learned route dies — instant backup link.</li><li>ECMP: equal-metric routes from the same protocol load balance.</li><li><b>Exam trap:</b> AD compares only routes to the <i>identical prefix</i>. A /25 from RIP still beats a /24 from OSPF for hosts in the /25 — longest match runs first.</li></ul>`,
25:`<ul><li><b>RIPv2:</b> hop-count metric, max 15 (16 = unreachable), multicasts to 224.0.0.9, updates every 30 s. Config: <code>router rip</code> → <code>version 2</code> → <code>network 10.0.0.0</code> (classful statements!) → <code>no auto-summary</code>.</li><li><b>EIGRP:</b> Cisco's advanced distance vector. Metric from bandwidth + delay (by default), multicasts to 224.0.0.10, AD 90 (internal).</li><li>EIGRP terms: <b>successor</b> = best route; <b>feasible successor</b> = pre-validated backup (feasibility condition: neighbor's reported distance < our feasible distance). Backup kicks in instantly — no recomputation.</li><li>EIGRP config uses wildcards: <code>router eigrp 100</code> → <code>network 10.1.1.0 0.0.0.255</code>; ASN must match between neighbors. Supports unequal-cost load balancing via <code>variance</code> — the only IGP that does.</li><li><b>Exam trap:</b> RIP's <code>network 10.0.0.0</code> enables every 10.x interface — you can't target one subnet with a classful statement.</li></ul>`,
26:`<ul><li>OSPF floods <b>LSAs</b>, assembles them into the <b>LSDB</b> (identical on all routers in an area), and runs Dijkstra SPF for best paths. AD 110.</li><li>Cost = reference bandwidth ÷ interface bandwidth; default reference 100 Mbps makes FastEthernet and faster all cost 1 — fix with <code>auto-cost reference-bandwidth 100000</code> (set the same everywhere).</li></ul>
<div class="cli"><span class="p">R1(config)#</span> router ospf 1<br><span class="p">R1(config-router)#</span> router-id 1.1.1.1<br><span class="p">R1(config-router)#</span> network 10.0.0.0 0.0.0.255 area 0<br><span class="p">R1(config-router)#</span> passive-interface g0/1<br><span class="p">R1(config-router)#</span> default-information originate <span class="c">! advertise my default route into OSPF</span></div>
<ul><li>Process ID is locally significant. Interface alternative: <code>ip ospf 1 area 0</code>. Single-area designs put everything in area 0 (the backbone).</li><li><b>Exam trap:</b> changing router-id takes effect only after <code>clear ip ospf process</code> (or reload).</li></ul>`,
27:`<ul><li>Neighbor states in order: Down → Init → <b>2-Way</b> → ExStart → Exchange → Loading → <b>Full</b>. 2-Way is final and normal between two non-DR/BDR routers on a LAN — not a failure.</li><li>On multiaccess (Ethernet) segments, OSPF elects a <b>DR and BDR</b>: highest interface priority (default 1, 0 = never), tiebreak highest router ID. <b>No preemption</b> — a "better" router joining later doesn't take over.</li><li>All routers form Full adjacencies with DR/BDR only; DROthers stay 2-Way with each other. LSAs go to the DR at 224.0.0.6; the DR floods to 224.0.0.5.</li><li>Network types: <b>broadcast</b> (Ethernet — DR/BDR, hello 10 s), <b>point-to-point</b> (serial — no DR, hello 10 s). Change with <code>ip ospf network point-to-point</code> to skip the pointless DR election on router-to-router Ethernet links.</li><li><b>Exam trap:</b> ExStart/Exchange stuck? Think MTU mismatch — the textbook cause.</li></ul>`,
28:`<ul><li>Adjacency requirements — same: <b>area ID, subnet, hello/dead timers, authentication, stub flags, MTU</b>; and <b>unique router IDs</b>. Process IDs and priorities may differ.</li><li>Timers: broadcast/P2P hello 10 s, dead 40 s (4×). Mismatch = no neighbor, and it's quietly visible in <code>show ip ospf interface</code>.</li><li>Useful verification set: <code>show ip ospf neighbor</code> (states), <code>show ip ospf interface brief</code> (areas, costs, DR state), <code>show ip protocols</code> (RID, networks, passive interfaces), <code>show ip route ospf</code>.</li><li>LSA types worth recognizing: Type 1 router, Type 2 network (from the DR), Type 5 external (redistributed/default). O = intra-area, O IA = inter-area, O E2 = external in the routing table.</li><li><b>Exam trap:</b> passive-interface on the wrong interface kills an adjacency while everything else looks perfect — check <code>show ip protocols</code> first in "neighbors won't form" simlets.</li></ul>`,
29:`<ul><li>FHRPs give hosts a <b>virtual gateway IP</b> that survives router failure. Hosts never re-learn anything; failover is invisible.</li><li><b>HSRP</b> (Cisco): active/standby, vMAC <code>0000.0c07.acXX</code> (v1, XX = group hex), hellos to 224.0.0.2 UDP 1985. <b>VRRP</b> (open): master/backup, vMAC <code>0000.5e00.01XX</code>, preempts by default. <b>GLBP</b> (Cisco): load balances across up to 4 forwarders.</li><li>Election: highest priority (default 100), tiebreak highest interface IP. HSRP preemption is <b>off</b> by default — a recovered router won't take back over without <code>standby 1 preempt</code>.</li></ul>
<div class="cli"><span class="p">R1(config-if)#</span> standby 1 ip 10.0.0.254<br><span class="p">R1(config-if)#</span> standby 1 priority 110<br><span class="p">R1(config-if)#</span> standby 1 preempt</div>
<ul><li><b>Exam trap:</b> both routers think they're active (brief "active/active") → check that group numbers and virtual IPs match on both sides.</li></ul>`,
30:`<ul><li><b>TCP</b>: connection-oriented; SYN → SYN-ACK → ACK to open; FIN/ACK pairs to close. Provides sequencing (reorder), acknowledgment + retransmission (reliability), and <b>flow control via sliding windows</b> (the window scales up until loss).</li><li><b>UDP</b>: 8-byte header, no handshake, no recovery — perfect for voice/video (delay matters, loss is tolerable) and for protocols doing their own reliability (TFTP).</li><li>Both use ports: well-known 0–1023, registered 1024–49151, ephemeral 49152–65535. A session = src IP/port + dst IP/port.</li><li>Memorize the port table (Day 30 is where it's formalized): FTP 20/21, SSH 22, Telnet 23, SMTP 25, DNS 53 (both), DHCP 67/68, TFTP 69, HTTP 80, POP3 110, NTP 123, SNMP 161/162, HTTPS 443, Syslog 514.</li><li><b>Exam trap:</b> DNS uses UDP 53 for queries <i>and</i> TCP 53 for zone transfers/large responses — "both" is often the right answer.</li></ul>`,
31:`<ul><li>IPv6 = 128 bits, eight quartets of hex. Abbreviate: drop leading zeros in each quartet; replace one longest run of all-zero quartets with <code>::</code> (only once).</li><li>2001:0DB8:0000:0000:0000:0000:0000:0001 → <code>2001:DB8::1</code>.</li><li>Standard design: /48 site prefix, /64 per subnet — the interface ID is always the last 64 bits.</li></ul>
<div class="cli"><span class="p">R1(config)#</span> ipv6 unicast-routing <span class="c">! required to route IPv6 at all</span><br><span class="p">R1(config-if)#</span> ipv6 address 2001:db8:0:1::1/64<br><span class="p">R1(config-if)#</span> ipv6 enable <span class="c">! link-local only, if that's all you need</span></div>
<ul><li>No broadcast in IPv6 — multicast and anycast replace it. The IPv6 header is simpler than IPv4's (no checksum, no fragmentation by routers).</li><li><b>Exam trap:</b> forgetting <code>ipv6 unicast-routing</code> — the router will source IPv6 traffic but won't forward it.</li></ul>`,
32:`<ul><li>Address types: <b>global unicast</b> 2000::/3 (public), <b>unique local</b> FC00::/7 (private, in practice FD…), <b>link-local</b> FE80::/10 (auto on every interface, never routed), <b>multicast</b> FF00::/8, <b>anycast</b> (same address on several devices; nearest wins).</li><li>Key multicasts: FF02::1 all nodes, FF02::2 all routers, FF02::5/FF02::6 OSPFv3, FF02::A EIGRP.</li><li><b>EUI-64</b> builds the interface ID from the MAC: split it in half, insert <code>FFFE</code>, flip the 7th bit of the first byte. Config: <code>ipv6 address 2001:db8:0:1::/64 eui-64</code>.</li><li><b>SLAAC</b>: host learns the /64 prefix from a Router Advertisement and self-generates the interface ID (EUI-64 or random) — no DHCP server needed for addressing.</li><li><b>Exam trap:</b> practice the 7th-bit flip by hand; the exam loves "what EUI-64 address results from MAC X."</li></ul>`,
33:`<ul><li><b>NDP</b> (ICMPv6) replaces ARP: Neighbor Solicitation (sent to the solicited-node multicast FF02::1:FF…) and Neighbor Advertisement resolve link addresses; Router Solicitation/Advertisement (RS/RA) let hosts find routers and prefixes.</li><li>Verify neighbors with <code>show ipv6 neighbors</code> (the IPv6 "ARP table").</li><li>IPv6 static routes mirror IPv4: <code>ipv6 route 2001:db8:2::/64 2001:db8:12::2</code>; default = <code>ipv6 route ::/0 …</code>. With a <b>link-local next hop you must name the exit interface</b>: <code>ipv6 route 2001:db8:2::/64 g0/0 FE80::2</code>.</li><li>Dual stack = run IPv4 and IPv6 side by side on the same interfaces — the standard migration strategy.</li><li><b>Exam trap:</b> RA messages come from the router's <b>link-local</b> address — hosts' default gateways in IPv6 are link-local addresses, not global ones.</li></ul>`
});
Object.assign(DAYNOTES,{
34:`<ul><li>Standard ACLs (1–99, 1300–1999) match <b>source IP only</b>. Place them <b>close to the destination</b> so they don't over-block.</li><li>Wildcard masks are inverted subnet masks: /24 → 0.0.0.255; one host → 0.0.0.0 (or just <code>host 10.1.1.1</code>); everything → <code>any</code>.</li></ul>
<div class="cli"><span class="p">R1(config)#</span> access-list 10 deny 10.1.1.0 0.0.0.255<br><span class="p">R1(config)#</span> access-list 10 permit any<br><span class="p">R1(config)#</span> interface g0/0<br><span class="p">R1(config-if)#</span> ip access-group 10 out</div>
<ul><li>Processing is top-down, first match wins, and every ACL ends with an invisible <b>deny any</b> — an ACL with only deny statements blocks everything.</li><li>Protect device logins by applying to vty lines: <code>access-class 10 in</code>.</li><li><b>Exam trap:</b> one ACL per interface, per direction, per protocol. A second <code>ip access-group</code> in the same direction replaces the first.</li></ul>`,
35:`<ul><li>Extended ACLs (100–199, 2000–2699) match protocol, <b>source AND destination</b>, and ports. Place them <b>close to the source</b> — kill unwanted traffic early.</li><li>Syntax order is rigid: <code>permit|deny PROTOCOL SRC WILDCARD [eq PORT] DST WILDCARD [eq PORT]</code> — source first, always.</li></ul>
<div class="cli"><span class="p">R1(config)#</span> ip access-list extended BLOCK-WEB<br><span class="p">R1(config-ext-nacl)#</span> deny tcp 10.1.1.0 0.0.0.255 host 203.0.113.10 eq 80<br><span class="p">R1(config-ext-nacl)#</span> deny tcp 10.1.1.0 0.0.0.255 host 203.0.113.10 eq 443<br><span class="p">R1(config-ext-nacl)#</span> permit ip any any</div>
<ul><li>Named ACLs allow editing by sequence number: <code>show access-lists</code> reveals numbers; delete one line with <code>no 20</code>; insert with <code>15 permit …</code>.</li><li>Operators: <code>eq</code>, <code>gt</code>, <code>lt</code>, <code>neq</code>, <code>range</code>.</li><li><b>Exam trap:</b> matching return traffic — to block a web <i>server's responses</i>, the port goes after the <i>source</i> (eq 80 on the source side), because the server sources from port 80.</li></ul>`,
36:`<ul><li><b>CDP</b> (Cisco, on by default): announcements every 60 s, holdtime 180 s, sent to multicast as L2 frames. <b>LLDP</b> (IEEE 802.1AB, multivendor, usually off): 30 s / 120 s, must enable with <code>lldp run</code> globally plus transmit/receive per interface.</li><li><code>show cdp neighbors</code> = local interface, neighbor's device ID, capability, platform, and the <b>neighbor's</b> port. <code>detail</code> adds IP address and IOS version — gold for mapping unknown topologies in simlets.</li><li>Disable where untrusted (security: CDP leaks device info): per-interface <code>no cdp enable</code>, globally <code>no cdp run</code>.</li><li><b>Exam trap:</b> reading the neighbors table backwards — "Local Intrfce" is YOUR port; "Port ID" is THEIRS. Questions love to swap these.</li></ul>`,
37:`<ul><li>NTP keeps clocks accurate (UDP 123) so logs, certificates, and debugging line up. <b>Stratum</b> = distance from the reference clock (0 = atomic/GPS source, 1 = directly attached server…); lower is better, 16 = unsynced.</li></ul>
<div class="cli"><span class="p">R1(config)#</span> ntp server 10.1.1.100<br><span class="p">R1(config)#</span> ntp master 3 <span class="c">! become a server at stratum 3</span><br><span class="p">R1#</span> show ntp associations<br><span class="p">R1#</span> show ntp status</div>
<ul><li>A device can be client and server simultaneously (sync upstream, serve downstream). NTP authentication exists but must be configured both ways.</li><li>Manual fallback: <code>clock set</code> (EXEC) sets the software clock; <code>calendar set</code> sets the hardware clock. Time zones: <code>clock timezone CST -6</code>.</li><li><b>Exam trap:</b> sync can take several minutes after config — "configured but not synced yet" is normal, not broken.</li></ul>`,
38:`<ul><li>DNS resolves names → IPs. Records: <b>A</b> (IPv4), <b>AAAA</b> (IPv6), CNAME (alias), MX (mail), NS (name server).</li><li>Queries are UDP 53; zone transfers and oversized responses use TCP 53.</li><li>Router as DNS <b>client</b>: <code>ip name-server 8.8.8.8</code> + <code>ip domain-lookup</code> (on by default). Routers can also serve static names: <code>ip host SW1 10.1.1.2</code>.</li><li>Hosts cache lookups — <code>ipconfig /displaydns</code> and <code>/flushdns</code> on Windows.</li><li><b>Exam trap:</b> mistyping a command with domain-lookup enabled makes the router try to <i>resolve the typo via DNS</i> and hang — that's why labs start with <code>no ip domain-lookup</code>. Know why.</li></ul>`,
39:`<ul><li><b>DORA</b>: Discover (broadcast) → Offer → Request (broadcast — "I accept THIS offer") → Ack. Release/renew at lease midpoint.</li></ul>
<div class="cli"><span class="p">R1(config)#</span> ip dhcp excluded-address 10.0.0.1 10.0.0.10<br><span class="p">R1(config)#</span> ip dhcp pool LAN10<br><span class="p">R1(dhcp-config)#</span> network 10.0.0.0 255.255.255.0<br><span class="p">R1(dhcp-config)#</span> default-router 10.0.0.1<br><span class="p">R1(dhcp-config)#</span> dns-server 8.8.8.8<br><span class="p">R1(dhcp-config)#</span> lease 7</div>
<ul><li>Remote DHCP server? The gateway needs <b><code>ip helper-address SERVER-IP</code> on the client-facing interface</b> — it converts the client's broadcast to unicast and relays it.</li><li>Verify: <code>show ip dhcp binding</code>, <code>show ip dhcp pool</code>. Windows client: <code>ipconfig /release</code> + <code>/renew</code>.</li><li><b>Exam trap:</b> helper-address goes on the interface <i>facing the clients</i>, not the one facing the server.</li></ul>`,
40:`<ul><li>SNMP pieces: <b>NMS/manager</b> (polls), <b>agent</b> (on the device), <b>MIB</b> (the database of OIDs describing everything pollable).</li><li>Operations: manager Get/Set (UDP <b>161</b> on the agent); agent-initiated <b>Trap</b> (unacknowledged) and <b>Inform</b> (acknowledged) to UDP <b>162</b> on the manager.</li><li>Versions: v1/v2c authenticate with plaintext <b>community strings</b> (RO and RW); <b>v3</b> adds real authentication and encryption (auth/priv modes) — the only one suitable on untrusted networks.</li><li>Basic v2c config: <code>snmp-server community MYSTRING ro</code> + <code>snmp-server host 10.1.1.50 version 2c MYSTRING</code>.</li><li><b>Exam trap:</b> traps vs informs — informs are acknowledged and re-sent if unacknowledged; traps are fire-and-forget.</li></ul>`,
41:`<ul><li>Severity 0–7: <b>E</b>mergency, <b>A</b>lert, <b>C</b>ritical, <b>E</b>rror, <b>W</b>arning, <b>N</b>otice, <b>I</b>nformational, <b>D</b>ebugging. Message format: timestamp %FACILITY-SEVERITY-MNEMONIC: text (e.g., %LINEPROTO-5-UPDOWN).</li><li>Destinations: console (default), terminal lines (<code>logging monitor</code> + <code>terminal monitor</code> for SSH sessions), buffer (<code>logging buffered</code>), and a syslog server (<code>logging host 10.1.1.50</code> + <code>logging trap warnings</code> — sends severity 0–4, that level <i>and worse</i>).</li><li><code>service timestamps log datetime msec</code> makes logs correlate with NTP-synced time — the whole point of Day 37.</li><li><code>logging synchronous</code> on console/vty lines stops log messages from chopping up your typing.</li><li><b>Exam trap:</b> "logging trap 4" and "logging trap warnings" are identical — know both names and that lower numbers are MORE severe.</li></ul>`,
42:`<ul><li>Telnet (TCP 23) is plaintext — never on the exam's "right answer" list. SSH (TCP 22) encrypts; SSHv2 is the only acceptable version.</li><li>The full enablement recipe — all five pieces required:</li></ul>
<div class="cli"><span class="p">R1(config)#</span> hostname R1<br><span class="p">R1(config)#</span> ip domain-name lab.local<br><span class="p">R1(config)#</span> crypto key generate rsa modulus 2048<br><span class="p">R1(config)#</span> username admin privilege 15 secret StrongPass1<br><span class="p">R1(config)#</span> ip ssh version 2<br><span class="p">R1(config)#</span> line vty 0 15<br><span class="p">R1(config-line)#</span> transport input ssh<br><span class="p">R1(config-line)#</span> login local</div>
<ul><li>The RSA key generation <b>requires</b> hostname + domain name first (the key is named from them). Modulus ≥ 768 for SSHv2; use 2048.</li><li>Restrict management sources with an ACL: <code>access-class 10 in</code> on the vty lines.</li><li><b>Exam trap:</b> <code>transport input ssh</code> silently blocks Telnet — if a simlet says "Telnet stopped working after hardening," that's why, and it's intentional.</li></ul>`,
43:`<ul><li><b>FTP</b> (TCP 21 control + 20 data): authenticated, reliable, two channels. Active mode: server connects back to the client (firewall pain); passive: client opens both.</li><li><b>TFTP</b> (UDP 69): tiny, no auth, lock-step reliability built on UDP — the classic for IOS images and config backups inside a LAN.</li><li>IOS upgrade flow: check space (<code>show flash:</code>) → <code>copy tftp: flash:</code> → verify (<code>verify /md5 flash:image.bin</code>) → point boot at it (<code>boot system flash:image.bin</code>) → save → reload → <code>show version</code> to confirm.</li><li>Config backup is the same idea in reverse: <code>copy running-config tftp:</code>.</li><li><b>Exam trap:</b> the <code>boot system</code> command order matters — the router tries them top-down, and forgetting to save before reload boots the old image.</li></ul>`,
44:`<ul><li>NAT vocabulary (Cisco's, and the exam's): <b>inside local</b> = the private address of an inside host; <b>inside global</b> = the public address representing it; <b>outside global</b> = the external host's address as seen publicly.</li><li><b>Static NAT</b> = permanent 1:1 — what you use to publish an internal server:</li></ul>
<div class="cli"><span class="p">R1(config)#</span> ip nat inside source static 10.0.0.10 203.0.113.10<br><span class="p">R1(config)#</span> interface g0/0<br><span class="p">R1(config-if)#</span> ip nat inside<br><span class="p">R1(config)#</span> interface g0/1<br><span class="p">R1(config-if)#</span> ip nat outside</div>
<ul><li>Marking interfaces inside/outside is half the configuration — forget it and nothing translates.</li><li>Verify: <code>show ip nat translations</code>, <code>show ip nat statistics</code>; reset with <code>clear ip nat translation *</code>.</li><li><b>Exam trap:</b> in a translation table row, pairing each column to inside-local vs inside-global is the whole question. Local = private, global = public — every time.</li></ul>`,
45:`<ul><li><b>Dynamic NAT</b>: a pool of public IPs handed out first-come-first-served — when the pool empties, new flows drop. Rarely deployed; heavily tested conceptually.</li><li><b>PAT (overload)</b> — the real world's NAT — multiplexes thousands of hosts behind one IP by rewriting source ports:</li></ul>
<div class="cli"><span class="p">R1(config)#</span> access-list 1 permit 10.0.0.0 0.0.0.255<br><span class="p">R1(config)#</span> ip nat inside source list 1 interface g0/1 overload<br><span class="c">! or with a pool:</span><br><span class="p">R1(config)#</span> ip nat pool POOL1 203.0.113.5 203.0.113.6 netmask 255.255.255.252<br><span class="p">R1(config)#</span> ip nat inside source list 1 pool POOL1 overload</div>
<ul><li>The ACL defines <i>who gets translated</i> (permit = translate, not "allow traffic").</li><li>PAT preserves the original source port when free, otherwise picks another — the port is what disambiguates returning traffic.</li><li><b>Exam trap:</b> the word <b>overload</b> is the entire difference between dynamic NAT and PAT in a config question. Scan for it.</li></ul>`,
46:`<ul><li>VoIP traffic is small, constant, and fragile: targets are <b>≤150 ms one-way latency, ≤30 ms jitter, ≤1% loss</b>.</li><li>IP phones contain a tiny 3-port switch: the PC daisy-chains through the phone. The <b>voice VLAN</b> puts phone traffic on its own tagged VLAN while the PC stays on the untagged access VLAN:</li></ul>
<div class="cli"><span class="p">SW1(config-if)#</span> switchport mode access<br><span class="p">SW1(config-if)#</span> switchport access vlan 10<br><span class="p">SW1(config-if)#</span> switchport voice vlan 20</div>
<ul><li>Power over Ethernet runs the phones: 802.3af (15.4 W), 802.3at/PoE+ (30 W), 802.3bt (60–100 W). The switch detects the device and negotiates power; <code>show power inline</code> verifies.</li><li>Marking starts here: phones mark their own traffic (CoS 5 / DSCP EF) and the switch port forms the <b>trust boundary</b>.</li><li><b>Exam trap:</b> a port with a voice VLAN is still an access port — it carries exactly two VLANs and is not a trunk.</li></ul>`,
47:`<ul><li>QoS toolset in pipeline order: <b>classification</b> (identify traffic) → <b>marking</b> (tag it: CoS at L2 — 3 bits in 802.1Q; DSCP at L3 — 6 bits in the IP header) → <b>queuing</b> → congestion management/avoidance.</li><li>Standard markings: voice = <b>EF (46)</b>, video ≈ AF41, call signaling CS3, best effort 0.</li><li><b>LLQ</b> (low latency queuing) gives voice a strict priority queue — always serviced first, but policed so it can't starve everything else.</li><li><b>Policing</b> drops or re-marks traffic above a rate (hard edge); <b>shaping</b> buffers and delays it (smooth edge, adds latency). Police inbound at the provider edge; shape outbound to match a carrier's rate.</li><li>Congestion avoidance: tail drop is the disease (global TCP synchronization); <b>WED/WRED</b> drops selectively early to prevent it.</li><li><b>Exam trap:</b> policing vs shaping in one line — police = drop excess, shape = delay excess.</li></ul>`,
48:`<ul><li><b>CIA</b>: confidentiality (encryption, access control), integrity (hashing, no tampering), availability (redundancy, DoS resistance). Every security question maps to one of these.</li><li>Vocabulary: a <b>vulnerability</b> is a weakness; an <b>exploit</b> weaponizes it; a <b>threat</b> is the potential; <b>mitigation</b> reduces it.</li><li>Attack catalog: DoS/DDoS (incl. TCP SYN floods), <b>spoofing</b> (faked source addresses), reflection/amplification, man-in-the-middle (ARP poisoning), reconnaissance, password attacks (brute force, dictionary), and <b>social engineering</b> — phishing, spear phishing (targeted), whaling (executives), vishing (phone), smishing (SMS), watering hole, tailgating.</li><li>Malware: virus (attaches to programs), worm (self-propagates), trojan (disguised). </li><li>Defenses tested: strong password policy + <b>MFA</b> (something you know/have/are), user training, and <b>AAA</b> — authentication, authorization, accounting via RADIUS or TACACS+.</li><li><b>Exam trap:</b> match the social-engineering flavor to its definition precisely — "targeted at a specific executive" = whaling.</li></ul>`
});
Object.assign(DAYNOTES,{
49:`<ul><li>Port security limits which/how many MACs may use a port — stopping MAC flooding (CAM overflow) and casual device swaps.</li></ul>
<div class="cli"><span class="p">SW1(config-if)#</span> switchport mode access <span class="c">! required first — not on dynamic ports</span><br><span class="p">SW1(config-if)#</span> switchport port-security<br><span class="p">SW1(config-if)#</span> switchport port-security maximum 2<br><span class="p">SW1(config-if)#</span> switchport port-security mac-address sticky<br><span class="p">SW1(config-if)#</span> switchport port-security violation restrict</div>
<ul><li>Violation modes: <b>shutdown</b> (default — err-disables the port), <b>restrict</b> (drop + syslog + counter), <b>protect</b> (silent drop). <b>Sticky</b> writes learned MACs into running-config (save to keep them).</li><li>Recovery from err-disabled: fix the cause, then <code>shutdown</code> / <code>no shutdown</code> — or automate with <code>errdisable recovery cause psecure-violation</code> + recovery interval.</li><li>Verify: <code>show port-security</code>, <code>show port-security interface f0/1</code>, <code>show errdisable recovery</code>.</li><li><b>Exam trap:</b> port security requires a static access (or trunk) mode port — it refuses to configure on "dynamic auto" ports. Error message questions test exactly this.</li></ul>`,
50:`<ul><li>DHCP snooping kills rogue DHCP servers: ports are <b>trusted</b> (toward the real server/uplinks) or <b>untrusted</b> (toward clients, the default). Server messages (OFFER/ACK/NAK) arriving on untrusted ports are dropped.</li></ul>
<div class="cli"><span class="p">SW1(config)#</span> ip dhcp snooping<br><span class="p">SW1(config)#</span> ip dhcp snooping vlan 10<br><span class="p">SW1(config)#</span> no ip dhcp snooping information option <span class="c">! the option-82 gotcha</span><br><span class="p">SW1(config)#</span> interface g0/1<br><span class="p">SW1(config-if)#</span> ip dhcp snooping trust</div>
<ul><li>It also builds the <b>binding table</b> (MAC↔IP↔port↔VLAN↔lease) that DAI and IP Source Guard depend on, and can rate-limit DHCP messages per port (<code>ip dhcp snooping limit rate 10</code>) — exceeding err-disables.</li><li><b>Exam trap #1:</b> enabling globally AND per-VLAN are both required — one without the other does nothing. <b>Trap #2:</b> by default the switch inserts option 82, which a non-relay setup's server rejects → clients mysteriously get no leases until you disable the information option.</li></ul>`,
51:`<ul><li>Dynamic ARP inspection stops ARP poisoning (the MITM classic): on untrusted ports, every ARP reply is checked against the <b>DHCP snooping binding table</b> (or static ARP ACLs) — lies get dropped.</li></ul>
<div class="cli"><span class="p">SW1(config)#</span> ip arp inspection vlan 10<br><span class="p">SW1(config)#</span> interface g0/1<br><span class="p">SW1(config-if)#</span> ip arp inspection trust <span class="c">! uplinks/switch-to-switch</span></div>
<ul><li>DAI therefore <b>requires DHCP snooping to already be running</b> (or manually built ARP ACLs for static-IP hosts).</li><li>Optional deeper checks: <code>ip arp inspection validate src-mac dst-mac ip</code> compares Ethernet headers against ARP payload fields.</li><li>ARP traffic is rate-limited on untrusted ports (15 pps default); exceeding err-disables the port.</li><li><b>Exam trap:</b> hosts with static IPs fail DAI (no DHCP binding exists) — the fix is an ARP ACL, and recognizing that scenario is the question.</li></ul>`,
52:`<ul><li><b>2-tier (collapsed core)</b>: access + combined distribution/core — most campuses. <b>3-tier</b>: access, distribution, core — large enterprises where distribution pairs per building aggregate into a high-speed core.</li><li>Layer roles: access = host connectivity, PoE, port security; distribution = L2/L3 boundary (SVIs live here), policy; core = fast, redundant, no policy.</li><li><b>Spine-leaf</b> (data center): every leaf connects to every spine; spines never interconnect; hosts only on leaves. Predictable 2-hop latency between any servers — built for east-west traffic.</li><li><b>SOHO</b>: one box doing router + switch + AP + firewall + modem.</li><li>On-prem vs colocation vs cloud placement rounds out the topic.</li><li><b>Exam trap:</b> in spine-leaf questions, any design showing spine-to-spine or host-to-spine links is wrong by definition.</li></ul>`,
53:`<ul><li><b>Leased line</b>: dedicated point-to-point circuit — private and predictable, expensive, slow to provision.</li><li><b>MPLS VPN</b>: provider-run shared core with label switching; supports L3VPN (provider participates in your routing) and L2VPN flavors. CE = your edge router, PE = provider edge.</li><li><b>Internet VPNs</b>: <b>site-to-site IPsec</b> tunnels between gateways (cheap WAN over broadband); <b>GRE over IPsec</b> when you need routing protocols/multicast through the tunnel; <b>DMVPN</b> for hub-and-spoke at scale; <b>remote-access TLS</b> (AnyConnect-style) for individual users.</li><li>Internet access flavors: DSL (phone line), cable (DOCSIS), fiber, and cellular/5G as backup.</li><li>Redundancy patterns: dual-homed (two links, one ISP) vs multihomed (two ISPs).</li><li><b>Exam trap:</b> IPsec alone can't carry multicast or routing protocols — that's precisely why GRE-over-IPsec exists. This pairing is a recurring question.</li></ul>`,
54:`<ul><li><b>Type 1 hypervisor</b> runs on bare metal (ESXi, Hyper-V, KVM — data centers); <b>Type 2</b> runs atop a host OS (VirtualBox, VMware Workstation — laptops/labs).</li><li><b>Containers</b> share the host kernel via a runtime (Docker) — megabytes and milliseconds vs a VM's gigabytes and minutes. Kubernetes orchestrates them at scale.</li><li><b>VRF</b> = VLANs for routing tables: one physical router holds multiple independent routing tables (customer separation on shared gear) — no special hardware required.</li><li>Cloud service models: <b>IaaS</b> (you manage OS up — EC2), <b>PaaS</b> (you manage app only), <b>SaaS</b> (you manage nothing — email in a browser). Deployment models: public, private, hybrid, community.</li><li>Cloud benefits the exam expects: elasticity, pay-as-you-go, global reach, resilience.</li><li><b>Exam trap:</b> classify the scenario to the service model — "developers deploy code without managing servers" = PaaS, not IaaS.</li></ul>`,
55:`<ul><li>RF fundamentals: 2.4 GHz penetrates farther but is crowded (3 non-overlapping channels: <b>1, 6, 11</b>); 5 GHz is faster with many non-overlapping channels; 6 GHz arrives with Wi-Fi 6E.</li><li>Standards ladder: 802.11b/g (2.4), 802.11a (5), <b>802.11n</b> (both, "Wi-Fi 4"), <b>802.11ac</b> (5 GHz, "Wi-Fi 5"), <b>802.11ax</b> (both + 6 GHz, "Wi-Fi 6/6E").</li><li>Service sets: <b>BSS</b> (one AP + clients; BSSID = the AP's radio MAC), <b>ESS</b> (multiple APs sharing an SSID — roaming), <b>IBSS</b> (ad-hoc, no AP), mesh (APs backhauling wirelessly).</li><li>802.11 frames have up to four address fields, and clients must <b>associate</b> with an AP before passing traffic; the AP bridges wireless ↔ wired.</li><li>Interference culprits: microwaves, Bluetooth, cordless phones (2.4 GHz); absorption/reflection/refraction shape coverage.</li><li><b>Exam trap:</b> channels 1/6/11 — any design using overlapping 2.4 GHz channels (e.g., 1, 3, 5) is the wrong answer.</li></ul>`,
56:`<ul><li><b>Autonomous APs</b>: self-contained, individually managed — fine for a handful, unmanageable at scale. <b>Lightweight APs</b> split duties with a <b>WLC</b> (split-MAC): the AP handles real-time radio work; the WLC handles auth, roaming, RF management.</li><li><b>CAPWAP</b> tunnels AP↔WLC: control UDP <b>5246</b> (encrypted), data UDP <b>5247</b>. APs can discover WLCs via broadcast, DHCP option 43, or DNS.</li><li>AP modes: local (default — serves clients), <b>FlexConnect</b> (locally switches traffic; survives WAN-to-WLC outages), monitor, sniffer, rogue detector, bridge/mesh.</li><li>WLC deployment options: unified (central appliance), cloud-based, embedded (in a switch stack), Mobility Express (WLC runs on an AP). <b>Cloud-managed</b> (Meraki-style) is its own architecture.</li><li>Connect APs and WLCs to access ports trunking isn't needed for the AP (CAPWAP carries the VLANs); the WLC connects via trunk/LAG.</li><li><b>Exam trap:</b> FlexConnect is the answer to every "branch office keeps Wi-Fi when the WAN dies" scenario.</li></ul>`,
57:`<ul><li>Authentication evolution: open → WEP (broken — never the answer) → 802.1X/EAP variants (PEAP, EAP-TLS with certificates, EAP-FAST) against a RADIUS server.</li><li>Encryption/integrity generations: <b>WPA</b> = TKIP (band-aid on WEP hardware), <b>WPA2</b> = <b>AES-CCMP</b>, <b>WPA3</b> = AES-<b>GCMP</b> + <b>SAE</b> handshake (replaces the crackable 4-way PSK exchange) + forward secrecy + protected management frames.</li><li>Modes per generation: <b>Personal</b> = pre-shared key; <b>Enterprise</b> = 802.1X + RADIUS, per-user credentials.</li><li>WPA3 extras: OWE ("enhanced open" — encryption without passwords for guest networks).</li><li><b>Exam trap:</b> map the acronym to the generation instantly — TKIP→WPA, CCMP→WPA2, GCMP/SAE→WPA3. Mixed pairings in answers are bait.</li></ul>`,
58:`<ul><li>WLC bootstrapping: management interface (CAPWAP + admin), virtual interface (client-facing DHCP relay/web-auth, e.g. 192.0.2.1), and one <b>dynamic interface per WLAN→VLAN mapping</b>.</li><li>GUI flow to publish a network: create the dynamic interface (VLAN + IP) → WLANs → Create New → set profile + <b>SSID</b> → map to the dynamic interface → Security tab → WPA2/WPA3, PSK or 802.1X (add the RADIUS server first under Security → AAA) → enable.</li><li>Per-WLAN toggles the exam mentions: band steering, session timeout, client limits, QoS profile (platinum = voice).</li><li>The WLC connects upstream via a <b>trunk</b> (it carries every dynamic interface's VLAN); LAG bundles its ports.</li><li><b>Exam trap:</b> a WLAN mapped to the wrong dynamic interface puts clients in the wrong VLAN/subnet — the "clients connect but get weird IPs" scenario.</li></ul>`,
59:`<ul><li>Why automate: manual per-device CLI doesn't scale, drifts, and fat-fingers outages. Automation gives consistency, speed, and auditability.</li><li>Recap the planes precisely: <b>data plane</b> forwards frames/packets; <b>control plane</b> decides (routing protocols, ARP, STP); <b>management plane</b> is how admins touch the box (SSH, SNMP, HTTPS).</li><li>Traditional networking: all three planes on every device. <b>Controller-based</b>: control logic centralizes (wholly or partly) on a controller with a global view.</li><li>APIs by direction: <b>northbound</b> = apps/scripts → controller (REST); <b>southbound</b> = controller → devices (NETCONF, RESTCONF, OpenFlow, SSH).</li><li>Configuration drift, golden configs, and infrastructure-as-code set up Days 60–63.</li><li><b>Exam trap:</b> ARP and routing protocols are <i>control plane</i>, not management — classifying plane membership is a guaranteed question.</li></ul>`,
60:`<ul><li><b>JSON</b> — the REST lingua franca: objects <code>{"key":"value"}</code>, arrays <code>[1,2]</code>, strings (double quotes only), numbers, booleans, null. No comments, no trailing commas. Whitespace is irrelevant.</li><li>Read nested JSON fluently: <code>{"interfaces":[{"name":"g0/0","up":true}]}</code> — the exam shows output like this and asks what's true.</li><li><b>XML</b>: tag-based <code>&lt;interface&gt;&lt;name&gt;g0/0&lt;/name&gt;&lt;/interface&gt;</code> — verbose, used by NETCONF.</li><li><b>YAML</b>: indentation-based, human-first, comments with #, lists with dashes — Ansible's playbook format. Indentation must be spaces, consistent.</li><li>All three serialize the same data differently; recognizing each on sight is the testable skill.</li><li><b>Exam trap:</b> spot invalid JSON instantly — single quotes, unquoted keys, or a trailing comma make an option wrong.</li></ul>`,
61:`<ul><li>REST = stateless client-server API over HTTP. <b>CRUD→verbs</b>: Create=POST, Read=GET, Update=PUT (replace)/PATCH (modify), Delete=DELETE.</li><li>Anatomy of a call: verb + URI (https://controller/api/v1/devices) + headers (Content-Type: application/json, auth token) + optional body.</li><li>Status codes: <b>2xx</b> success (200 OK, 201 Created, 204 No Content), <b>4xx</b> client error (400 bad request, <b>401 unauthenticated, 403 unauthorized</b>, 404 not found), <b>5xx</b> server error.</li><li>Authentication options: basic (user:pass base64 — weak), API keys, <b>token-based</b> (login once, present the token thereafter — how DNA Center works).</li><li>REST is stateless: every request carries everything needed; the server remembers nothing between calls.</li><li><b>Exam trap:</b> 401 vs 403 — 401 means "who are you?" (bad/missing credentials); 403 means "I know you, and no."</li></ul>`,
62:`<ul><li>SDN centralizes the control plane on a controller holding a global network view; devices keep forwarding (data plane).</li><li><b>Cisco SD-Access</b>: the campus fabric — <b>underlay</b> (routed physical links whose only job is reachability), <b>overlay</b> (VXLAN tunnels carrying user traffic), <b>fabric</b> (the combination). LISP handles host location; TrustSec/SGTs carry policy.</li><li><b>Catalyst (DNA) Center</b> is the controller: intent-based config push, software image management, and <b>assurance</b> (telemetry, health scores, anomaly detection — the AI/ML hook from v1.1).</li><li>Versus traditional management: device-by-device CLI and per-box monitoring vs declare-intent-once, controller renders configs everywhere, continuous verification.</li><li>Controller APIs recap: northbound REST for apps; southbound (NETCONF/RESTCONF/SSH) toward devices.</li><li><b>Exam trap:</b> underlay vs overlay definitions — user traffic rides the overlay (VXLAN); the underlay just provides IP reachability between fabric nodes.</li></ul>`,
63:`<ul><li><b>Ansible</b>: agentless, <b>push</b> model over SSH; YAML <b>playbooks</b> describe desired state; inventory lists targets; control node runs it. Free + Tower/AAP for enterprise.</li><li><b>Terraform</b> (new in v1.1, replacing Puppet/Chef): <b>declarative</b> infrastructure-as-code; HCL files describe the end state; providers talk to platforms; the <b>state file</b> tracks reality vs desire; plan → apply workflow.</li><li>Compare: Ansible = configuration management (make existing boxes right); Terraform = provisioning (create/destroy the boxes). They're commonly used together.</li><li>v1.1 AI topics: <b>predictive AI/ML</b> forecasts failures and flags anomalies from telemetry (assurance); <b>generative AI</b> produces artifacts — configs, summaries, troubleshooting suggestions. Know the distinction and where each helps operations.</li><li>Guardrails the blueprint expects: AI outputs need human validation; data quality drives model quality.</li><li><b>Exam trap:</b> "agentless + YAML + SSH" = Ansible; "declarative + state file + providers" = Terraform. Those keyword clusters are the whole question.</li></ul>`
});

<script>
// ===== GLOSSARY (original definitions) =====
const GLOSS=[
["802.1Q","IEEE trunking standard that inserts a 4-byte VLAN tag into Ethernet frames; native VLAN traffic crosses untagged.","na"],
["802.1X","Port-based network access control: a supplicant authenticates through an authenticator (switch/AP) against a RADIUS server before getting network access.","sf"],
["AAA","Authentication (who you are), Authorization (what you may do), Accounting (what you did). Delivered by RADIUS or TACACS+.","sf"],
["Access port","Switch port carrying exactly one data VLAN (plus optionally a voice VLAN), untagged, for end devices.","na"],
["ACL","Access control list — ordered permit/deny rules matched top-down with an implicit deny at the end. Standard = source only; extended = protocol/source/destination/ports.","sf"],
["Administrative distance","Trustworthiness rank of a route source; lower wins. Connected 0, static 1, eBGP 20, EIGRP 90, OSPF 110, RIP 120.","ipc"],
["Anycast","One address configured on multiple devices; routing delivers to the nearest. Used by services like DNS roots.","nf"],
["APIPA","Automatic private addressing (169.254.0.0/16) self-assigned when DHCP fails — a giveaway symptom in troubleshooting questions.","nf"],
["ARP","Address Resolution Protocol — resolves an IPv4 address to a MAC with a broadcast request and unicast reply.","nf"],
["ARP poisoning","Attack sending forged ARP replies so traffic flows through the attacker (MITM). Mitigated by Dynamic ARP Inspection.","sf"],
["Autonegotiation","Interfaces advertise speed/duplex abilities and pick the best match; a silent partner causes half-duplex fallback at 10/100.","nf"],
["Bandwidth","Link capacity in bits/sec. Also an interface value OSPF and EIGRP use for metric math (change with the bandwidth command, doesn't alter real speed).","ipc"],
["BPDU","Bridge Protocol Data Unit — STP's hello message carrying bridge IDs and costs, sent every 2 seconds.","na"],
["BPDU Guard","Err-disables a PortFast port that receives a BPDU — stops rogue switches on access ports.","na"],
["Bridge ID","STP identity: priority (default 32768 + VLAN) plus MAC. Lowest BID becomes root bridge.","na"],
["Broadcast domain","The set of devices that receive each other's broadcasts — one VLAN/subnet. Routers bound them.","nf"],
["CAPWAP","Tunnel protocol between lightweight APs and a WLC: control UDP 5246 (encrypted), data UDP 5247.","na"],
["CDP","Cisco Discovery Protocol — proprietary L2 neighbor discovery, on by default, 60-second advertisements.","na"],
["CIA triad","Confidentiality, Integrity, Availability — the three goals every security control serves.","sf"],
["CIDR","Classless addressing written as prefix lengths (/24); replaced classful A/B/C allocation.","nf"],
["Collision domain","Where frames can collide: an entire hub, but only a single switch port. Full duplex eliminates collisions.","nf"],
["Connected route","Route to a subnet configured directly on an up interface (code C, AD 0); the /32 of the interface itself is the Local route (L).","ipc"],
["Control plane","The decision-making functions of a device: routing protocols, ARP, STP. Centralized in SDN.","ap"],
["CRC / FCS","Frame check sequence — checksum in the Ethernet trailer; CRC errors indicate cabling/duplex/interference damage.","nf"],
["Crossover cable","UTP wired to connect like devices (switch-switch); mostly historical thanks to auto-MDIX.","nf"],
["DAI","Dynamic ARP Inspection — validates ARP replies on untrusted ports against the DHCP snooping binding table.","sf"],
["Default gateway","The router a host sends off-subnet traffic to; the host ARPs for the gateway's MAC, not the destination's.","nf"],
["Default route","0.0.0.0/0 (::/0) — matches anything no specific route covers; the gateway of last resort.","ipc"],
["DHCP","Dynamic Host Configuration Protocol — leases IP settings via Discover, Offer, Request, Ack (UDP 67/68).","ips"],
["DHCP snooping","Switch feature dropping DHCP server messages on untrusted ports and building a MAC/IP binding table.","sf"],
["DNS","Domain Name System — resolves names to addresses. Queries UDP 53; zone transfers TCP 53. Records: A, AAAA, CNAME, MX.","ips"],
["DORA","The DHCP lease sequence: Discover, Offer, Request, Acknowledge.","ips"],
["DR/BDR","OSPF designated and backup designated routers on multiaccess segments; elected by priority then router ID, no preemption.","ipc"],
["DSCP","Differentiated Services Code Point — 6-bit L3 QoS marking in the IP header; EF (46) marks voice.","ips"],
["DTP","Dynamic Trunking Protocol — Cisco's automatic trunk negotiation; disable with switchport nonegotiate for security.","na"],
["Dual stack","Running IPv4 and IPv6 simultaneously on the same interfaces — the standard migration approach.","nf"],
["Duplex mismatch","One side full, one side half duplex: late collisions on the half side, FCS errors on the full side, terrible performance.","nf"],
["EIGRP","Cisco's advanced distance-vector IGP: AD 90, bandwidth+delay metric, successors and feasible successors, supports unequal-cost load balancing.","ipc"],
["Encapsulation","Wrapping data with headers down the stack: data → segment → packet → frame → bits.","nf"],
["Err-disabled","Port state after a violation (port security, BPDU guard); recover with shut/no shut or errdisable recovery.","sf"],
["EtherChannel","Bundling up to 8 physical links into one logical interface (LACP, PAgP, or static on) so STP doesn't block them.","na"],
["EUI-64","Method building an IPv6 interface ID from the MAC: split, insert FFFE, flip the 7th bit.","nf"],
["Extended ACL","ACL matching protocol, source, destination, and ports (100–199 or named); placed close to the source.","sf"],
["FHRP","First-hop redundancy protocol family — HSRP, VRRP, GLBP — providing a virtual default gateway that survives router failure.","ipc"],
["FlexConnect","Lightweight-AP mode that switches traffic locally and survives losing the WAN path to the WLC.","na"],
["Floating static route","Static route with deliberately high AD that installs only when the primary (dynamic) route disappears — a backup path.","ipc"],
["Frame","The Layer 2 PDU: MAC headers + payload + FCS trailer. Valid Ethernet size 64–1518 bytes.","nf"],
["Full mesh","Topology where every node links to every other; partial mesh connects only some pairs.","nf"],
["GLBP","Gateway Load Balancing Protocol — Cisco FHRP that actively load-balances across multiple forwarders.","ipc"],
["GRE","Generic Routing Encapsulation — tunneling that carries any protocol (including multicast/routing protocols) but adds no encryption; paired with IPsec for secure WANs.","sf"],
["HSRP","Hot Standby Router Protocol — Cisco FHRP, active/standby, virtual MAC 0000.0c07.acXX, preemption off by default.","ipc"],
["Hypervisor","Software hosting virtual machines: Type 1 on bare metal (ESXi), Type 2 on a host OS (VirtualBox).","nf"],
["ICMP","Internet Control Message Protocol — ping (echo request/reply), unreachables, time exceeded (traceroute's engine). IP protocol 1.","nf"],
["IGP / EGP","Interior gateway protocols route within an organization (OSPF, EIGRP); BGP is the exterior protocol between organizations.","ipc"],
["Inside global","NAT term: the public address representing an inside host to the outside world.","ips"],
["Inside local","NAT term: the private address of an inside host as seen internally.","ips"],
["IPsec","Framework providing encryption, integrity, authentication, and anti-replay for VPNs; standard for site-to-site tunnels.","sf"],
["Jitter","Variation in packet arrival times — voice needs ≤30 ms; managed by QoS queuing.","ips"],
["LACP","Link Aggregation Control Protocol (802.3ad) — standards-based EtherChannel negotiation; modes active and passive.","na"],
["Link-local address","IPv6 FE80::/10 address auto-configured on every interface, used on-link only (routing protocol hellos, next hops), never routed.","nf"],
["LLDP","IEEE 802.1AB neighbor discovery — the multivendor CDP; off by default on Cisco gear.","na"],
["LLQ","Low-latency queuing — strict priority queue for voice within CBWFQ, policed so it can't starve other traffic.","ips"],
["Longest prefix match","Routing rule: the most specific matching route wins, before AD or metric are even considered.","ipc"],
["MAC address","48-bit L2 hardware address: OUI (vendor) + unique half. Written as 12 hex digits.","nf"],
["MAC address table","Switch table mapping MACs to ports, learned from source addresses; unknown destinations are flooded.","nf"],
["Management plane","Functions used to administer a device — SSH, SNMP, HTTPS, console.","ap"],
["Metric","A protocol's internal route preference: RIP hop count, OSPF cost, EIGRP bandwidth+delay. Compared after AD.","ipc"],
["MFA","Multi-factor authentication: combining something you know, have, and/or are.","sf"],
["MIB","Management Information Base — the structured database of OIDs an SNMP agent exposes.","ips"],
["Multicast","One-to-many delivery to subscribed receivers (224.0.0.0/4, FF00::/8). OSPF uses 224.0.0.5/.6.","nf"],
["Named ACL","ACL referenced by name with editable sequence numbers — insert, delete, and resequence individual lines.","sf"],
["NAT","Network Address Translation — rewrites addresses between private and public space. Static 1:1, dynamic pool, PAT many:1.","ips"],
["Native VLAN","The single VLAN crossing an 802.1Q trunk untagged; must match on both ends; best practice: an unused VLAN.","na"],
["NDP","IPv6 Neighbor Discovery Protocol (ICMPv6) — NS/NA replace ARP; RS/RA advertise routers and prefixes for SLAAC.","nf"],
["NGFW","Next-generation firewall — stateful filtering plus application awareness, IPS, and identity policies.","sf"],
["NTP","Network Time Protocol (UDP 123) — clock sync; stratum measures distance from the reference clock.","ips"],
["OSPF","Open Shortest Path First — link-state IGP, AD 110, cost metric from bandwidth, areas with a backbone (area 0), elects DR/BDR on LANs.","ipc"],
["OUI","Organizationally Unique Identifier — the vendor-assigned first half of a MAC address.","nf"],
["PAT","Port Address Translation (NAT overload) — many private hosts share one public IP, distinguished by source ports.","ips"],
["PDU","Protocol Data Unit — the data unit at each layer: segment (L4), packet (L3), frame (L2), bits (L1).","nf"],
["PoE","Power over Ethernet: 802.3af 15.4 W, 802.3at/PoE+ 30 W, 802.3bt up to ~100 W — powers phones, APs, cameras.","na"],
["PortFast","STP feature moving an access port straight to forwarding; pair with BPDU Guard, host ports only.","na"],
["Port security","Limits MAC addresses per switch port; violation modes shutdown (default), restrict, protect; sticky saves learned MACs.","sf"],
["Private addresses","RFC 1918 space: 10/8, 172.16/12, 192.168/16 — unroutable on the internet, hence NAT.","nf"],
["QoS","Quality of Service — classification, marking, queuing, policing, and shaping to protect important traffic.","ips"],
["RADIUS","Open AAA protocol (UDP 1812/1813); encrypts only the password; combines authentication and authorization — standard for network access (802.1X).","sf"],
["Reflection attack","Attacker spoofs the victim's address so third-party servers flood the victim with replies; amplification makes replies bigger than requests.","sf"],
["REST API","Stateless HTTP API style: CRUD via POST/GET/PUT/DELETE, JSON payloads, status codes (200/201/401/403/404).","ap"],
["RIP","Routing Information Protocol — distance-vector IGP, hop-count metric (max 15), AD 120, updates every 30 s. Legacy.","ipc"],
["Root bridge","The STP reference switch (lowest bridge ID); all its ports are designated; every other switch finds its best path to it.","na"],
["Root port","A non-root switch's single best port toward the root bridge — lowest path cost, with tiebreakers.","na"],
["Router ID","OSPF's 32-bit identity: manual router-id, else highest loopback, else highest physical IP.","ipc"],
["Router-on-a-stick","Inter-VLAN routing over one trunk using dot1q subinterfaces, one per VLAN.","na"],
["SDN","Software-defined networking — centralizing the control plane on a controller with northbound (apps) and southbound (devices) APIs.","ap"],
["SLAAC","Stateless address autoconfiguration — IPv6 hosts build addresses from RA prefixes without a DHCP server.","nf"],
["SNMP","Simple Network Management Protocol — manager polls agents (UDP 161), agents send traps/informs (UDP 162); v3 adds auth + encryption.","ips"],
["Spine-leaf","Data-center topology: every leaf uplinks to every spine, spines never interconnect — consistent two-hop latency.","nf"],
["Split-MAC","Lightweight wireless architecture dividing functions between AP (real-time radio) and WLC (management) over CAPWAP.","na"],
["SSH","Secure Shell (TCP 22) — encrypted device management; requires hostname, domain name, RSA keys, and login local on vty lines.","ips"],
["Static route","Manually configured route (AD 1): next-hop, exit-interface, or fully specified forms.","ipc"],
["Sticky MAC","Port-security option writing dynamically learned MACs into the running config as static entries.","sf"],
["STP","Spanning Tree Protocol (802.1D) — blocks redundant L2 paths to prevent loops; evolved into Rapid PVST+ and MST.","na"],
["Stratum","NTP's distance-from-reference-clock count; lower is more accurate, 16 means unsynchronized.","ips"],
["Subnet mask","32-bit pattern splitting network bits from host bits; wildcard masks are its inverse.","nf"],
["SVI","Switched virtual interface — a VLAN's L3 interface on a multilayer switch; requires the VLAN active on at least one up port.","na"],
["Syslog","Logging protocol (UDP 514) with severities 0–7 (emergency → debugging); logging trap N sends N and more severe.","ips"],
["TACACS+","Cisco AAA protocol (TCP 49); encrypts the entire payload; separates authentication/authorization — standard for device administration.","sf"],
["TCP","Transmission Control Protocol — connection-oriented L4: three-way handshake, sequencing, retransmission, windowed flow control.","nf"],
["Three-tier architecture","Campus design: access (hosts), distribution (policy, L3 boundary), core (fast transport).","nf"],
["Trunk","Link carrying multiple VLANs between switches (or to routers/WLCs) using 802.1Q tags.","na"],
["TTL","Time To Live — decremented by each router; at zero the packet dies and ICMP Time Exceeded returns (traceroute's mechanism).","nf"],
["UDP","User Datagram Protocol — connectionless L4 with an 8-byte header; no recovery, minimal delay; voice, DNS queries, DHCP.","nf"],
["Unknown unicast","A frame whose destination MAC isn't in the switch's table — flooded out all other ports in the VLAN.","nf"],
["VLAN","Virtual LAN — one broadcast domain on a switch; segments traffic without separate hardware; maps to one subnet.","na"],
["VLAN hopping","Attack reaching another VLAN via DTP negotiation or double tagging; mitigated by disabling DTP and using an unused native VLAN.","sf"],
["VLSM","Variable-length subnet masking — different prefix sizes within one network; allocate largest requirements first.","nf"],
["VRF","Virtual routing and forwarding — multiple independent routing tables on one router for traffic separation.","nf"],
["VRRP","Virtual Router Redundancy Protocol — the open-standard FHRP; master/backup with preemption on by default.","ipc"],
["VTP","VLAN Trunking Protocol — replicates the VLAN database between switches; a higher-revision rogue can overwrite the domain, so many shops run transparent mode.","na"],
["WLC","Wireless LAN controller — central brain for lightweight APs: auth, roaming, RF management, WLAN-to-VLAN mapping.","na"],
["WPA2 / WPA3","Wi-Fi security generations: WPA2 = AES-CCMP with PSK or 802.1X; WPA3 adds SAE handshake, forward secrecy, and protected management frames.","sf"],
["Wildcard mask","Inverse subnet mask used by ACLs and OSPF network statements: 0 = must match, 1 = don't care. /24 → 0.0.0.255.","sf"],
["Zero trust","Security model granting nothing by default — continuous verification of every user and device regardless of location.","sf"]
];
function renderGloss(){
  main.innerHTML=`<div class="prompt">CCNA-LAB# <b>show glossary | include ?</b></div><h1>Glossary</h1>
  <p class="sub">${GLOSS.length} terms, defined the way the exam uses them. Type to filter — try "ospf", "nat", or "trunk".</p>
  <input class="gsearch" id="gq" type="text" placeholder="Filter terms…" autocomplete="off" aria-label="Filter glossary terms">
  <p class="gcount" id="gcount" style="margin-bottom:8px">${GLOSS.length} terms</p>
  <div class="card" id="glist">
  ${GLOSS.map(([t,def,d],i)=>`<div class="gterm" data-k="${(t+' '+def).toLowerCase().replace(/"/g,'')}">
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline"><b>${t}</b>
    <span class="pill" style="background:${cv(C[dom(d).color][1])};color:${cv(C[dom(d).color][2])};flex-shrink:0">${d.toUpperCase()}</span></div>
    <p>${def}</p></div>`).join("")}
  </div>`;
  const q=document.getElementById("gq");
  q.addEventListener("input",()=>{
    const v=q.value.toLowerCase().trim();let n=0;
    document.querySelectorAll("#glist .gterm").forEach(el=>{
      const hit=!v||el.dataset.k.includes(v);
      el.style.display=hit?"":"none";if(hit)n++;
    });
    document.getElementById("gcount").textContent=n+" term"+(n===1?"":"s");
  });
}

function renderCmds(){

  main.innerHTML=`<div class="prompt">CCNA-LAB# <b>show parser dump all</b></div><h1>Command reference</h1>
  <p class="sub">${CMDS.length} commands organized by task. Filter by anything — try "trunk", "ospf", or "sticky".</p>
  <input class="gsearch" id="cq" type="text" placeholder="Filter commands…" autocomplete="off" aria-label="Filter commands">
  <p class="gcount" id="ccount" style="margin-bottom:8px">${CMDS.length} commands</p>
  <div id="clist">
  ${groups.map(g=>`<div class="card cgroup" data-g="${g}"><h3 style="margin-top:0">${g}</h3>
    ${CMDS.filter(c=>c[0]===g).map(c=>`<div class="gterm" data-k="${(c[0]+' '+c[1]+' '+c[2]).toLowerCase().replace(/"/g,'')}">
      <code style="font-family:var(--mono);font-size:12.5px;background:var(--blue-soft);color:var(--blue-deep);padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:4px">${c[1]}</code>
      <p style="margin-top:2px">${c[2]}</p></div>`).join("")}</div>`).join("")}
  </div>`;
  const q=document.getElementById("cq");
  q.addEventListener("input",()=>{
    const v=q.value.toLowerCase().trim();let n=0;
    document.querySelectorAll("#clist .gterm").forEach(el=>{const hit=!v||el.dataset.k.includes(v);el.style.display=hit?"":"none";if(hit)n++;});
    document.querySelectorAll("#clist .cgroup").forEach(g=>{const any=[...g.querySelectorAll(".gterm")].some(e=>e.style.display!=="none");g.style.display=any?"":"none";});
    document.getElementById("ccount").textContent=n+" command"+(n===1?"":"s");
  });
}
